body:
  text: 唐代宗僕固懷恩反綱僕固懷恩之反雖駱奉仙辛雲京激成然皆由代宗不從顔真卿李抱真之言用郭子儀為鎮撫以致披猖若此及乎懷恩拒命逆子伏誅乃云信不及人勲臣顛越益形昏憒可笑耳養僕固懷恩女册為崇徽公主嫁回紇目懷恩反叛即引回紇入冦為助因憐其功乃養逆女為公主仍嫁囘紇代宗之措施如此安望其能恢復而唐室不日以陵夷馴至於亡哉元載請除魚朝恩上令載為方畧因宴縊殺之以尸還其家目魚朝恩一家奴耳代宗與元載密令方畧儼如敵國不大可笑乎乃至還尸賜錢不敢肆諸市朝使憲與肅而炯戒昭益所謂庸懦無能之至矣元載忌李泌上以泌為江西判官且言俟決意誅載可束裝來目代宗欲罷載相泌即應直行黜陟論史者乃疑載柄權日久一時難於措置如是則載之權是誰所假之哉蓋彼時紀綱陵替非一朝一夕之故矣囘紇嵗求和市一馬易四十縑皆駑瘠無用注唐時與囘紇和市以多縑易羸馬糜帑㡬數十倍且縑帛或取諸民江淮織輸人以為累白居易所以有隂山道樂府之刺也今與哈薩克易馬所司得差其良駑而均衡之計市直不及内地三之一而絲縑則令各織造平售官織事不煩擾而公私利便使居易見此當復云何嘗反其意次韻以紀之閱通鑑至此復為示其梗概俾讀史者知柔逺大經在挈其綱而善用之耳郇模持竹筐葦席哭東市願獻三十字上召見賜衣館於客省目彼時所謂團練監軍孰不知其弊郇模佯狂行市其跡近於惑世誣民代宗率爾召見不察其心之邪正言之是非輒復授衣設館昧於政體矣常衮欲辭堂封時人謂禄以養賢當辭位不當辭禄注時人譏衮云云蓋出於佐饔者之口然衮猶稍知節操較之持禄固位者流猶為彼善於此若但徇大烹養賢之文而不知制禄代耕之義豈伊臯作相必當日食萬錢耶司馬光亷恥存焉之論庶乎不失平允常衮言陛下欲用李泌請且以為刺史使周知利弊目新進無所建豎克知灼見為難固非歴試不可若李泌在肅宗朝參預密勿委任已深代宗自廣平就封之時即傾心倚信且賴其調停乆矣奚待授以方州俾知人間利弊耶常衮一言而以新間舊不惟惑之甚直是昏之極矣徳宗術士桑道茂言將有離宫之厄奉天有天子氣因築其城以備非常目徳宗因術士之説築城以備非常其去梁武跣足下殿何異是時唐室未至陵夷誠控馭得宜何至有播遷之患道茂妄言禍福明王所必誅尹起莘乃以盍若勸其親賢諸大事責之豈非迂儒之見耶囘紇使董突歸國振武留後張光晟掩殺九百餘人目董突奉朝命率衆還部使朝廷果善撫而柔馭之豈能滋擾光晟以九姓之譖遽欲加誅請而不從復誘其犯法掩殺殆盡是宜明正其罪而徳宗不問及囘紇請復讐方為之貶光晟柔逺之經御下之法徳宗蓋兩失之朱滔將反三問其衆不應上以力未能制賜滔爵郡王目朱滔欲叛三問而人不對脅以威而後强從之可知唐室之事猶未至於不可為乃徳宗既聞告變冀賜爵以慰安之而反謀益熾無異抱薪揚湯措置之不當於此可概見矣奉天改元赦文陸䞇言宜悔過引咎及制下四方人心大悦目興元下詔四方人心大悦者蓋以太宗之徳在人者深而當時人心亦皆厭亂故其感動之速所謂饑易為食渴易為飲而赦脇從以銷羽翼尤不失濟變機宜耳無識者乃云徳宗反正全由文誥動人不知反正而措施乖方藩鎮横逆如故浸淫以至於唐亡所謂感人者安在孟子云仁言不如仁聲信矣蕭復嘗言宦官恃恩縱横又言楊炎盧杞瀆亂朝政目徳宗縱宦官袒盧杞㡬於好人所惡故其後雖能克復還都而播遷至再亦已災及其身蕭復抗直雖云不量鑿而正枘然比之當時朝臣可謂鐵中錚錚者矣民有獻𤓰果者上欲以散試官授之陸䞇進諫注惟名與器不可以假人民獻𤓰果不過循野人芹曝之分錢帛賚與已足相酬遽欲授以試官其昧於輕重實甚陸䞇謂虛名濫施將無以為立功者之勸非惟深中當時情弊抑亦千秋為君者所當留意也既至鳳翔欲因兵勢遣人代李楚琳陸䞇言事同脇執不如俟奠枕京邑徵授一官注楚琳戕節使附逆泚當戡定之初明正其罪為反側子示警所謂名正義順而徳宗乃欲因勢脇代近於詭譎即陸䞇欲羈授官職亦失之養奸豈當時勢有不得不然者乎李晟戍成都取營妓以還張延賞追返之遂有隙目延賞憸邪原不可相然晟為大將不宜取妓又以私憾釀成釁端則取禍不得謂無因且不待尚結贊之反間耳四十餘州大水陸䞇請賑撫上言恐生奸欺目水連四十餘州溺人三萬餘計賑撫惟恐不逮猶虞或遺且竈鼃澤鴈皆按騐可得姦欺亦何自而生此而尚欲屯膏民困將誰恤乎況徳宗昔於朔方從逆之將士尚議並給冬衣而此淮西罹患之災黎獨靳恤之升斗前後自相刺謬亦已甚矣陸䞇奏均節財賦請兩稅以布帛為額注租庸調變為兩税在唐時沿習嵗久其勢亦難驟更䞇欲改賦錢而復徵穀絹是徒泥故册陳言而不知時勢所便且有不得不易錢而為銀者夫民生利病特在司牧者調劑而善馭之可耳若銀錢榖絹不過易名同實耳理之不得其人皆足病民亂政䞇前後奏議多達國體此則不免迂腐為並存而别白之實不害其賢也陽城為道州賦税不登自署下考觀察使遣判官督其賦城自繫獄注徵科撫字原應並行不悖使遇災傷為民請命宜也設值嵗稔亦必盡去其賦以為利民依古無此治體史家所載失之未詳至城自署其考自繫於獄則不免市名矯激亦太過矣甚而往案判官且載妻子逃逸官箴又可問耶李景略宴僚佐行酒者誤以醯進任迪簡彊飲之歸而嘔血目為人隠過固長者之事若以醯行酒彊飲以冀逭人之罪且飲醯亦未必至嘔血迪簡特藉此要結衆心矯情飾偽諸軍士遂墮其術中觀他日之推奉代帥肺肝如掲矣憲宗梁悦報讐殺人綱復讐之義在列國分爭時法紀不立仇釁相尋不得不激為此論若承平之世以里閈細民悍然自抗王章豈可為訓韓愈所議判律令經義為兩端其流弊適足為奸民藉口耳向嘗明著其説讀史者不可不知吐突承璀有罪出為淮南監軍目憲宗以監軍為罪人示貶之職所謂罰不蔽辜且猶自矜為能斷則其平昔中於閹豎之蠱惑深矣李絳尚稱能直言匡正者所對亦若得之望外其視孔戣顯劾奸邪轉遜一籌矣李絳言邉兵無實上令按閲㑹絳罷相而止注兵籍軍裝有名無實憲宗平時漫不知檢聞絳言而始驚㑹絳罷而即止邉防按閲視相臣去留何以為政然元和方有事詰戎不宜簡率若此疑記載者不無舛辭韋貫之言禮部侍郎重于宰相注禮部重于宰相逞臆説而不中事理彼盖以為取士所以儲材也憲宗美其言未㡬遂以為相可謂以言取人而不知任賢之輕重矣召柳宗元劉禹錫等至京師既而復以為逺州刺史目宗元黨附叔文自取戮辱韓愈作誌以為不自愛惜語涉周旋若禹錫既以失身獲譴而還朝尚㒺知懲艾肆言譏忿其罪當不止與柳同科乃集賢金紫濫賞屢叨守正如裴度汲汲薦剡又何為者韓誌惜宗元不得有力推挽應即指是而發盖均為文人氣類陋習所中非正道也盜殺武元衡許孟容請急搜捕因誅王承宗卒張晏等注盜殺宰相事出非常搜捕豈容刻緩乃所司惑於賊人詭計竟爾觀望遲疑使非許孟容剴切進言㡬欲置之不問及下詔大索又以士則妄告李代桃僵雖元膺購募山棚罪人斯得尚欲掩飾前非不加窮治豈足以肅法紀而申國憲由是觀之憲宗之平淮蔡蓋幸耳非真能恢𢎞太宗之業者也桞公綽為京兆尹杖殺神䇿小將目躍馬衝導罪之細者即平民有犯予杖已足蔽辜京兆雖以肅清輦轂為任亦豈可因衝已導而遽斃軍將公綽此舉非惟草菅人命㡬於弁髦王章及上怒詰猶飾辯不已是但知唐突者之無禮而不知專擅者之更非禮也或猶以公綽為風厲真不知政衡者上求方士以柳泌能合長生藥用為台州刺史目大亂甫戢而亟亟求仙服藥蓋由志滿意盈遂爾一蹶不振而穆宗且甘蹈覆轍而不悟非所謂貽謀不臧者乎裴度為皇甫鎛之黨所擠罷為河東節度目晉武平吳贊成者獨有杜預而山濤則云吳平之後方勞聖慮其言可謂知要憲宗倚任裴度河南北得以摧陷廓清可謂有為之主既而鎛异並進度且不安其位中興之業自虧一簣于此可見處成功之難穆宗錢徽楊汝士掌貢舉段文昌李紳屬所善進士不預而鄭覃裴度子弟及第文昌因言皆闗節得之上命覆試貶徽等目黨牛怨李已足紊亂朝常至通闗節於貢舉是以先進引後進其為門户紛爭𤓰連株蔓尤不可究詰矣若時人稱美錢徽不奏人私書此更瞽説既有私書則掌舉者已屬納人闗節且未必止段李二人而已徽即下愚肯自言耶史書之不足信如此敬宗韋處厚諫上宴遊言先帝時陛下年已十五今皇子纔一嵗目處厚冀以危詞聳聽而不知其言之乖謬大臣篤於忠愛茍事切君身當隨時直陳無隠豈宜計儲位少長為進諫等差乎使其隠微果存此念則心跡叵測罪不容誅即詭飾以抒激切而顯斥先朝㒺顧尊親之諱亦豈能掩其不敬處厚於二者皆無可自解尹起莘僅責其受賞不辭不從大體立論殊失輕重而敬宗乃感其言非昏戾而何文宗上不能堅決與宰相議事已定尋復中變目虛懷聽納而不能堅決不特築室無成亦且小人得以生計此失䇿之大者也路隋言宰相任重不宜兼金榖瑣碎之務目宰相叙百揆其職固無所不統自漢晉以來丙吉大言燮理謝安自命風流於是不親案吏不視細事名尊相體實隳官常路隋此言所謂知其一未知其二至楊國忠輩擅權通賄由於委任非人以彼貪憸性成當日即不兼瑣務其能盡匡弼之職乎柏耆馳入滄州斬李同捷諸將争論坐貶尋以李祐卒賜自盡目柏耆雖不免急功然以諸道攻三年不能得之賊一旦誅之其功固可抵過也乃以李祐之死遂令自盡何以厲用命之士哉宗閔與徳裕有隙杜悰説宗閔用為御史大夫徳裕驚喜泣下目杜悰欲用一官羈縻徳裕此特為宗閔畫䇿平憾耳若徳裕已朝夕可望入相豈轉以知舉與御史大夫為重哉蓋徳裕之意以悰為宗閔謀主故偽為驚喜寄謝冀緩其傾陷之計史家乃謂徳裕實艷羨科第清華何異癡人説夢然徳裕之機詐實亦可鄙矣李徳裕宗閔各有朋黨互相擠援目正人指邪人為邪邪人亦指正人為邪二語似矣然邪正固不容不别而朋黨實非朝廷所宜有如李徳裕較之牛僧孺為畧正矣然其朋黨惡習何嘗不為當時之害薛元賞杖殺神䇿軍將因白服見中尉仇士良目元賞擒杖軍將頗著風力亦末流之錚錚者士良雖强横據理直折彼固莫如之何囚服往見又何為哉柳公權以服澣濯之衣為末節上以為諫議大夫目公權以敢言著聞文宗亦嘉其風采然彼時宦寺弄權朝臣植黨未聞有所糾彈則亦杜欽谷永之流耳區區不諛澣衣托詞筆諫亦所云末節而已武宗李中敏判仇士良不應䕃子李徳裕以其楊嗣復之黨出為刺史目中官䕃子至明季而弊極其實已濫觴於此中敏一判不煩言而切中窽要璫豎銜恨有志者方當力為主持徳裕徒以門户之見輒加貶謫不顧是非不循法度惟報復私嫌是務可鄙甚矣上欲誅楊嗣復李珏杜悰奔馬見李徳裕言天子新即位不宜手滑目明罰敕法惟當論其罪之當否罪不當雖小豈宜輕濫罪誠當雖大安得姑容嗣復及珏如果詭謀廢立實為法所不宥特以言出士良讒搆其情尚近曖昧耳杜悰年少新立不宜手滑云云所謂似是而非果爾則年既長立既乆遂可不思明慎乎聞見録載宋范仲淹於光化知軍遇賊棄城事欲為曲貸其死所傳尤為悖理向已深斥其説而其手滑二字實即原本於此事不同而義則一因并著之李徳裕草賜黠戛斯書言可汗與我同族目人君居中馭外尊卑之分本自秩然而柔逺犬經惟在徳懷威讋徒欲以文字争衡抑亦末矣況逺尋苗裔傅㑹支離尤失敇命之體且即所稱北平太守亦有何足貴徳裕頗擅文辭且自詡能使異域奉約執禮而立言謬誕若此豈非千古笑資宣宗君臣務反㑹昌之政目大中務反㑹昌之政論史者徒以時相前後傾軋宋室紹述紛更有類乎此殊不知宣宗未嗣位時久為武宗所不禮而李徳裕擅權日久又挾震主之勢觀太尉顧我毛髪洒淅數語與霍光驂乘何異則徳裕之致禍本其身自取豈待同列巧為排擯而宣宗猜忌寡恩之失有不止於矯枉過正者矣李徳裕以私憾殺吳湘其兄訟枉再貶潮州司馬丁柔立素為徳裕所擯至是訟其寃亦坐貶目李紳案奏湘罪不無迎合執政之心及御史覆奏其寃徳裕自當平情昭雪乃竟以私意擅殺且罪及推勘之人徇門户而専威福再貶實罪所當得柔立素為所斥乃以為之訟白得名然豈能欺有卓識者哉裴休請早建太子上言若建太子則朕為閒人目宣宗之言實屬可鄙可笑夫以天下與人易為天下得人難所為遲遲而不敢冒昧從事正堯舜之志也若宣宗者直以帝位為竒貨且以其子為他人又安能有為天下得人之志乎嘗考以忠臣自負者莫不以早建太子擇賢師傅教之為急務此無他盖半出於懞懂盜襲人言而不知世務半出於僉邪欲圖後日之富貴而已孔子曰唯上知與下愚不移若因選賢教之即得賢則堯舜早施之於丹朱商均矣且世愈變而風愈下名位已定其不肖者固不足論即有英賢之姿諛之者獻其逢迎忌之者亟其排陷古今之蹟章章可考也則何如令其同列兄弟之間均選賢而教之之為愈乎是不亟亟於册立者實所以保全之也設云一旦不虞將起紛爭蓋處置得宜雖不立亦如泰山之安若處置不得其宜雖立定亦有肘腋之患兹故悉而論之以破千載之惑詔戎臣失律并坐監軍目監軍理不應設直撤之可耳乃不懲掣肘之弊而轉定失律並坐之條是欲去其權而反加之權也非抱薪救火而何鄭光莊吏恣横韋澳請置於法上令痛杖而貸其死目豪貴肆惡鄉土最為蠧政害民況輦轂間豈容恣横若富族抗租不問勢將獨於貧户取盈其弊更不可究極韋澳執械莊吏請置於法按律正無可逭乃宣宗不但不治鄭光庇蠧之罪且為奸吏宛轉乞憐史稱大中朝用法無私其然豈其然哉上嘗欲以韋澳判户部澳辭其甥桞玭尤之澳言主上私欲用我人必謂我以他岐得之目韋澳數語固足為貪名位者下砭然為臣者感激自效冀時事可以日理方為不負特達之知乃沾沾以他岐干進恐啟他人之疑為説是特對甥自炫名髙耳其所云造膝時事又誰見之而誰傳之懿宗王式使懦卒為候騎而少給兵注王式當二浙積玩疲弊之後整頓戎行動中窽㑹可謂不孤任使所論散給軍食不置烽燧二事亦能發韜鈐所未及至以懦卒為候騎則不可為訓蓋偵候雖不専於戰鬭而深入敵境得悉情形以歸此豈懦者所能辦且懦者若未見面目輒張大其事以告豈不搖動軍心反致僨事乎是雖偶中一時而不可為軍行成法也彗出于婁司天監奏為含譽星目幸災者謂之彗貢諛者謂之含譽由是觀之則其為休為咎固己無定然世之治與不治在政之得失休固不足詡即咎亦應慎之於其未見及其既見不已晚乎康承訓拒蠻冦因天平小校燒營得解圍去詔加承訓官小校不遷一級目承訓先事無料敵之智臨事無應變之才賴天平小校力争出竒致勝顧冒功掠美親暱皆濫膺爵賞而首庸轉不晉一階其何以使軍士奮勇效命然彼時懿宗獨何為者哉葬同昌公主舞者數百人以雜寶為首飾舞罷珠璣覆地注溺愛厚殉其繆自不待言然如百二十輿三十餘里云云猶暴殄情事所有至所云舞罷珠璣覆地則理所必無夫數百人之首飾安得如許雜寶即誠有之亦豈能覆三十里之逺蓋所云紂之不善作史者形容而甚其辭耳僖宗成都突將作亂髙駢招諭還營隂籍其名掩捕殺之注駢初至西川諸事頗中機畧顧漫信妖術焚紙散豆遂隳軍士之心且停廩省官復濟以嚴酷浸致突將譟亂牓謝既乖大體孥戮濫及多人豈良將所為哉劉巨容破黄巢不肯窮追曹全晸以除代亦還賊勢復振目巨容膺閫外之寄賊方敗竄有㑹可乘正當悉鋭窮追以靖伏莽乃怨誹國家負人欲留賊以圖富貴全晸既統舟師渡江聞除書而遽返致賊氛復煽江東二人之罪固不可勝誅然所以致此者豈非僖宗不能振飭紀綱國政日壞而尚專務遊嬉其獲罪祖宗較之二人為尤甚也鄭從讜鎮河東參佐皆名士時人謂之小朝廷目名士虛聲相尚未必盡於實用有禆聚集雖多亦何足異況幕府得人極盛亦不過如緑水芙蕖之比時人乃目之為小朝廷唐末人心幻妄不知明别尊卑於此可見王重榮為河中留後請降于黄巢既乃殺巢使者擊破其兵目重榮擁河中重鎮戰守皆有可憑何至望塵降賊真所謂亂臣賊子也迨困於調發始驅殺賊使擊敗賊兵顧藉口於屈節紓患所謂欲蓋彌彰其將誰欺乎王鐸表請還朝詔徙義昌過魏州樂從訓圍而殺之目鐸初自請出師聊藉以免伴食之誚非果有制勝長畧也是以坐鎮數載老師糜餉無尺寸功乃靦顔表請還朝不特庸碌無能亦且出入自由矣況當戎馬倥偬時擁姬侍而侈服御致為姦人窺伺舉室罹災抑亦自貽之戚耳史贊乃稱其有社稷才扶支王室㡬致中興不知鐸有何功業而如此稱許可謂信史乎昭宗詔削奪李克用官爵屬籍㑹諸道兵討之綱克用固非始終忠於唐室之人然既有興復功豈宜首議削除況爾時朝命本不能致討特欲藉力三鎮徒快其并吞私計耳然使克用果滅則三鎮益彊仍為國患矧克用又未易即滅而徒授之口實卒之一博不勝轉不得不屈體調停使諸藩效尤脇制是直甘心瀝鴆自斃范祖禹死疾庸醫之喻猶不足盡之王師範為平盧節度使每本縣令到官輒往謁拜之于庭注節使不敢横行理固宜爾然當時逆藩跋扈朝命視同弁髦何有於桑梓一令況師範並無盡心效忠之可紀乃欲以曲謹沽名飾詐其誰欺以李谿為相劉崇魯受崔昭緯指掠麻慟哭谿竟罷目崇魯甘為昭緯爪牙黨私攻訐謬博直名較谿之僉邪附勢更為奸巧而彼此狺狺交閧撓紊朝常唐室紀綱掃地矣其欲不亡得乎上以崔昭緯等外交藩鎮思得骨鯁之士驟用孔緯張濬目以昭緯潛通藩鎮因改用緯濬而緯濬亦即結交藩鎮之人蓋唐祚久衰諸臣中具謀國之心者百無一二而一二人者又無幹濟之才如杜讓能等且澌滅殆盡而所用率皆僉邪氣運至是尚可與圖存乎以朱全忠父名誠改義成軍為宣義注改軍號以避逆臣家諱可謂冠履倒置庸懦若此安得不為天下所輕唐室陵夷至是蓋亦無足論矣韋貽範起復再相命韓偓草制偓不肯明日班定無白麻可宣注命相失當即上疏論列亦臣職所宜然若但齗齗以草制不草制争之則茂貞所云書生禮數與反何異二語詞雖俚俗誠已深悉其矯情博直蓋唐世停草裂麻痼疾相沿甚為蠧政之尤此雖起於下多偽臣實亦因於上無明主然爾時朝政固無一足加責備者矣王師範發兵討朱全忠尋為全忠所破遂請降目唐室阽危諸藩皆坐視不救惟師範慷慨誓師差强人意惜諸將才皆庸懦事迄無成乃青州之圍不能始終全節輒開門降賊前後判若兩人實負初心矣司馬光論袁紹崔昌遐俱誅宦官以快一時之忿而國隨以亡注司馬光蘇軾皆以漢唐之亡後先同轍亦就其大誅宦官一節而言耳然袁崔二人心跡則有不可同日語者紹佷愎好勝其才尚足有為其召卓也未嘗不思用其力而後除之迨鳴鼔洛陽尾大不掉則非其所逆料止快一朝之忿而不計他日之患誠所謂惡垢焚衣因憤決癭者若朱温逆跡久著即不招之使來且有岌岌之勢昌遐復從而促之彼既素黨逆温知其為賊而曲意相徇第欲藉其聲援以奪北寺重權遂置朝廷顛覆于不問非唯引冦之罪實有賣國之心是春秋大義所必誅者豈得與本初鹵莽僅致失算相提並論哉昭宣帝帝禪位于梁遣宰相張文蔚楊涉奉册寶詣大梁目楊涉初聞作相猶對其子自歎不幸恐累子孫及是遂艷心富貴不顧罵名與張文蔚輩齎捧册寶委䞇賊廷天良澌滅殆盡不但重負初心亦有愧於其子矣評鑑闡要卷六
