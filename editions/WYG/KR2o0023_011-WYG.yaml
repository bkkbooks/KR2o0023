body:
  text: 明仁宗帝詔朕若法外用刑法司執奏五奏不允同三公大臣執奏必允乃已目法令之當否詳審至于再三斯已可矣即虞廷克允亦惟殺之三宥之三而止必令法司五奏往復雖多徒滋煩冗究之五又何異於三乎且人主詳求庶獄反覆披覽輕重自無遁情即介於微曖疑似之間或覆勘以得其平或集議以衷於是自不致猶有枉縱如必待臣下執奏乃允則明慎之謂何而權勢下移又開其漸是徒知欽恤之為美而未識勅法之要領雖小道必有可觀致逺恐泥此之謂矣宣宗時遣王通征埒里帝語廷臣言欲赦之楊士竒等因以漢罷珠崖郡為對注交阯自永樂以後久𨽻版圖埒里等竊弄潢池稱兵犯順正王誅所必加雖陳智方政等敗衂相尋亦由於閫將非人耳宣宗既别簡重臣統兵進討而又聽楊士竒等珠崖之喻其時蹇夏諸臣能不隨聲附和正宜相商决䇿乃軍行甫出國門而君臣相顧已早為棄地息兵之説厥後王通但務講和陳洽栁升相繼戰殁喪師失律坐為小醜所困皆由於廟謀之氣先餒耳開内書堂令劉翀為修撰專授小内使書目内使之職止於供給使令即令讀書亦不過教之識字記姓名略解大義而已特開書堂聚至四五百人已不免重視其事且令大學士翰林等官專以授書為務尤紊職守而褻班聫若輩因此遂得與外僚日相習熟實開夤縁交結之漸宣宗於内使傳㫖必令覆奏始行非不留心防制乃必欲其深通文墨甚至掌奏批硃悉假内豎之手實不解其何所取義至正統初即有司禮秉筆之事貽害遂不可勝言豈非立法之不善耶令自死罪至笞四十分十等納米贖罪納者贓罪得不死徒流以下復用不納者久繫不釋目金作贖刑古人欽恤之義茍情有可矜而罪非不赦許其納米弛罪亦未嘗不可顧宜聽人之自贖豈可不問其願與否而强人使從令無力者轉受無窮之累則是為利起見而非為仁行權矣皇子祁鎮生八日羣臣請立為太子目立儲非善全之道向已屢論及之若由於臣下申請尤易滋流弊況其未離襁褓者乎乃宣宗皇子生甫八日而羣臣請立太子之疏已紛紛競陳有何迫不及待竟至於此徒知拘古慕名而不審事體真不足當一噱而況其事出揣摩迎合耶轉漕始用民運支運時因陳瑄請改令民兑與附近衛所官軍曰兑運仍㕘行支運目轉漕之法明季屢更迄無良䇿盖輸將雖閭閻之職而飛輓則宜掌之在官若令里老承值富户充當即使全無苛擾而常賦外已多一力役之征後雖改為支運而尚令民運至中途及陳瑄等議行兑運似乎斟酌變通然不以收納責之有司交兑歸之水次仍令軍民私相授受且兑運與支運參行法不歸於畫一民間益無所適從强弱不均弊端百出非恤民之善政也英宗命金英同法司録囚英中坐尚書以下左右列坐目英宗寵任宦官致令參與慮囚大典其失已甚至九卿乃朝廷重職其於閹寺序次尊卑本自秩然國體所闗豈容陵替乃以刑餘醜豎竟令其張盖倨中抑尚書以下使列坐亦竟無一人敢與抗争駭觀聽而褻班聫更不可問迨末世而内官監視各部者無不僭坐部臣之上作威作福習為固然皆英宗作俑之過有以致之景帝額森詭言奉上皇還京至大同總兵官郭登不納目郭登在大同不納英宗而不能禁額森之陷白羊抵紫荆長驅深入則所謂守邊仍屬虛談而拒君實無可逃罪論者每引社稷為重之言以曲為之説所見甚謬盖孟子民貴君輕之語特因戰國殘民以逞故為此論以針砭時君非為臣子而發也後之迂儒遂以晉瑕吕飴甥鄭公孫申之事强為牽合妄以社稷與君分别重輕殊乖正理試思君為社稷主有君乃有社稷若蔑視其君則社稷又為誰守乎況君臣父子義等在三皆一尊而不可易君陷於敵而即可别奉一君則何異父刼於盜而竟謂他人父有是理乎至於英宗返國亦天幸適然設竟蹈徽欽覆轍又將何以自解若謂從權濟難不得已而置之危以圖安則何以分羮之對人知其非而於此獨迷而不悟乎讀史者多未能見及故申大義以正之額森擁上皇至廷臣欲議和于謙言今日止知有軍旅他非所敢聞目景帝任于謙排羣議而力戰守不可謂無功於宗社獨是英宗還國僻處南宫事同禁錮而廢后易儲有貪心焉天道好還子亦隨死終於殺禮西山實所自取耳然英宗亦豈得辭寡恩尺布之譏哉至於于謙社稷為重之言盖出於吕飴甥喪君有君及公孫申為將改立晉必歸君之意後世迂儒無不以是為韙夫君猶親也親為人執為子者不被髪纓冠而往救之以示不急其可乎則意欲之獄亦有由來或猶以為非英宗意是真不識事體者之言耳然則當時宜從和議乎曰不共之讐安得與和繕甲治兵以從其後如岳飛之力戰迎二帝天下其誰非之王直與廷臣共奏請迎上皇帝不懌于謙言天位已定寧復有他顧理當奉迎目王直與廷臣交章共請奉迎實為正言讜論而景泰竟爾不懌至有復作紛紜之詰則所謂非貪此位正其强顔自文而中情已不可掩于謙窺見隠微知不可以理奪故以微語釋其疑而堅其志而遣使之議始定額森遂以禮送還上皇謙此舉可謂善於匡救而返正之後殘加誅戮英宗可謂少恩矣額森築土臺坐上皇臺上率妻妾部長羅拜送上皇還京目正統既為額森所執知不足為竒貨乃送之還朝額森之惠大矣又有何畏懼而築臺羅拜乎此盖史臣飾美之辭不足為榮適以為辱耳盧忠奏上皇與阮浪王瑤圖復位商輅婉解帝前乃以他事謫忠廣西錮浪殺瑤目盧忠假事生風造為不經之談以上變傷大倫而搆危難其罪與亂臣等景泰當時即應執寘重典庶乎理得心安乃一聞奸人妄言即詔獄窮治設浪瑤誣服將置英宗何地乎雖以商輅等微言解釋忠亦下獄然僅坐以他事外謫立功何以懲凶惡且仍殺瑤錮浪其猜疑終不能釋甚矣景泰之戀位失徳也時議立太子徐有貞請復沂王王文言焉知上意誰屬乃共請建元良蕭維禎舉筆更建字為擇目羣臣揣測宦官意指遂共議建儲其為碌碌因人概可想見至有貞議請復立沂王他日復辟之謀機已隠伏王文則云焉知誰屬猶是賜金時故智膠結於中可見彼此各懷私意何曽以國事為念而維禎舉筆更建為擇且昌言吾帶欲更寵利營心恬不為怪大臣鄙謬若此尚得謂具有人心者乎英宗帝言髙榖在内閣議迎駕及南内事嘗左右朕目英宗之言總因為己私意而發不但不合出諸天子之口實令人鄙笑耳徐有貞窺帝意裁抑石亨曹吉祥亨等譖有貞於帝帝乃諭言官劾有貞圖擅威權目徐有貞與石亨輩始則倖圖爵賞朋比為奸既得志則門户各立互相擠陷勢不並容小人反覆固無足深責獨是英宗既從有貞之言而裁制曹石又因二人之譛而疎外有貞輾轉意移茫無定見益致羣小逞其伎倆紀綱所在豈宜假手於人閣臣果圖擅威權即當宣示其罪以申明罰乃授意言官令其糾劾不㡬如同列之相傾軋乎吳與弼累薦不起帝以李賢薦召授左諭徳與弼以勅書崇重意當大用而宫僚無事慮不得即行其志遂辭歸注吳與弼累薦不起㡬於髙自位置及此而應命入京祇以勅書崇重之故雖非效終南捷徑而擇官而仕利禄之見究未盡除況與弼果欲行其志即宫僚盡心輔導未嘗不可展其生平安有一躐朝班便加大用之理乃以除授未能滿志遽爾辭歸是仍以髙官顯爵為重而況薦剡本出自石亨之意即不必如瑣綴録之誣衊而謂之出處純潔實不然矣史贊英宗釋建庶人罷宫妃殉𦵏盛徳之事可法後世注英宗失徳處不可枚舉史臣乃稱其釋建庶人罷宫妃殉葬為可法後世夫釋建庶人何闗政教而宫人殉葬自是亂政罷之宜耳然豈足詡為盛徳哉憲宗故事經筵畢帝必口宣賜酒饌劉定之請毋煩玉音君臣遂無一辭相接時以定之㢲順為過目君臣日對疇咨政務必有實蹟經筵進講已屬具文至詔㫖賜饌及叩謝山呼循例數言即謂有當於勤政斯已鄙矣劉定之請亦欲去其繁文耳史氏遂謂無一辭相接以㢲順咎定之雖云愛禮存羊而當時君臣之睽隔政務之叢脞亦可見矣帝以周太后故不欲錢太后與英宗合𦵏羣臣固諫至伏哭文華門外帝乃許之目天子之孝自與常人不同且常人尚有㡬諫之義而不徒以從順為孝況宗廟社稷之所繫乎憲宗徇母后私意以至羣臣哭諫不成國體卒之仍從衆議徒顯母后之過又安得謂孝乎至於反汗賜外戚田乃其過之小者益不足論矣紀妃有娠萬貴妃令宫婢鉤治皆以病痞報及皇子生張敏藏之他室貴妃日伺無所得目憲宗偏寵萬妃任其妬毒而不能檢制㡬成炎劉燕啄之禍柔闇實無可辭責但宫闈事秘流傳又豈可盡憑如所稱後宫有娠皆遭潜害則此前之祐極生於成化五年何獨無恙且其伺察必嚴又何獨於紀妃得以病痞相朦而宫婢鉤治亦肯代為容隠至皇子既生即使張敏溺斃敏縱欲䕶救亦必潛匿外庭密為保育又安敢仍留附近安樂堂之他室吳后復往來哺養竟不慮萬妃之稍有知覺乎且祐極故在而敏之驚稱上未有子出於何義且祐極旋即立儲又豈能隠秘不使萬妃知之紀載家傳聞異辭往往從而縁飾不足深信者類此多矣項忠招諭荆襄流民九十萬户選一丁戍邊餘令歸籍給田驅迫不前者即殺之注流民屯聚為盜固法所必誅但既殱其渠魁擒其支黨其餘從惡者亦當分核嚴懲若無辜之衆自應急籌善後之宜使咸知安生理而受約束始可以永靖亂源項忠乃於九十萬人漫無區别非戍即驅不前者輒行擅殺處置實為失當使非原傑撫綏著籍控置有方其何由使流民永遂寧居不且激而致變乎命汪直刺事西厰目自永樂設立東厰寄宦官以訪緝之任固已作法於涼至憲宗信任汪直復為特置西厰氣焰鴟張羅織内外其勢益横甚且擅行逮問易置近臣其初不過因汪直舉發覃力明殺人事嘉其摘奸孰知此正若輩先為小忠小信以成其大不忠大不信之故智憲宗竟墮其術中深相倚毗自此厰衛乘時竊柄日漸恣肆逮末世而元氣孱削遂以危亡追論禍源憲宗豈得辭作俑之咎耶命司禮監懷恩同三法司録囚凡所矜疑放遣常倍於熱審目中涓録囚濫觴於正統體統陵夷已非一日但熱審朝審之制自永樂以來守而不變何至憲宗竟盡改舊章概行罷廢而以㑹讞大典專任宦官廷臣遂無由過問紀綱倒置甚矣況其矜疑釋放較常倍増則由若輩欲假姑息博美名不復顧明刑本意濫縱之失豈可勝言乃權勢既崇法司惟視其意指則其所寛者必其通苞苴者也不然必甚流離貧賤與彼無涉者也而其所嚴者必其有仇隙或受囑託而欲置之於死者也國法尚可問乎而史家猶以多所矜放為美真不識事體之甚矣康永韶言今春星變當有大咎賴秦民饑死足當之誠國家無疆福帝擢為侍郎目宋景公不肯以民嵗移災一言而熒惑退舍彼小國之君尚知以民為重為天下主者豈反忽諸況饑饉洊臻閭閻之戚即廟堂之憂豈得視如膜外康永韶乃以諛詞干進竟謂星變之咎賴秦民饑死當之且指為國家之福妄誕至此實為喪心病狂憲宗不予以斥責反悦其言而重加遷擢是惟知有已而不知有民且並不知民之為己之安身立命處也真可鄙之至矣封子五人為王綱史家紀萬妃之事皆謂其驕妬横行至於後宫有娠盡遭藥墮今以憲宗封建諸子証之知其説殊不足盡信盖憲宗偏寵萬妃及妃之恃寵驕妬固當時情事所有若謂其專房溺惑則後宫必進御無期何就館之多竟爾繩繩相繼如是年及孝宗初受封共有十人其最幼者乃憲宗第十四子而所云飲藥墮胎者尚不可勝計其生不為不蕃萬妃果妬毒豈能聽貫魚及衆而誕生成立者且如是之多乎總之宫闈事秘傳聞已不可憑或由衆人深嫉萬安之假附亂政遂飾為無稽之語以歸罪萬妃紀載家耳食滋訛於成化間事㡬不啻漢成時之昭陽禍水而不顧其跡之矛盾亦可怪也孝宗耕耤禮畢教坊以雜伎進馬文升厲色斥之目孝宗是時立未逾年諒闇之中本不當舉行耕耤即云典不可缺亦祇應僅躬秉耒以為農先乃竟設宴如常實為非理馬文升自當因此據理直陳顧不言燕衎之失而止咎教坊之瀆亂宸聰已為昧於輕重況進言亦自有體正色已足伸讜直何致遽以厲色相干夫臣之於君猶子之於父人子㡬諫尚當婉容下氣乃於君父之側輒悍然徴色發聲敬事之誠安在明代惡習相沿往往憤激沽名而不顧恪恭大義史家無識轉從而張大其辭不復準諸義理豈可為訓耶丘濬入閣王恕以己在吏部長六卿弗讓濬既而内宴濬徑居恕上目班序後先朝廷自有定制固無容争競於其間況大臣當以和衷集事為期尤不宜介懷位次乃丘濬入閣以後因王恕弗讓居前心懷不悦輒於内宴時徑據上坐妄自尊崇殊失敬共和衷之義濬稱深於學問者豈明於人而昧於己耶丘濬議論多偏激嘗譏范仲淹多事岳飛未必能恢復秦檜有再造功注論古貴有特識固不當勦説雷同亦豈可獨徇偏見丘濬謂岳飛之未必能恢復論雖未當尚從南渡時勢立言若范仲淹處置西夏茍且許和其失在於畏事而並非多事所見殊為枘鑿至於秦檜誤國之罪婦孺咸知而忽許其有再造功顛倒是非實足駭人聞聽濬學問尚稱淹貫所補大學衍義自詡其可見施行何評隲之謬不近人情乃至於此蘇軾稱荀卿好為放言髙論而不顧如濬者殆更荀之不如者耳帝召閣臣授以諸司題奏言與卿等裁决劉健請以事端多者出外詳閲目明代人君宴處深宫罕聞召見大臣之事孝宗獨能從容延接以諸司章奏面加裁决尚知勵精圖治之君劉健等正宜殫志竭誠以冀贊成上理何轉以事體繁多請出外詳閲是君方殷勤垂詢而臣子意已憚煩不獨無以副疇咨亦實所以乖夙夜盖由當時堂廉睽隔為大臣者遂不復知引對之可移晷刻耳召兩廣總督劉大夏為兵部尚書大夏以疾固辭及入見帝問其故大夏言民窮財盡度力不辦故辭目劉大夏以廣東督帥召長夏官倚任初無殊異乃當出任封疆並未聞其上章引疾及一膺召命輒爾再四堅辭為總督則無疾為尚書即有疾謂不以内外所得豐嗇殊視其誰欺乎比孝宗面詰其故則以民窮財盡度力不辦為詞更屬支吾盖時勢果急須補救益當勇往任事以圖報稱若明知其然而畏難茍避其尚可稱為公忠體國之大臣耶劉大夏不肯進揭帖且言用人行政與大臣面議而行乆之天下自治帝因袖金以賜屬勿廷謝注孝宗之於劉大夏傾心倚任延納方殷正宜剴切敷陳以副咨訪即令具揭帖以進如果灼見事要有益國家又何嫌之可避乃托言將來滋弊而委其責於府部閣臣不免心存畛域至籌及太平先務復以天下自治為言尤為模棱無實而中官鎮守肆害方深孝宗不行遽革更當反覆盡言何一聞擇廉之語輒為頓首稱善乎且錫予乃君上大權孝宗果悉大夏等之賢何妨顯加褒異顧袖金面賜且命弗行廷謝欲旌廉潔之風而轉涉苞苴之跡益堪鄙耳武宗韓文率諸大臣上疏請誅劉瑾等疏入帝驚泣不食目八黨亂政惟以聲色犬馬蠱惑上心武宗已久為䝉蔽韓文等力陳奸璫罪惡勸以奮乾剛割私愛意殊懇切武宗即未能覺悟其失翻然改絃何至一聞請誅羣閹之言輒爾驚泣不食袒䕶之極遂至於情不自持徬徨失措其童騃昏闇之狀實為可憫可恨然武宗是時年已十七尚茫無知識若此其不致踵漢唐禍變豈得謂非天幸歟江彬欲攘權導帝逺遊帝微服度闗幸宣府目江彬因武宗荒嬉無度覬其所好導以佚遊止圖避衆攘權而不顧置其君於險地坐令萬乘之尊急裝微服踰塞經時又多方蠱惑使之流連忘返其情實為叵測武宗迷而不悟愎諫獨行甚至索婦良家載歸樂妓失徳無所不至彬雖旋伏刑誅而武宗之貽笑千秋豈能掩乎孫燧上章奏寧王宸濠不軌為所邀阻楊廷和請如宣宗處趙府故事遣大臣宣諭目宸濠包藏禍心日夕覬覦非望當孫燧上章公然邀阻且使奸黨分布孔道窺伺朝廷叛跡已著其視趙王之初不與髙煦通謀者情事迥别固非可以隠行消弭前此雖為諸權倖所匿楊廷和容得諉為不知何未聞其舉以入告及蕭淮發其罪狀尤當密陳碩畫决䇿徂征以掩其不備顧援宣徳故事僅遣重臣宣諭且以往收䕶衛為辭激之速反使非王守仁在贛糾合義旅立奏蕩平其勢㡬蔓延難制廷和之謀國措置迂謬若此而當時稱為名臣明之不亡何待評鑑闡要卷十一
