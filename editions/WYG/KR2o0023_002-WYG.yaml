  text: 欽定四庫全書評鑑闡要巻二
  hash: sha256:2bec437aa2303a9e7c8ab446eb8c92c8368abe1012279497a4e1e37b155d3312
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2o0023_WYG_002-1a, image: WYG0694/WYG0694-0433a.png}
body:
  text: 漢文帝陳平言宰相上佐天子決獄錢榖自有主者目陳平所言相佐天子云云似矣然平非實能如此徒以口給免過何足稱哉河南守吳公治平為天下第一目漢代稱循吏自吳公始然史臣但云治平為天下第一而未嘗實指其政豈所謂上徳不徳無蹟之可求耶其薦用賈誼可謂不蔽賢者矣非王成黄霸輩所能及除田之租税綱除田租税或因水旱或去其已甚若永除之則國家經費將何取給文帝雖仁不能為此必史有闕文耳帝在位常以敦樸為天下先目文帝仁儉之徳當觀其大者逺者自史臣博採傅㑹轉恐失真無論持百金以營臺分十金以號中人之産為理所必無即慎夫人衣不曳地而鄧通則給銅山鑄錢事寧有刺謬若此者甚至以賜吳王几杖為止叛賜張武金為止貪不㡬執宋襄徐偃王愚懦之見窺尋令辟哉向因讀史屢及之蓋以辭害意古今通病不可不知景帝鼂錯穿廟堧垣申屠嘉請誅錯景帝不聽目臨江王與鼂錯同罪一為之曲庇一徴之對簿何以服人心哉上與梁王宴飲從容言後傳于王目以傳位重事為戲言致梁王妄生覬覦啟寵召亂即剪桐之誤亦不可比類矣帝從袁盎言殺鼂錯以謝七國目錯之罪在欲自守然此際斷不可誅之至其贊畫縱不得為合宜然其識過明代方黄輩甚逺景帝既與定計旋為讐口所動斬謀臣以謝叛人及知其無濟而又悔之其識見卑鄙不更出建文下乎田叔等往治梁獄還盡燒獄詞空手來見目田叔案梁事雖云善處骨肉之間但所以致此者以君無能也太陽出而爝火自熄矣然使明季諸臣有一如田叔者亦何至三案紛争譊譊不已馴致亡國而後己哉史臣以周成康漢文景並稱注景帝之治逺不逮文而失徳之事屢矣獨其休息愛民尚不失䝉業而安耳史臣以之並擬成康未免失實武帝李廣屏居南山注霸陵尉呵止李廣所為盡官守之職者其論甚正不可謂醉言廣乃請而殺之器小骩法莫此為甚武帝英明似不應聽其出此射石之事鄰子虛以資名談可耳余以為不宜入正史詔諸侯王得分國邑綱主父偃建議分國與賈誼衆建諸侯之意同然叔世風漓䦧争兼并釁且益滋耳以張騫為大中大夫綱張騫由隴西而大宛而康居而月氏皆行數十日發譯傳致乃達其道均自東而西確然無疑者乃史稱大宛去長安萬二千五百五十里康居在大宛西反僅萬二千三百里月氏更在康居西乃止萬一千六百里是其行愈逺其道轉近理所必無亦鑿空荒誕之一証也以白鹿皮縁以藻繢為皮幣目皮幣即後世交㑹交鈔之所由昉盖欲以捄盜鑄之幣耳不知錢且盜鑄幣又不可盜造乎單于乘六騾目驢父馬母而生騾騾非塞外所有以驢非塞外所有也今騾至塞外率多倒斃而馬則塞外之良産古之匈奴即今之䝉古單于不乘馬而乘騾乃必無之事即此知史之多偽帝以列侯莫求從軍擊越㑹九月嘗酎遂坐以酎金輕及色惡奪爵者百六人目酎金已非善政以此隂中無應詔攻越者益可笑矣以李廣利為貳師將軍伐大宛敗還帝使遮玉門不令入貳師遂留敦煌注以求馬故惡少佐軍名不正已甚矣及至士卒饑罷引還乃遮之玉門外不聞有濟軍需思改絃之政徒聽貳師留敦煌是何籌策乎然武帝雄才大略決不如此史傳必有所闕大發兵出敦煌益發天下七科適及載糒給貳師目七科徴發中如有罪亡命雖不失自贖之義然皆未練之卒也至贅壻賈人市籍皆無罪者不㡬驅市人而戰耶欲以克敵定功難矣遣中郎將蘇武使匈奴綱蘇武奉使北庭慷慨誓死歴十九年凜然不少挫固足以風世勵俗然史家謬以齧雪餐旃詫為異事夫雪或可齧旃決無可食之理即偶一食之斷不能數日藉以不死是説殊失於誣即野䑕草食亦祇可茍延旦夕十九年之乆何以當之則所稱義不食匈奴之粟亦飾辭耳且武既娶婦生子豈得謂非大節之玷盖武不過不降不若李陵衛律之背君以曰竒節吾未之信李陵戰敗降單于目李陵恥為貳師屬役以及於敗乃甘心叛降所謂小犢僨轅破犁也司馬遷以為欲得當報漢其誰欺乎以是罪遷不為過當然遷恨武帝深矣其為史於武帝尚得有美事乎王賀為繡衣御史捕盜多所縱捨言吾活萬人後世其興注盜傷人者也縱一盜不知其害㡬何人而況萬餘盜乎如是而謂有隂徳史家之顛倒是非可知矣元皇后之出其家亦偶然耳然馴致移漢祚則賀殆罪之魁耳何嘉之有壺闗三老上書為太子據辨寃目太子而反天下大變也子盜父兵殺讒者尚可合戰五日何為者而壺闗三老上書辨其寃所謂亂民之尤彼必隂有以窺武帝略悔之意覷太子之復位居首功耳人情險􅇖吁可畏哉田千秋上變訟太子寃並稱夢白頭翁教臣言目千秋亦三老之見至謬稱白頭翁荒誕甚矣此武帝之信邪有以致之遂以為丞相不更可笑乎殺鉤弋夫人趙氏綱武帝雖鑒吕雉之禍而為此然非有人心者所忍聞彼吕雉之禍亦髙祖有以致之耳不思善處預防欲以隂毒為弭患之計謬矣上官桀為廏令馬多瘦武帝問之桀飾詞以對由是親近注上官桀以辯給免過耳武帝遂信之至於託孤宜其後日不終所事也然霍光金日磾豈非武帝特識之人乎故武帝所為大有過人者亦有大不可解者燕王旦謀反赦弗治綱燕王請入宿衛不臣之跡已著至連兵搆釁更當伏管蔡之誅乃曲赦弗治是霍光有公旦之誠欵而無公旦之才識矣眭孟上書言大石立僵柳起當求賢人禪位目眭孟伏誅罪當也宣帝官其子何為乎昌邑王有罪綱奉迎昌邑光倥偬不能慎始以致廢立滋事幸其所處得當為無過耳其時皇曽孫素有賢名使早諮訪立之何待丙吉奏記謀之不臧乃轉咎舊日師傅不舉之罪豈非辭遁宣帝大將軍霍光請歸政不受綱政自人主之政茍不幸遇冲齡大臣代攝長而自理其政可也無請歸之體況宣帝年已弱冠習民事宜自理無二議光請歸政名已不正讓而弗受豈非因驂乘之憚故為是假藉權術乎卒至釀成弑后之禍誰執其咎哉東海有孝婦被誣死致旱三年注孝婦固不可屈殺然致旱三年則誰為之且三年旱亦甚矣屈殺孝婦之太守本未即死而黎民饑餓死者不知其凡幾矣山川有靈必不為此是理本易知而紀載者欲神其事遂不覺其語之誣耳食者方以為美談予故表而正之賜霍光𦵏具如乘輿制度目霍光功徳固未如周公成王之賜伯禽之受論史者且非之宣帝可謂昧於經術矣賜膠東相王成爵闗内侯綱宣帝課吏可謂周詳然王成首以偽増戸口賜爵則知綜覈名實本不如王道之易行也以地震詔池籞未御幸者假與貧民目池籞假民與鄭僑乘輿濟人不大徑庭遇災而懼何如懼於未遇之前然較之不知懼者為己善矣龔遂令民賣劍買牛賣刀買犢目賣劍賣刀必有售者則仍郡民也使皆不售賣又何為遂之勞來務本固屬循吏予但惡史之飾辭封丙吉等為侯下至郡邸獄復作者皆受官禄田宅目宣帝亟亟修恩報徳乃至郡邸獄復作皆受官禄田宅細人感其私君子譏其鄙非君道也疏廣疏受請老賜金遣歸綱二疏請老用以風世之戀棧不已者則可然彼或豫知孝元庸懦不堪輔導是以見幾逺禍亦不過工於自計耳且五年纔通論語孝經安得遂謂之盡職而恝然求去帝及太子何必各賜如許之金今以其斤兩計之已逾千兩千金不易致太子又安得有五十斤之金以賜未卒業之師傅哉班史欲艷傳其事不覺措辭過當未可盡信也求髙祖功臣子孫失侯者賜金復其家綱賜功臣子孫固奬勲善政然酌給金復其家使奉祀足矣百三十六人人各與以黄金二十斤當值白金四十餘萬孝宣去武帝財賂衰耗時不逺安得如許帑藏為揮霍之費乎足徴其妄趙充國擊先零叛羌羌數挑戰充國堅守目充國緩於進擊或其時羌無大畧招撫䍐幵則其勢已孤可不煩兵而定使羌本桀黠勁敵有大志而乃自托持重不擊則適足為養癰之患䍐幵等且從之不暇又何能為充國用耶兵貴知時非可執一論也至其屯田十二事則誠古今不易良䇿賜潁川太守黄霸爵闗内侯綱黄霸治郡自不愧循吏至為相而功名頓損則趙魏之老滕薛大夫之謂也若嚴延年因其以鳳凰受賞心内不服及相府神雀來集欲奏復止或出附㑹之語然宣帝好祥瑞之失亦足見一斑帝告太子以漢家自有制度目宣帝此語失之甚矣周非用徳教而亂政以不善用徳教而亂耳雜霸之言豈所以訓子孫至既知元帝柔懦不勝神器而復優游寡斷所謂為天下得人難之義安在且淮陽王亦未必即賢與兄與弟惟父所命乃更以讓爵之元成為淮陽中尉欲以感喻淮陽王是不益啟其覬覦之心乎蓋大本既乖措施必無一是者呼韓邪欵塞目時黄霸之言頗得體而宣帝聽望之議待呼韓邪以不臣之禮失威重矣姑息者率以望之為是荀悦以非禮闢之宜哉元帝𢎞恭石顯誣奏周堪等請召致廷尉帝不知致廷尉為繫獄可其奏後令出免為庶人目不知廷尉為獄已屬惛愚既知而出之獄又聽讒以免為庶人元帝之為人可知矣罷珠厓赦廣徳皆小節耳何足稱哉賈捐之以數短石顯不得官乃與楊興謀詭為奏薦顯捐之又自奏薦興顯聞而發其謀捐之遂棄市目捐之朋比為奸自貽伊戚短顯薦顯尤所謂授人以戈不智之甚者子輿氏所惡於小有才尚非其比興亦傾邪小人熱中躁進其後雖諫封王氏實不足盖其前愆耳馮奉世論擊叛羌羌三萬人法當倍用六萬人目奉世所陳頗為明決至謂用兵之數必計敵而倍之欲以兩人制一人不堪一噱白登之圍冒頓精兵四十萬法當用八十萬倉卒何由而得陳萬年嘗戒子咸注父與子語至夜半且明云大要教諂此誰所傳者或美咸為直臣予謂定非孝子封甘延夀為義成侯賜陳湯爵闗内侯綱甘延夀等之薄康居斬郅支可謂得臨敵機宜彼雖矯制發兵前既上疏自劾後亦未嘗貪功喪師其事固當奬也乃一時口説妄騰後世習而不察往往於汲黯之矯詔發粟則傳為美譚於此則過為吹毛求疵惡勞喜得人之常情盖可鄙矣太子驁臨中山王䘮不哀帝大恨史丹以預戒太子母哭泣感傷陛下為解注史丹詭奏或美其能全嫡嗣然成帝繼而新莽之篡定矣所謂安劉適足以滅劉且不泣與不哀大相逕庭元帝懵懵以數言而解置之不問盖天欲中衰漢業有非人力所能為耳成帝王尊劾匡衡張譚知石顯等專權阿諛不奏及奏反言先帝任用非人目王尊數言所謂誅衡譚之心譚故碌碌衡乃明經者不大負所學哉劉向以王氏權位太甚因奏洪範五行傳帝心知向忠然不能奪王氏權目心知之而不能奪在他人皆可言在為君者實無是理也賈讓論治河三䇿目賈讓以放河使北入海為上䇿然西薄大山固可不致汎濫至東薄金堤此堤將以何地為限且既有堤又豈有久而不潰者居今之世雖大禹復生吾知其無善䇿亦不過補偏救弊耳哀帝大赦改元太初綱自眭孟翼奉好言隂陽災異而圖讖符命之説興然劉向谷永之倫早有以啟之矣馴至甘忠可夏賀良輩踵之新莽遂借以簒漢左道之誅其可貸耶下司隸鮑宣獄綱丞相官屬不法司隸鈎止職也乃不問孔光反捕從事倒置已極在孔光固不肯自劾以免宣罪但彭宣素稱賢者又為御史大夫而有意脂韋以閉距詔使曲為周内鄙矣馴致舉幡太學儼如聚衆當時之政尚可問哉烏孫大昆彌來朝綱漢哀短祚國勢衰敝試思當時為何時適㑹昆彌内難偶爾入朝自以為榮不亦鄙哉孺子嬰王莽請璽太后不肯授目莽之簒弑元后實釀成之觀其受新室文母之號恬不為怪已可概見至是乃拳拳一璽蓋亦掩人耳目之為耳班彪謂婦人之仁猶不免為其所愚新莽附太皇太后王氏崩綱莽既篡位漢統已絶元后宜書漢也然莽之篡漢皆元后有以成之則元后實漢之罪人綱目去漢字義深哉收郅惲繫獄綱莽篡據已踰十載惲乃上書欲其復還臣位豈特説不能行亦失徘徊觀望矣適其時郡國兵起莽心内不自安又因經讖之言奪其所恃惲之幸免亦幾希耳然以視文飾符命紀頌功徳者則所謂鐵中錚錚者矣秦豐起兵莽問羣臣方略徴公孫禄與議目易曰樞機之發榮辱之主公孫禄身為漢臣乃因莽召問就徴與議非以漢臣盡忠於莽乎論者但責其失出處語黙之道猶膚見耳淮陽王元鄧禹進説光武以定天下之計目鄧禹進説極似韓信登壇之對不過數言而成敗之勢了然其識有大過人者所云延攬英雄務悦民心雖草創要語然帝王治世之道誠不外知人安民而已光武斬王郎得吏人與郎交闗文書㑹諸將燒之目光武平王郎燒謗書胡寅以為意師髙祖封雍齒然髙祖因沙中偶語以張良之䇿用權弭變光武則不因贊勸出於㡬先以視髙祖雖大小不倫而精麄有間矣後漢光武帝儒生彊華自闗中奉赤伏符目世以光武信圖讖為非然時承喪亂衆志未齊出險濟艱自不得不假神道以設教耳此不足為盛徳之累觀後竇融之言可知向亦作論及之鄧禹以饑卒邀赤眉戰輒不利目韓信背水之戰何嘗非置之死地而後生哉禹異之敗其必有致敗之由謬以饑卒儌戰為禹罪則是不知兵機而貽畏難選懦者流以口實矣謂禹為忿兵無成或庶㡬耳彭寵反其奴子密斬寵以降帝封為不義侯目髙帝斬丁公固千古正義然子密雖寵之逆奴而寵實國之叛臣興王之際削平渠醜不得不行賞為招徠殷義士周頑民其事可反例也然封侯則已過而又號以不義是誠何據耶帝聞耿弇為張步所攻將自徃救陳俊謂弇宜待上來弇言不敢以賊遺君父乃大戰破之目不以賊遺君父非獨忠忱懇到亦足以振三軍之氣明王守仁擒宸濠事跡雖相類然正德直以賊為戲又豈宜從不可以臨淄為比也任延為武威太守帝戒以善事上官延以忠臣不和和臣不忠為對注善事上官固非正論至謂忠臣不和和臣不忠語亦有訾協恭和衷固虞廷懋政之經和而至於朋黨營私則不可耳晏子和同之辨頗當盧芳請朝及昌平止之芳遂疑懼復反注降渠請朝何必却之致生疑懼而復反大約無定見而遲疑不決斷無有能成大事者太子嘗問攻戰之事帝言此非爾所及目隴蜀既平與天下休息宜也至云孔子不對問陳似欲使太子不知攻戰之事者英略如光武必不出此審然則周書克詰戎兵之訓為非乎史氏蠡測安能識中興帝王之大度哉梁統請更定律綱刑罰世輕世重要以弼教為本梁統所言固未及此而杜林矯枉過正亦失刑期無刑之意至云菓桃菜茹之餽無妨於義則陸䞇所謂鞭靴不己必至金玉之言反謂不當乎梁統論漢自初元建平後盜賊浸多以刑輕易犯目髙祖至孝宣葢因初開國民少而風淳又數世皆權在上政治清明元成以後太平既久民滋而風漓又數世皆權在下政治日壞此盜賊之所以浸多也梁統之言所謂舍其本而求其末矣帝詔州郡檢覈田户吏牘中有河南南陽不可問語東海公陽言河南多近臣南陽多近親田宅踰制不可為凖帝使考實果如所言目光武英明起自田間一切利弊知之悉矣可問不可問之語豈有不知待十二嵗之子言之之理此必史家以明帝英察謬以不近理之事贊之耳予以為不足信詔許羣盜自相斬者除其罪目揚湯止沸一時權宜大亂之後或可承平之時行之必致亂不可為訓也南單于欵塞議者謂不可許目單于搆難自分南北欵塞何不可許而議者紛紛欲拒之彼不過持不開邊釁之説耳不知能自强者外侮不敢窺不能自强者雖謹守而外侮亦將伺其隙増幣和親損國威重而反以為得計者可謂强顔矣遣馬援征武陵蠻綱趙充國平羌馬援征蠻皆屬老而益壯乃充國卒以成功而援不克集事是豈時命為之抑亦逺猷勝算援固有不逮充國者至於身攖瘴癘以死勤事鞠躬盡瘁之義實為無愧胡寅乃謂馬革裹屍幾於馮婦若然則臨陣䑕竄者將謂明哲保身乎不獨刻論直是庸談馬援征蠻失利帝使梁松責問目梁松與馬援有隙光武宜知之乃以援兵失利遣松責問使非宋均平羣蠻則援陷無辜如國事何帝葢未之思耶桓譚極言以䜟決事之非目桓譚始以鼓琴進其所謂文學者葢亦可知然其論符命則甚正光武以為非聖無法㡬致大戮實過甚矣明帝圖畫中興功臣於雲臺綱雲臺圖畫皆中興佐命之臣然其中竟有功績未著而得厠名者萬修劉植等是也世徒以不入馬援為因椒房之親然當時若鄧晨之首從南陽來歙之捐軀隴右曽不得與王常李通並預増益之數又豈皆以戚屬故耶則當時之旌表實有不服人心者矣帝以事怒郎藥崧以杖撞之注明帝杖撞藥崧入牀直令人噴飯宋均為九江守虎皆渡江東去目劉昆既稱虎負子渡河宋均在九江虎又渡江東去善政亦視感民何如耳豈有於虎史家侈談相襲令人致疑循吏之實政其誰之罪耶馬后言諸王封域過儉帝謂我子豈宜與先帝子等目馬后固不宜請子封而明帝之對亦有失言何則分封已非善政多給更為亂階婦人不得預朝政以是斥之雖罪后可也至云不宜與先帝子等此尤失之帝王之業固欲其世世承繩以至萬世使世世皆行此言必至於無子男之爵立錐之地而後可此則明帝好名矯枉過正之論不自知其蹈於不可循矣故曰雖小道必有可觀者焉致逺恐泥章帝時大旱鮑昱因言前治楚事恐未當其罪注昱典治楚事既知寃者過半當時何不即奏而隠忍隔十年因災變始及之以是為直其誰不能鄭衆奏耿恭單兵守城鑿山為井煮弩為糧以當匈奴宜蒙顯爵詔拜恭騎都尉目鑿山煮弩與蘇武吞氊齧雪同節然以之表忠則可以此為足延累月經年則不經至漢家典屬都尉之拜未免失旌功勵節之義矣太后詔不許封諸舅爵注我子先帝子之論具見前巻馬后此語實明帝好名之意有以啟之至馬后謙讓實足佳然母后而有此詔究所謂好事不如無也封馬廖等為列侯綱章帝當成母后謙讓之徳斯為真孝曲封外戚以致明徳有長恨之歎盡小節而失大義不但可鄙且可怪矣豈當時史氏亦不無過甚之辭耶詔賜民胎養榖戒俗吏矯飾綱句踐早婚嫁重丁男盖小國圖霸權宜之術非王道也戒俗吏矯飾足矣天下之大比户皆予以胎養榖三斛何以為繼孟子盡信書不如無書之言盡之矣第五倫自言曽却千里馬之餽而心不能忘又兄子病夜十往退而寢安己子病不省視而不眠竟夕注倫此言直令人噴飯而史氏方以為誠直吁亦竒矣竇憲殺都鄉侯暢太后使憲北擊匈奴以贖罪綱不問匈奴應擊與否但以憲請贖罪遽令行師此舉實為無名和帝聶尚代鄧訓為校尉欲以恩懐諸羌乃招迷唐使還居大小榆谷迷唐遂與諸種復冦金城塞目鄧訓得諸部心由張紆失信之後能以恩威服衆也聶尚專事招徠適以示弱以致迷唐復叛以姑息為禦外夷良計者亦可以鑒矣魯恭為中牟令螟不入境兒童不捕雛雉注循良自貴實政飛蝗越境兒童不捕雛雉未免誇誕失真與虎不渡河何異耶鄧后令禁郡國貢獻注郡國貢獻本非中壼得預之事今鄧后乃以禁絶見稱足以覘漢家制度矣安帝封鄧隲兄弟為列侯隲辭不受綱鄧隲於侯族中尚稱賢者然後為大將軍本無大功王主以下候望於道光震都鄙又何為者則此辭讓亦不過矯情好名之舉耳不可謂真賢也諸羌復叛綱諸羌苦豪右徭役是安插既已失宜至叛無器甲而郡縣方畏懦不前漢家之政可知矣欲不亡得乎以災異䇿免三公仲長統著昌言以論其失注既為三公於宦戚擅權鉗口戀職非不能燮理而何然專以災異諉之則誠過舉長統説猶未備司空周章密謀廢立事覺自殺目清河之立雖太后之私然章為大臣争之可也争之不從合外廷共立平原王可也無密謀誅人及廢后之理其心雖近忠其蹟實為亂非人臣正道劉友益謂其死自取當矣羌冦河東縁邊令長争上徙郡縣以避冦難目百姓不欲徙乃至刈禾稼撤室屋是較羌禍更慘矣然其時安帝未必知也為人上者觀此而不思明目達聰詰戎勤政可乎班勇議置西域屯田注班勇所議乃襲超留屯疏勒遺䇿然其時虛耗特甚勇説本難盡行雖後屯田栁中復通西域為不出勇所料然河西被害實亦有所由也鄧太后臨朝每躬自減撤以救災戹目無毁無譽婦人之道躬自減撤以救災戹豈女后之事耶且前稱太后以鄧康數諫宗門滿盛大怒免官此又稱太后詔康等以貴戚食禄面牆弗學為戒記載自相矛盾至此何以傳信評鑑闡要巻二
