body:
  text: 宋神宗邵雍散步天津橋上聞杜鵑聲因言天下將治地氣自北而南將亂自南而北注史䇿所紀宰臣北人南人皆互有賢否豈獨一王安石古稱立賢無方顧所以用之耳至地氣北南遷移謂有闗治亂尤不足信果如所云未聞郅治之世南方皆堅氷沍寒也盖地氣視人氣之盛衰是時洛陽生聚蕃滋人氣極盛故地氣因之而變花木禽鳥亦隨地而異即如深山窮谷氣每先寒通邑大都候常多燠此可為徴矣若夫禽鳥得氣之先不過如鳩鵲呼鳴預占來日晴雨安能於數年之久明示前知乎雍精於術數或假杜鵑以寓言然術雖精而理實乖矣滕元發對上言君子無黨注滕元發此言簡而中理勝歐陽修朋黨論遠矣韓琦疏論青苗法帝諭罷之趙抃請俟安石出安石抗章自辯帝為㢲辭謝目安石抗章神宗㢲謝成何政體即安石果正人猶尚不可而況不正乎嘗謂神宗之信安石有若病狂此亦宋室治亂安危之所闗有非人力之所能為者至趙抃素稱骨鯁寧不知新法病民何未聞出一言以救正及神宗因韓琦奏諭罷青苖機有可乘抃仍請俟安石之出是誠何心迨後悔恨求去所謂啜其泣矣何嗟及矣議者以更戍法兵將不相識緩急不可恃乃部分諸路將兵總𨽻禁旅既而分置將副目宋祖親歴行間習見五季積弊開國之初即定為更戍法使習勤苦均勞佚將不擅專而兵無驕惰立制最善乃無端盡改舊章分置諸將糜廩禄而長恬嬉毫無裨於實用神宗專事更張而不計可否名曰整軍政而實日益廢弛甚可笑也帝問政令得失蘇軾對以求治太急聽言太廣進人太鋭目求治太急進人太鋭深切神宗之病至於聽言太廣之論尚有未中肯綮處盖神宗之失不在聽之廣而在廣而不得要領熙寧之政惟以信任諞言不能衷之輿論正患聽言之未盡其道耳廣諮博訪豈足為累乎王安石與程顥語王雱囚首跣足攜婦人冠以出注安石雱父子濟惡固君子之所棄然囚首跣足攜婦人冠以見其父於對客之時此或出於惡皆歸之之口未免已甚且安石乃偽為名髙之人亦豈肯容其子如是哉四月朔日當食帝自三月即避殿減膳及是雲隂不見王安石進賀言聖徳所感目日食推測可知然自屬天變敬謹修政可也避殿減膳乃至一月得母沽名過甚至以隂雲不見為徳所感而君臣相賀益可鄙矣河溢夏津帝以調夫壞産欲聽所趨王安石言昨修二股費至少而田皆出因置濬河司用鐵龍爪濬川杷法目并注神宗恤調夫之壞産而不顧河决之占地狃於小而忽於大可謂惠而不知為政安石持議濬河意非不善乃以費少利倍為辭絶不計及民生利病則乖立言之體矣至鐵爪木杷諸法人皆知不可用安石必主其説而力行之葢好竒而愎不恤人言孟子所謂小有才未聞君子之大道而已向陳世倌曽以混江龍之法入告欲以疏雲梯闗以下黄河之淤知其不可故不用也帝言古者什一而稅王安石謂古非特什一又三司増吏禄皆謂禄厚則人知自重目什一而税方冊可徴而謂古非特什一是知聚斂之臣必恃覆邦之利口遂巧説以亂經而無所忌憚至剥民財以増吏禄欲使人知自重可以省刑尤為謬見不思墨吏之所以病民者以其貪得無厭也即加之禄其貪猶是及其既犯而繩之以法庶㡬懲一儆百乃豫竭萬姓之膏以充百司之槖何異畏猛虎之噬人而先剜肉以啖之乎遼女真部節度使烏古鼐卒綱金源肇起東方與本朝滿洲之地同一疆域如完顔為金國族至今𨽻我旗籍而今之傅察氏即金蒲察轉音此其明證也間考史冊所載金語與今國語類多脗合第音譯傳訛遂至岐舛而元人所著金國語解一篇又多臆度失真如勃極烈即今貝勒為管理衆人之稱乃解為猶漢云冢宰附㑹無當至猛安音近今明安明安千也與千夫長相協謀克之為百夫長義實難通或即今語穆昆為族長之轉猶可比合若以按出虎為金與國語愛新迥不相類而金國語解復有金曰按春之文則又與今耳墜語同亦與金無涉不知何以蹖謬若此盖金朝所製女真大小字未經流傳中外而又未經譯以漢字其後裔式微遂無從考證不及我朝國書審音辨字之精詳足為同文準的耳夫各國各有其語各有其字我滿洲與䝉古一字一音即盡其一字一音之義從無一音而有兩字以至數字惟漢字則一音有多至數字者於是以漢字譯清字者得以意為愛憎每取惡字以示見貶不但於異國異字用之即於同一漢文頗有用是為抑揚者矣此倉頡造字所以有鬼夜哭之語也然漢自漢而清自清以漢譯清原非本文庸何傷乎若求其音之正則必當用今之三合音字庶為不失本來而三合音字非人所能盡曉兹因批閱通鑑輯覽思金史成於漢人之手於音譯既未諳習且復任情毁譽動輒以醜字肆其詆訾如烏珠之必書以兀术之類不可枚舉而貝勒或訛為勃極烈或訛為孛堇實可鄙笑我國家中外一統治洽同文不忍金朝之人名官族為庸陋者流傳所誤因命廷臣悉按國語改正其舊名仍注於下以資㕘考使讀史者心目豁然不為前人謬妄所惑特於初見處發其大凡如此蔡確自諌院為㕘知政事皆以起獄奪人位而居之目蔡確劾罷他人而即居其位以鷙賊之性濟其覬覦之私視禦人而奪之貨罪又甚焉確小人之尤固無足深責乃神宗每於其論劾即去其人而以其位授之一之為甚乃至再三不亦懵乎李憲乞再舉伐夏帝言唐平淮蔡惟裴度謀議與主同今不出公卿而出於閹寺注西夏之罪浮於淮蔡廷臣乃無一人效裴度贊成謀畫者且謂諸將非有光顔愬比其憚於行師阻撓不遺餘力宜神宗有不出公卿而出於閹寺之誚也公卿既無足與謀轉以閹寺能盡心而任之國事未有不日壞者明崇禎之亡國正復坐此然其時之公卿亦足見無一有人心者矣帝有疾詔立太子煦太后隂勅中人梁惟簡妻製十嵗兒黄袍密為踐阼備中人内侍安得有妻且十嵗兒袍宫中豈不能製史家不過欲頌太后撫幼帝之美而不覺其言之過甚而謬矣哲宗徐積事親孝以父名石終身不用石器行遇石避而不踐目嘗讀宋史至徐積傳而歎史筆非難史識尤難夫以父名石而子不踐石為孝則公子地之子當舟居而不履地乎且大孝莫如舜不聞其見瞽目者輒拜而積乃以不用石器與避不踐石稱豈非累積之大者乎觀其讀孝經輒淚落不止雪夜伏墓側悲慟嘔血乃本於天性之自然彼遇石而怵然傷心雖亦出于至性而作史者於不合經常之行則當從刪向曽為文以正其失兹特舉示之使天下知史筆非難史識為難耳吕公著當國羣賢在朝以類相從遂有洛黨蜀黨朔黨之語目從來黨援門户之習率由君子小人互相攻訐如薰蕕氷炭氣味自爾差池未聞正人同處亦彼此分標樹幟者若洛蜀諸黨實可異焉其始不過小有爭執積不能平漸至岐異揆之聖人和同羣黨之説均未有當也余嘗作宛轉曲論同室操戈之非有云顧厨清流禍自取程蘇何事相爾汝不能不為諸君子致詰耳帝御文徳殿冊立皇后孟氏太皇太后語帝斯人賢淑惜其福薄目史家紀宣仁之言以為孟后前後廢立及隆祐播遷張本夫異日之事宣仁非有神術先知何以識其然哉且宣仁若果先識其然則世家女百餘人中豈無一福徳兼全者而必用此福薄之人以成異日之禍何為哉大臣奏事但取决於太后帝有言或無對者惟蘇頌奏后已必再禀帝注諸臣奏事皆取决太后帝有言或無對者惟蘇頌一人為帝所重則司馬光吕公著諸臣皆有不得辭其咎者而異日親政大反所為馴致於亂哲宗固失徳然其所以致是者亦有由來矣太皇太后因吕大防等問疾言公等宜早退目以宣仁之賢意其彌留之際必深囑大臣公忠體國以輔少主即慮哲宗他日之蔑棄老成更張新政則當并召哲宗面諭之以防微杜漸之道克全令名斯為合理乃對諸臣丁寧嗚咽勸以宜早引退是全為私絶不類其平日之所行矣諸臣非不明大義者尚何忍洩之於人傳之於後且隠然啓人以阿附之嫌哉是盖出於史家傅㑹之説不可信也章惇使林希典書誥逞毒於元祐諸臣且許為執政希遂極其醜詆目黜陟褒貶權出自上宣達意㫖本不煩縁飾多辭唐宋儒臣草制或溢美以市諛或醜詆以洩忿或且公受餽遺謂之潤筆褻王言而辱國體莫此為甚相習成風恬不為怪如林希之肆行誣詆敢於隂斥宣仁則又小人無忌憚之尤要之所以致此則當時為人君者豈能辭其責哉帝聞有夏冦笑言深入吾境不過十日勝不過一二砦須去已而果破金明引退目當疆場有警之日運籌早定原無事張皇夏人大舉入冦素未聞備禦之謀則臨事豈宜漫無籌畫哲宗乃泰然談笑自如轉以覘敵退兵自伐㡬先之哲而史家亦若有褒辭夫金明淪陷所失實多冦警幸平國威已損亦何足取乎吕大防徙安州帝語其兄大忠言執政欲遷諸嶺南朕令處安陸大防樸直二三年可復見目哲宗稱大防樸直似為知人何妨即行黜陟而必語其所親如臣下委曲私致意者然不大可笑乎置看詳訴理局綱元祐初置訴理所凡神宗朝得罪者悉皆超雪未㡬而置看詳局復翻舊案株逮㡬及千家倐忽之間波瀾反覆固羣小搆陷所致亦由諸正人迫不及待當宣仁聽政時急反熙豐之政使奸徒得以藉口若稍知審顧一切白之哲宗而後行或俟親政後次第申理則小人何所騰其簧鼔至崇寧即位彼此效尤滋甚黨禍遂成一時清流㡬盡小人固不足論而所謂君子者母亦恩怨太分明其致禍不亦宜哉徽宗魏漢津獻樂議用夏禹以身為度之文取帝指三節三寸為度定黄鍾律目吹竹絫黍自伶倫置律以來未之有改漢津庸妄誤解夏禹以身為度之文輒用帝指寸節短長裁為律管夫人之身體短長不齊將易一帝即易一律乎一時君若臣無能辨其誕謬方詡鑄鼎制樂突過古人多見其不知量也九鼎成奉安於九成宫鼎各一殿帝行酌獻禮至北方寳鼎忽破或言北方亂兆目并注在徳不在鼎今古不刋之論即禹鼎果傳於後亦不過一尋常古器耳秦皇使人没水求之已為愚陋徽宗乃自行鑄造設立多名益荒誕不經矣至酌獻時寳鼎忽破或鍊冶不良所致若竟以為北方亂兆則不免附㑹可笑試思妄作之器何所闗係而鄭重視之乃爾耶陳禾奏劾童貫黄經臣罪帝起禾引帝衣衣裾落内侍請易衣帝言留以旌直臣目折檻牽裾紀載家共傳為美談夫檻不治猶可也衣無裾其何以服御且既知旌直則何不去奸況不旋踵而禾乃以狂妄貶謫則此舉之矯飾無味更不待言金人來聘綱是時宋政雖衰國體未損書法於來聘諸例自當仍從續綱目原文至靖康以後稱姪稱臣㡬與石晉事遼無異既自失其一統之尊豈可復拘内外之説則宋在所應貶改書正所以深戒建中立極者慎毋失其統也京師茶肆有大犬蹲榻旁近視之則為龍兵士取而食之大雨七日始止目龍本神物變化屈伸往來皆得自由若為犬而溷於市肆至人將取食尚不能騰拏而去所謂昭昭之靈安在既已非龍又安能為害水潦之災或㑹逢其適耳此與洛陽黒眚及女子生髭皆不足盡信夫以徽宗昏亂即無災異亦必亡國作史者因宋運日替遂據一時訛言以為五行災異之徴亦好竒而不知失之誣矣時欲㑹金攻遼鄭居中以為造釁非計蔡京言上厭輸遼嵗幣注禦邊而謀及嵗幣已屬操縱由人無能可恥但遼宋自澶淵講好以後嵗幣交納百有餘年未聞以五十萬之多國用遂形匱乏而燕事既起科斂繁興計口出筭之六千二百萬免夫錢之一千七百萬與五十萬孰多孰少乎又況遼幣雖廢金幣旋加所為五十萬者仍在復益以代税一百萬緡厭多費而費轉多是失算之中更為失筭而危亡之患即因之以興爾時君若臣尚自詡為得計誠可笑抑亦可憐矣始遼使至宋率迂其程宴犒不侈及是金使自燕七日至都張宴又盛設以誇富盛金人益生心注守國自有正道不在迂程與示儉也況金與宋是時釁端已成即盡以待遼使之法待金亦不能消弭後患且宋稱㑹兵圖燕宋何嘗致兵力而欲坐享金人所得之燕金豈肯乎遼國既亡宋實自取唇亡齒寒之禍其事勢更不待卜之異日且金人即生心亦生心於宋之江山社稷錦綉金玉固在其中矣史家乃以使至之速張宴之侈為受病根由所見怯而且迂誠可笑也金人南下宇文虛中言今日宜先降詔罪己帝即命草詔目平日不能持盈保泰及國步已危而欲以虛言感動天下於事何濟唐時奉天之詔聞者感泣亦未免史家右陸贄之言宋則積衰既久如癰疽之瘍業已大潰而欲望刀圭一酌收效須臾固必不可得之勢也欽宗宰執請帝幸襄鄧李綱力持堅守都城之議帝問誰可將者綱以白時中李邦彦對目汴都戒嚴白時中輩皆欲委棄而去獨李綱力主堅守之説持義頗正及欽宗以命將為問綱意中豈無一二禦侮之材可以陳薦者且目撃君父之難亦何妨慷慨請行乃漫以時中邦彦為對綱寧不知二人之庸懦無能尚欲冀其盡職盖由心嫉二人故不覺欲置之死地以觀其僨事然時危論將不宜復參平日好惡之私綱固純臣此則不能免責備之議矣种師道薦尹焞徳行召至京師賜號和靖處士遣還目於時外事方棘社稷危在旦夕宋室君臣不此之務而髙談徵隠之舉即果用尹焞亦何能救其播遷耶帝如金營請和金人言欲别立宋君去帝號何㮚喜和議成既歸都堂作㑹飲酒談笑終日目何㮚請率衆巷戰似知徇國之義者及從君出降親聞金將議欲另立宋主仍去帝號不能痛哭陳請以死力爭乃轉喜和議之成歸至都堂㑹飲談笑若有所慶幸者具如此肺腸之人而以為執政雖欲不亡得乎康王自相州帥兵萬人進次大名宗澤請急入援汪伯彦難之因移軍東平目康王聞君父之難亟宜投袂入援而乃聽信奸言濡遲不進坐視家國淪亡此與梁湘東王不援臺城何異宜乎南渡以後忍恥事讎貽譏後世也獨是康王出質金軍時當斡里雅布詰責而不為動似乎尚足有為何一旦恇怯至此豈前事云云固當日史官溢美之辭不足盡信耶抑直一庸人遇大事懵然不能出一言史遂謂之不為動耶京城廵檢范瓊逼上皇及后妃太子宗戚如金軍綱續綱目於此條作金刼上皇及后妃太子宗戚至其軍云云意在貶金不知金初未臣服於宋因宋人渝盟生釁遂至兵連迨汴城既破欽宗具表請降則遷其族屬乃伐國之常事於金固無可責而范瓊身為宋臣不能捍衛捐軀乃仰承金將意指陵逼其帝后猝就犢車舉族倉皇同為俘虜則瓊之為亂臣賊子實春秋所必誅舊時書法無當於予奪大義因改書之以正續綱目之失且示斧鉞之嚴為萬世昭公道云張邦昌僭位吕好問言大元帥在外元祐皇后在内此殆天意盍亟還政目王時雍等擁戴邦昌已甘心為僭竊之臣好問小黠乃首發康王正位之議且止金人之留兵通濟州之聲問得以漸杜奸謀其功固為可録但當議立邦昌時不聞好問畧為爭執而權門下省之拜又受其偽署而不辭則知後之所為非始終忠於宋盖覘知人心未厭宋故為急轉之機以避禍邀名所謂小人之尤耳髙宗帝問宰執何以處張邦昌黄潛善等言邦昌今已自歸惟陛下所處因封同安郡王目邦昌人臣稱帝僭逆顯然雖已畏禍自歸豈得原情廢法乃潛善輩心存左袒竟以金人所脅曲為解釋而髙宗亦復以異時金人有辭為懼非惟不聲罪加誅轉位以三公尊之王爵刑賞倒置皆由怯懦而成以致顔岐論奏公然請視金人所喜惡以為黜陟髙宗不過以己躬諷諭而不能示之顯罰其乘釁茍安無振作有為之意已可概見矣李綱論張邦昌僭逆及偽命臣僚帝頗感動責授邦昌昭化軍節度副使潭州安置目邦昌叛宋之罪髙宗寧獨不知乃聞李綱討賊之説猶必歴詢宰執豈真以其罪狀尚有可疑盖其始髙宗未嘗不慮邦昌挾可據之勢將不利於己故當其遣使奉迎時尚諭宗澤按甲觀變及邦昌身自勸進大位遂不勞而定髙宗非惟不較其僭逆之蹟且隂徳其擁戴之功則其終從竄放特因李綱執持大義知公論所在不得已而行之耳他日邦昌既誅旋即官其親屬雖欲藉以悦金而其隠曲亦從可見甚可鄙也時宗澤上疏請還京奏至適聞信王榛有渡河入汴之謀帝乃降詔擇日還京目前儒謂髙宗非不知和議之不可恃恐二帝果還於己有不利耳此言實洞見其肺腑觀李綱宗澤等屢請還京言之懇切而卒不見聴及一聞信王入汴即有擇日還京之詔於仇讐則甘心避之於兄弟則投袂爭之其忌刻出於天性乃知前論固不為過當也帝言黄潛善作左相汪伯彦作右相何患國事不濟目髙宗信任汪黄㡬如宣和之寵用京黼惟時可求劉豫相繼叛降李成劉忠共起為盜而河北山東諸郡縣多入於金皆事之顯而易見者乃因二人朦惑置若㒺聞聽其擅權恣横方自詡命相得人冀資左右輔弼之益惽瞀若此豈復可望其有恢復中原之志哉帝下詔罪已赦死罪以下惟李綱不赦盖用黄潛善計罪綱以謝金目李綱既退未聞金人因而罷兵則罪綱以謝金之説謬妄已可概見況前此顔岐論奏髙宗曽斥其非乃因潛善欲排異己遂從其説使綱不得與於赦令何其自相矛盾耶時久雨恒隂趙鼎上疏言王安石猶配享神宗而蔡京之黨未除時政之闕莫大於此目王安石蔡京變法流毒固宋室致病之由但至髙宗南渡以後宋之宗社朝不保暮其先務自當以講求軍事為急趙鼎乃謂時政之闕莫大於安石之配享未罷蔡京之黨未除實迂緩而不切於事即如其言悉舉而廓清之又豈遽能靖外患而維國本乎鼎固南宋名臣而此疏實不免書生膚末之見抑仍門户排斥之私耳韓世忠屯軍焦山設伏金山龍王廟合撃烏珠烏珠紅袍玉帶振䇿以馳既墜復跳而免目金山屹峙江心何能馳騎且烏珠是時志在濟江豈肯行次中流舍舟以臨險地致有疑當日金山與南岸相連屬者不知浮玉之名即取其無所附麗而樹影中流鐘聲兩岸唐時名句流傳蘇軾亦有阻風金山之作則山之不能通陸自昔已然方輿紀要因于金山下増對岸二字謂廟在銀山殊無確據況世忠屯戍焦山與金山銀山東西相距均逺登眺亦無所見其為傅㑹顯然惟王象之及熊克皆云廟在北固較為可信盖北固踞江南岸既得振䇿以馳而山居東北與焦山正直故可登之以覘虛實二人皆以宋人紀宋事自當得實非若宋史成自元時僅據傳聞而不詳形勢徒滋後世之疑議也至謂一人紅袍玉帶墜而復馳者即烏珠其説尤誕金源衣服至大定明昌間始酌用中國制度其初必無褒衣博帶之人況身臨戰陣安有服袍玉以從事者其為宋人誇飾附㑹無疑即此可證金山馳馬之荒唐矣桑仲請合諸鎮復中原吕頤浩命仲節制軍馬霍明疑仲謀逆誘而殺之目桑仲以羣盜就撫授官後尚屢為冦掠其請合兵收復京師固難必其果由忠悃吕頤浩遽從而假以節制殊為輕率霍明疑其謀逆誘而殺之旋亦被害無以証仲與明之孰為曲直舊史于仲有過予之詞果何所據而云然耶沂王㮙告二帝謀變金人按問無狀遂誅㮙目㮙身為俘繋固難責其誓志枕戈而值邦家傾覆亦當懷生還故國之念乃無端告變圖害父兄金人按問而正其罪深合春秋亂臣賊子之誅不特為宋族除梟獍而已也然宋族顛沛流離至此而尚有操室中之戈者則其家教人心從可知矣非徽欽之罪其誰之罪乎張浚以喪師落職劉子羽亦坐安置白州目張浚富平之敗心雖可原然失律之罰不可逭也至劉子羽以參軍枝拄其間既諫浚于未戰之前及浚屢欲退遁皆以子羽之言而止饒風之役亦不為無功朝議因其與浚同事並從貶逐殊失黜陟之平豈其前後參畫朝廷皆未之聞乎帝育太祖後子偁之子瑗于宫中封為建國公目髙宗擇立孝宗為嗣當時多謂付托得人盖以藝祖後不克享有天下人心頗有餘憾一旦見昌陵之裔復繼大統不覺溢美任情至以中興事業推許孝宗則實過矣孝宗雖承歡徳夀嚮學右文不過䝉偏安之業端處晏然而已中原侵地未能恢復尺寸而符離之役任用非人遂至一敗不振所謂中興者安在岳飛退喜之言盖出於史家過譽不足信也䝉古在女真之北唐為䝉兀部亦號䝉骨斯目䝉古地廣族繁部落不一我朝中外一統四十九旗咸備蕃衛而其外喀爾喀四盟長部分壤錯疆域犁然其在前朝則固各為一國也宋人記載大約得諸傳聞音譯既不免沿訛且以醜字為詆訾于是萌骨朦骨盲骨蒙兀䝉骨斯諸名錯見載籍音淆字舛實可鄙笑宇文懋昭乃謂金初伐之䝉古與元之䝉古為二國相去㡬千里不知今䝉古諸境延袤且萬里而遙金初伐之䝉古史亦言居金之北與元之始居隂山總屬朔漠部族或殊其實皆䝉古耳因證以今時典屬所司芟其猥雜之名以正譌而衷于是張浚遣吕祉奏事趙鼎每抑之帝言他日浚與卿不和必由吕祉及浚還鼎遂罷目史稱帝謂浚鼎不和必由吕祉若譽髙宗有先見者然夫三人者皆其臣也黜陟誰則司之而為此局外之論亦大可鄙矣浚遂因祉離間生嫌固不免意存袒䕶及其請攻河南請罷劉光世鼎皆不以為然實亦有心立異夫光世罪狀昭著不可云無故而罷且謂得河南而恐金人内侵豈株守臨安轉能保金之不侵乎二人尚具忠愛之忱者而各有所蔽宜其迄無成事也張燾使河南還帝問以陵寢狀燾惟言萬世不可忘此讐秦檜患之出燾知成都府目燾已疏言金人之禍及山陵髙宗亦何忍復問況永昌以下諸陵之暴露發掘前此方庭實奉使歸嘗備言之亦何待再問或責燾僅渾涵以對不能直陳其狀以激動君心不知髙宗始聞燾對而黙然旋以不容於檜斥使出外即使燾盡情實對髙宗亦且付之無可如何而已又豈能奮發雪恨哉馮檝言張浚須付以戎機帝言寧至覆國不用此人注張浚嘗屢出視師髙宗深加倚任自力諫和議以後遂爾見疎然所言雖與檜牴牾實乃心存忠愛何至疾之如仇寧覆國不用此人豈人君所宜出諸口者盖髙宗處心積慮久無意于中原非僅為奸邪所愚弄爾金烏珠以拐子馬來岳飛令步卒以刀斫馬足拐子馬相連一馬仆二馬不能行目北人使馬惟以控縱便捷為主若三馬聫絡馬力既有參差勢必此前彼却而三人相連或勇怯不齊勇者且為怯者所累此理之易明者拐子馬之説金史本紀兵志及烏珠等傳皆不載惟見於宋史岳飛劉錡傳本不足為確據況烏珠戰陣素嫻必知得進則進得退則退之道豈肯羈絆已馬以受制於人此或彼時列隊齊進所向披靡宋人見其勢不可當遂從而妄加之名目耳即所云馬被重鎧亦徒束縛而不能騁其騰驤之力尤理所必無紀事家或狃於兵車駟介之説强為傅㑹不足當有識者一哂千載傳訛耳食之徒無能究其真偽皆為史冊無稽之説所誤不得不明辯之張俊援濠劉錡勸退師據險不聽令楊沂中直趨濠州軍遂敗目俊懦葸無能心多猜忌其于劉錡固久深嫉之當金師克濠既不從其退師據險之謀及聞兵去又不信其嚴兵設備之説且阻錡無往遂至倉卒敗逃死傷枕藉欲邀功而適以喪師不聞問其失律之罪當時政令可知矣熙寧中嘗立程嬰公孫杵臼廟于絳州報存趙孤至是復立廟臨安目宋之于盾衰亦猶唐之于李耳然李耳猶謬藉其有元元聖祖之稱至于盾衰不過列國一陪臣耳有何華胄之足炫且是時兩宫未還陵寢未復顧沾沾于祚徳之廟以為追逺報功其所以為榮即所以取辱耳樂平縣田水直行髙數尺程氏井溢夭矯如虹穿牆毁樓二水鬭于杉墪目水鬭之文雖見於國語然穀洛二水本自㑹流或激而成衝突之勢類於相鬭理尚可通若田中之水聚而直行井水溢髙夭矯如虹則不經殊甚且水力安能穿牆毁樓哉史家無識傅㑹傳訛亦好怪而失之誣矣秦檜入朝施全遮刺之不中被殺目秦檜有可殺之罪施全非當殺檜之人其事固不必深論獨是檜奸邪誤國海内切齒所欲剚刄甘心者非止一全而髙宗始終信之而不忍去之後且畏之而不敢去之豈非天奪其魄乎巫伋使金首請迎靖康帝金主亮詰以何處頓放伋唯唯而退目巫伋奉使雖以請迎靖康為名及聞何處頓放之詰遂不能復對即此固足誅髙宗之心而伋實有以窺髙宗之意然則髙宗之首尾畏忌本因貪位茍安是以事讐忘親有所弗顧亦可鄙之甚矣帝欲防秦檜壅蔽因諭禁百官避免輪對目輪對固欲聞所未聞然聞之而不能行雖聞何益史謂髙宗避免之禁為防檜壅蔽不知檜之敢為壅蔽實髙宗有以致之果自知之則去檜亦在髙宗耳若其不能去則是太阿倒授綱紐懈弛既不能除巨憝以清政紀而徒為是令正所謂不揣本而齊末庸何益乎金主亮欲南侵遣王全至臨安授辭詆責以激帝怒復言趙桓已死目王全雖受海陵之命激怒宋人以為南侵計然此在金人猶可而全則本宋人也直呼其故君之名悖逆已甚而髙宗竟聽其肆謾隠忍不言庸懦委靡直是全無人心尚何以靦顔人上乎必不敢害之言早為海陵所料惟懷茍安而㒺知自厲無怪其終不能出人掌握耳評鑑闡要卷八
