body:
  text: 太昊伏羲氏始教民佃漁畜牧綱君民之道莫大乎教養伏羲氏作佃漁畜牧皆所以為養也而教即行其中後世視教養為二者去古逺矣炎帝神農氏始教民藝五榖目今之民即古之民古之民茹毛飲血初不知耕稼也後世視茹草木而食禽獸者幾如異類不知彼之去古猶未逺而已之反近於異類焉黄帝軒轅氏畫野分州得百里之國萬區目百里之國萬區依開方法應得積滿一萬萬里然考軒轅方行所至以今輿地按之則西不過肅州北不過宣化保安而東至海南至江幅員具在安得有萬區百里之國哉可見史家紀載率多恢張失實如禹㑹諸侯于塗山乃稱執玉帛者萬國亦此類也帝堯陶唐氏置諫鼓立謗木綱治道當以帝堯為祖今觀帝即位之始首以授時為重而即繼之以納諫後之臨民者宜知所先後矣越裳獻大龜又有蓂莢生于庭目聖人法天故天不愛道然帝之所以正四時而熙庶績乃本欽若之一心所謂在彼不在此也鯀作九仞之城以堙洪水訖無成功目九仞之城即書所謂堙也鯀堙洪水而績弗成禹決九川而民乃粒故治水之要隄防不如疏導此定論也若九澤既陂則止水耳向嘗有禹貢無隄字之句意正謂此第今古異宜以今日生齒日繁室廬櫛比之時衛民防險又在審變者神而明之且束水刷沙而正溜以深政宜寓濬滌於隄防之内比年淮徐河流頗覺順軌其明驗也治人治法可易言哉帝舜有虞氏帝作歌綱註疏家以為帝舜之歌先言股肱臯陶賡歌先言元首此君臣交儆之義似矣不知勅命二句即歌語乃歌者永言申歌之意耳臯陶之意亦廑於省成均發於自然而動於不容己謂其交相責難猶未免窺測也夏夏后氏大禹鑄九鼎綱禹鑄九鼎漢書及他紀載皆同金氏履祥獨據墨子之説以為后啟所鑄捨經傳而從子書非是至鑄鼎象物左傳猶稱近古胡氏宏乃以為圖九州道里貢賦夫道里貢賦何以稱象物耶盖好異逞臆之病紀事者所不免㑹諸侯于㑹稽綱祇台徳先之世即有不共命若防風氏者易所謂不寧方來後夫凶也後至之誅葢有不得已然周書曰其克詰爾戎兵以陟禹之迹亦可見大禹立政之大端矣后相遷于商丘依斟灌斟尋目商丘在河南而斟灌斟尋乃在山東青萊所為馬牛風不相及何能相依或其時來從王難耶然云相依則是藉其土地民人之勢也古史荒略鮮實可見一斑后少康相后緡生少康于有仍綱國之統繫於君春秋之義君在即大統歸之新莽書更始之年則天紀房陵之蹟皆此意也胡氏大紀以少康所生之年為元嵗足糾皇極經世之誤然是時夏之不亡其亦如綫耳商商王成湯禱于桑林以六事自責目應天以實不以文六事自責湯之至誠對天如此其致雨不致雨非湯所敢逆料舊説身為犧牲剪髪斷爪非聖人所為殊不足據王武丁得傅説為相綱髙宗中興令主然圖像傅巖之事致疑傷誕或當居民間時物色久屬特以起胥靡而作相恐人望未厭託之夢賚圖形所為神道設教而已君非髙宗臣非傅說如之何其可帝乙長子啟以母賤不立少子辛以母正后立為嗣目微子啟以母賤不得立使立啟殷何致亡後世立嫡之論觀此猶不悟者非愚而何王受辛西伯獻洛西地請除炮烙之刑目三分天下有其二以服事殷此文王之志也獻地請除刑與陳氏之以家量貸而以公量收之何異市惠行權似非聖人所為予不能無疑周武王作銘自警綱機銘口生㖃口戕口說者謂舊本脱字率以口識之之類予意不然易傳以言為君子之樞機樞機之發榮辱之主口生㖃者即所云起羞興戎是也口戕口者即所云悖出悖入是也他本所傳機有作几作机者不如大戴禮於本義尤為直揭若盧辯所註出令依几之説雖不過沿文索解其義亦通伯夷叔齊採薇有婦人曰此亦周之草木也遂餓死注夷齊不食周粟特謂義不仕周受禄餓死者亦云貧餓以死云爾古史考舉野婦之語竟似夷齊並不食薇以致餒死不免固哉髙叟之譏矣成王立大社土用五色凡建諸侯鑿取其方一面之土以為土封注普天之下莫非王土分土以封之是削土也苞黄苴白之說鑿哉穆王王西廵狩聞徐戎叛王乘八駿一日而歸目一日千里長驅而歸雖順風揚帆有所不能而謂馬能之乎盖馬之健者不過能行數百里其能千里而不疲者即良驥也後之務竒者並不識馬安能識良無怪乎其論之失實矣平王元年東遷綱蘇軾謂周之失計未有如東遷之謬此言誠然但謂平王若不遷以形勢東臨諸侯諸侯尚未敢貳此則不然平王本非撥亂反正之才并無奮發有為之志縱使仍都豐鎬亦惟茍安旦夕終於不振而已其能西却犬戎東撫諸夏乎且當時亦必有不得不遷之勢矣魯侯請郊廟之禮綱程子謂成王之賜伯禽之受皆為非禮其言葢引而未發東遷以後諸侯放恣因禮樂之賜而并及郊廟王室不綱從而許之則泛觴之失非自成王伯禽乎莊王衛侯朔出奔齊綱按史記宣公十八年納伋妻其年生夀及朔即於其年朔讒伋夀爭死是則讒者争死者皆甫生數月之子為情理所必無且宣公死後宣姜亦㡬老而左傳所云齊人使昭伯烝於宣姜不可强之而後生三男二女既已失節之淫婦又何待强而老婦連生五子又必無之事紀載家失實傷理莫有甚於此者故為之考證如右齊以管夷吾為相綱管仲制國大概本於周禮而行之以權便蓋限於時勢不得不然至山髙乘馬凖輕重而權榖幣儒者謂其漸開申商之學似矣然富國强兵霸佐之才所就固宜如是而已較之空談仁義流弊如宋襄者不更可嗤耶襄王齊桓公㑹諸侯于葵丘目孟子稱五霸齊桓為盛葵丘之㑹雖明其禁而内寵爭釁先自犯之盖無明徳新民之實徒修勤逺歸好之辭未有乆而不渝者是以仲尼之門五尺之童羞稱五霸所謂正而不譎亦云彼善於此而已秦人納晉公子夷吾于晉綱重耳夷吾前後對使之詞賢不肖相去固殊然重耳若無舅犯亦未必及此秦穆既以重耳為仁又聴公子縶之言先置不仁以滑其中卒之河外之城未獲韓原之師已興譎詐相傾無非為利春秋無義戰彼時之民奚以為生哉齊管仲薦隰朋于桓公注蘇洵以管仲不能舉賢自代責其不知似矣然仲之疾未嘗不薦隰朋而朋之才又不及仲縱不死亦不能去豎刁易牙開方況其死耶左傳記寺人貂漏師于多魚仲何不即于此時誅貂貂誅則易牙不能進而開方去矣仲豈見不及此毋亦慮桓公之不已聽而反聴貂以斥已耶所以為器小所以為霸臣晉隂飴甥盟秦伯于王城目隂飴甥之對秦伯實可謂善于辭令宋襄公敗于泓目愚而好自用者莫如宋襄其道古論今不值一噱宜乎子魚直斥之而彼尚不知羞也晉文公出亡反國目重耳周流列國賴五人者為之先後奔走已不過牟利酒色之徒而已獨其對楚子數語為有英氣耳假令齊姜阻從者之謀楚臣聴子玉之請何能卒反晉國其亦危矣晉文公請隧王弗許賜之田目襄王不許晉侯之請隧是已然但知名器之不可假而不知先王土地之不可棄彼時王綱陵夷位若綴旒徒存名器亦將安用之哉晉楚城濮之役子玉請戰楚子怒少與之師目子玉剛愎自用固有以取敗然傳稱楚子怒少與之師豈非惡其臣以及其軍而自僨乃事乎吾知申息之老不怨子玉而怨楚子矣宜無是理吁紀載家尚竒藻而失真實者盖不可屈指數讀書者所宜尚論識時也匡王晉趙盾弑其君夷臯綱匡王庚戌至甲寅五年之間宋齊魯莒晉凡五弑君較準噶爾之亂有過之無不及也定王五年河徙綱河至春秋始有徙盖其時諸侯各私其土或開鴻溝以東引或閼八流以自廣而河失其性不能復循故道所以徙也既徙之後嵗月寖久就下之勢自東而南豈能復歸於北而賈讓王横輩乃欲決遮害亭緣西山足載河髙地使北入海此誠大謬之論且河之入海必挾一大川與俱故于北則掩漳于東則侵濟于南則奪淮盖自禹時至今皆然治之者于所挾之川而利導之救其弊而不泥于古可耳一勞永逸言之易而行之難晉楚邲之役晉先縠以偏師先濟韓厥請荀林父同進目師克在和偏師先濟不和甚矣其敗可立待乃知其必敗而使諸帥與之同罪是以三軍之命分一人之謗也韓厥為晉臣之佼佼者何以持此説而林父竟從之至僨事敗績受戮宜耳士渥濁乃謂其進思盡忠晉侯從而免之其謬甚矣晉士㑹入聘王享之用殽烝目王室陵夷其不能守先王之舊者多矣乃區區于殽烝而守其禮不亦大可笑乎左傳于類此者多加褒語足知其見之囿耳簡王晉韓厥論郇瑕之地沃饒近盬令民驕佚公室乃貧目韓厥謂山澤林盬令民驕而公貧此雖沃土民淫之義然管仲不用此以霸齊乎亦視經理之何如耳靈王晉祁奚舉其仇解狐及其子午注祁奚之舉外内不避後世率以為賢然必舉者祁奚其人而所舉者又狐午其人然後可否則外舉務為名髙内舉徇于所溺藉口古人適以濟私又何取焉晉魏絳論和戎有五利目晉魏絳和戎五利與漢趙充國屯田十二事意同而辭亦類綘之語簡以該充國之語詳以盡然以言内弱而外强之時耳若夫知幾制勝能自樹立者固不可執一而論矣齊晏嬰不死崔杼之難目晏嬰固有可取者然既與盟又游其詞光雖失徳獨非其君哉如云不與其禍為是則太史氏之書為非歟衛甯喜以復衛侯告蘧瑗瑗從近闗出目不敢聞君之出遂行不敢聞其入亦遂行伯玉固賢乎則長樂老亦不可謂過矣齊莊公故臣盧蒲癸有寵于慶舍舍妻以女癸之攻舍其妻與謀目阿睦爾撒納所娶徳勒克多爾濟者達什之女而阿睦爾撒納之妹庫克又為達什子諾木庫之妻當阿睦爾撒納欲吞噬達什部落誘而殺之徳勒克多爾濟及庫克皆預謀此與盧蒲姜情事正同則是春秋列國之人已有準夷衰世之行矣景王吳季札歴聘諸國目聞樂知政不過於聲容之際得其想像而已何季札觀樂歴論不爽分毫然此猶事後之言至其聘諸國交納名卿料事㡬先若合符契語多傅㑹左氏所以失誣也郯子言少昊時鳳鳥適至故以鳥名官目命官分職隸事正名唐虞周官近而可徴固未嘗有紀瑞之事也左氏浮誇於此可見一斑泥而師之如武曌定署名徒滋千古笑柄彼不能紀逺之説曷足為定論耶鄭禆竈請用瓘斚玉瓚以禳火子産弗與亦不復火目子産拒禆竈之請實經國正論多言或信不與亦不復火足祛千古信邪之惑許男飲太子止之藥卒目止之進藥必有不敬誤投之咎非啻不嘗而已然其心終無他故其罪止于是三傳所載不同而子髙聴止赦止之説尤屬迂謬嘗因讀公羊作論正之敬王齊魯夾谷之㑹孔子相齊侯懼獲過于魯歸侵邑以謝魯目夾谷之㑹㑹也非盟也左氏傳所載載書之詞及以萊兵刼魯侯語多附㑹不足信如稱盟詞齊侯要魯以三百乘而魯侯惟求返汶陽之田然田既歸矣何以終定公之世不聞魯以三百乘從乎即所稱齊侯懼而動獲過如何云云此不過成毛遂歴階藺相如完璧之伎而已豈所以語聖人哉吳城䢴溝通江淮綱此淮通江之始吳開䢴溝不過為伐齊計至今遂資轉漕行水之益事固有創之者受無道之名因之者收不費之惠若此也元王越范蠡論用兵目范蠡陳䇿本諸黄老所為後隂先陽近柔逺剛説自竒特然不善用其法而徒襲其跡烏足以語行師哉貞定王晉尹鐸治晉陽請為保障目繭絲保障千古不易正論然以姑息為保障則養奸廢事多矣威烈王魏田子方貧賤驕人之論目貧賤驕人實啟䇿士囂陵之習是時諸侯各以得士為重而士因得以窺其間而把持之顔蠋蠋前王前之對亦同此術然求者應者皆不過為富國强兵機械變詐之徒耳豈可與闢門延俊同日而語哉烈王齊侯封即墨大夫烹阿大夫目毁譽已不可憑於左右即使人往視若所使者更為欺又當如何舜之明目達聰未必若是然稽實績而立明賞罰自非庸君所能及顯王魏公叔痤薦衛鞅注公叔痤病乃薦衛鞅且云不用則殺之皆䇿士權宜忍鷙之為非休休之度也至告之使速行益所謂欲盖彌彰者矣魏有照乘珠目梁惠當時有孟子而不能用即如衛鞅之流亦使之得志於異邦以致喪師削地乃沾沾以珠自喜宜其見鄙於齊威矣然以千里之國而有徑寸照乘之珠十二亦必無之事史氏誇辭固盡可信哉韓昭侯令蔵敝袴以待有功注一嚬一笑固不可不慎然欲蔵敝袴以待有功則視有功者太輕矣昭侯與申不害同其心術故忍偽乖張至於此向於日知薈説中已詳論之慎靚王衛嗣君聞縣令席弊乃賜以席又使人偽遺闗吏金以示聰察目衛嗣君所為任小聰明而不知大體者烏足與語不逆不億而先覺者哉赧王趙公孫龍論臧三耳目聴者兩耳又有所以主聴者凡物莫不皆然三耳之名似竒而實非子髙之言甚正世以艱深文其淺陋者皆拾公孫龍之唾涕者也齊孟嘗君奔魏與諸侯共伐破齊目田文齊之支族乃與諸侯共伐破齊悖理實甚然春秋戰國之世似此者不一而足矣趙受韓上黨降又悮聴秦間以趙括代亷頗目趙勝受上黨之降史記譏其利令智昏然使受降而不用趙括不易亷頗秦雖見伐勝負猶未可知也既棄趙豹之言又受應侯之愚有不喪師辱國之理乎魏信陵君盜兵符襲殺晉鄙以救趙目趙魏脣齒趙被兵魏雖不可不救然無忌徒以𤓰葛之誼盜竊軍符椎殺國將則非為國乃為私且大悖理矣六國秦謀取楚李信言需兵二十萬王翦言非六十萬不可目楚屢為秦敗不振乆矣必需六十萬始能制勝史家浮誇之辭耳兵在精不在多二十萬已難必其紀律之一勇銳之同況六十萬乎秦始皇帝帝推五徳之運以秦代周從所不勝為水徳目五運終始䜟緯所祖説肇於鄒衍用始於秦皇漢以後遂因之改朔易服且逺溯羲農而相生相勝議如聚訟不知帝王肇興本由天命天命固不在五行之數也更由人事人事亦不在五行之數也以木金水火土數為皇極運世之樞紐其不經亦甚矣帝東遊至陽武張良狙擊令天下大索十日不得綱子房以盖世才乃僥倖於聶政荆軻之計蘇軾所論良是獨是秦法之嚴而大索十日不得此或史家行筆之誤然亦可見無同仇之心而峻網不足恃矣淳于越議封建李斯因請禁諸生學古及燒詩書百家語目淳于越泥於師古李斯駁之固是然因此而盡燒詩書則大非聖無法不特懲熱羮而吹􅐽矣二世皇帝劉季拔劍斬蛇有老嫗夜哭及亡匿芒碭山中所居常有雲氣目斬蛇夜哭雲氣上覆多史臣附㑹興王之詞然以此而惑衆煽亂者亦有之矣楚懷王聞宋義先䇿項梁軍必敗因以為上將軍救趙至安陽不進項羽矯殺之帳中目宋義能䇿人之敗而自不免項羽之矯殺所謂當局者迷乎楚漢五星聚東井綱天道逺人事邇沛公仗義而西三章之約炳然應天順人若以五星聚為入闗之祥脱令項羽先入亦足當其兆乎抑即無其事乎甘公亦當語塞矣且髙允崔浩輩論如棼絲則其事之真偽從可思耳漢王伐楚入彭城項籍自齊還破漢軍以漢太公吕后歸目彭城去沛不二百里漢王既入即當迎取大公乃亟亟於寶貨美人置酒髙㑹此與項羽入秦何異卒至家室俱亡幾陷其親於鼎爼而分羮之語雖出權變實非君子所忍聞也楚項王使至漢陳平使為太牢具進佯驚非亞夫使即持去更以惡草具進目陳平此計乃欺三尺童未可保其必信者史乃以為竒而世傳之可發一笑漢髙帝婁敬言洛陽形勢弱請西都闗中目易坎之彖曰王公設險以守其國象即繼之曰君子以常徳行可知有徳然後險可恃無徳則險適足以速其敗洛陽關中斤斤比較失之逺矣詔定元功位次鄂千秋言蕭何全闗中功第一上善之封千秋安平侯目髙祖發縱指示之論早有首蕭何之意千秋不過申明其説耳被以上賞過矣吕后紿韓信入賀使武士斬之夷其三族目韓信之寃與否姑弗論然髙祖在外而后公然族誅大臣囘亦弗問牝雞司晨成何國政人彘之禍兆於此矣帝欲易太子立趙王留侯招四皓從太子竟不果易目并注四皓調䕶太子其事不足深信豈有張良叔孫通輩死争不得而四老翁轉得持其短長者杜牧安劉滅劉詠古引而未發盖髙帝稱知人其論王陵陳平周勃及呉王濞於十數年之後乃如觀火豈有不知己子之理惠帝柔懦不足以承重器帝葢早已見及故欲易之耳牽愛戚姬欲立乳臭乃信其失使髙帝廢惠而立文吕與薄亦必不能相和然文帝必能調停其間無吕氏之亂而劉氏安矣故見惠之不可是帝之明終不牽愛猶帝之正而遲囘於嫡庶之虛名使漢室有幾危之實禍則帝之失髙祖有知必當首肯吾言史遷好竒附㑹之説不必論矣惠帝吕太后以戚夫人為人彘惠帝視之驚病遂日飲為淫樂不聽政目幾諫幹蠱常人尚應勉豈有身為人主宗社所繋而不能善處家庭之理淫樂不聽政遂以自戕身命而吕雉之禍興矣惠帝實髙祖之罪臣敗子耳曹參為相國日飲醇酒不事事注惠帝方以吕后故淫樂不聴政而參復濟之以飲醇其去君臣相與沈湎者幾希特以漢初削平大難人心厭亂幸免耳清静寧壹之稱非公論也匈奴書䙝嫚樊噲請兵撃之季布斥其面謾太后因報書遜謝目樊噲猶有丈夫氣而季布曰可斬是藉口息事不顧損威失重者之長技然則如之何而後可曰度力力勝則征之力不勝則自守尚可報書遜謝有是理哉然彼已與審食其為亂冒頓果至彼亦從之耳獨其時之羣臣腆顔不愧而猶以布言為是焉不亦大可笑乎帝以複道乘宗廟道上欲壞之叔孫通言人主無過舉願更立原廟目叔孫通所謂導其主以飾非文過也孟子逢君之誅不能免矣張辟疆請拜吕台吕産為將吕氏權由此起目辟疆揣度之詞平勃遽為聴用以張諸吕之權是平勃乃髙祖之罪人而辟疆又平勃之罪人也馴致稱制封王無不隠忍曲就直至吕氏死而後安劉之言始騐柔奸自全者流方且謂智者俟時大丈夫觀之不值一噱唐狄仁傑之事與平勃同此予所謂如此安劉孰不能者也史臣論孝惠内修親親外禮宰相可謂寛仁之主注孝惠論已具前史臣語非至當評鑑闡要卷一
