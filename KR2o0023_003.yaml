  - {type: page-break, offset: 0, content: '', id: KR2o0023_WYG_003-1a, image: WYG0694/WYG0694-0447a.png}
body:
  text: 後漢順帝孫程等以罪遣就國周舉謂不宜忘其援立大德目周舉説朱倀以功臣大德不可忘者實椓人也則時稱舉為忠鯁者亦可見矣大將軍梁商卒綱梁商甫歿冀與不疑代起此即王鳳覆轍東漢之不為梁氏竊者幾希即藉宦者誅冀實救火抱薪之為非曲突徙薪之計也嗇夫孫性私賦民錢市衣進父後自首待罪吳祐謂觀過知仁還以衣遺其父注掾私賦民錢市衣進父因父言而自首其事即實原其情宥其罪可耳仍以衣遺之民則何辜事出好名不可為訓种皓手劍當車目中常侍承帝命召太子恆事也种皓即有所疑隨去可也而乃手劍當車是儼然以父子為敵國無諾不俟之謂何史家方譽以為臨事不惑可謂無識矣桓帝亷縣雨肉綱當時亂政自足以召天變然雨肉之事則失於竒怪觀續漢志引羊禍由於枉誅李固杜喬云云可知馬融除南郡太守謁梁不疑梁冀詗知之諷有司劾融貪濁注不疑本與冀為昆弟曾斥張陵之劾冀而史家又謂其好經書不與冀和是自相矛盾矣且李固下獄乃馬融所草其倚冀為自固之計者巧矣豈有小忤冀意即不免竄謫者當時記載實不得謂之皆信也陳蕃奏賞濫寵多以致水旱帝頗采其言目采女數千所出僅止五百左右無功降封侯為鄉侯如此調停所謂月攘一雞之類觀水旱十傷五六不聞一議賑貸其義自見度尚討桂陽賊士卒以多獲珍寶莫有鬬志尚詭使出獵密焚其營以激厲士卒遂大破諸賊目度尚焚營雖以術御士出於無可如何然較項羽窘迫沉船頗為勝之靈帝封陳蕃為髙陽鄉侯不受綱世皆以蕃武並稱然武貪援立功即受侯封蕃有舊勛卒辭上賞所見相去甚逺然蕃因武雜考鄭颯雖有此曹子何復考為之語終乃以武坐失事機並嬰禍敗不得辭寡斷之譏矣張儉望門投止注張儉亡命迹類岑晊故馥之責儉與賈彪之拒晊所見頗正夫平時既以名士自處罪不逃刑之義尚不能守其名又何足稱卒致望門投止連染無辜不亦鄙哉黨錮之禍惟申屠蟠獨免目申屠蟠未入仕本可以囊括自全獨惜陳蕃李膺等號為賢者既得時居位足弭小人之變所處非申屠蟠比乃亦囿於清流虛聲率以拘牽坐失事機難辭責賢之備不可徒諉之運會使然也趙苞母為鮮卑所劫質苞出戰破賊目程子論趙苞而及徐庶不知庶在當陽與昭烈君臣之分未定尚可言去使庶處苞位亦將捨郡全母乎至方孝孺所言更非正論彼既挾其母以要之欲求兩全勢必兩失首鼠兩端者率用藉口為苞計者設計全城可也進戰則太速矣然終以死報母則其節有可憐憫而不可竟以不知義罪之矣段熲以阿附王甫自殺目段熲平定兩羌漢末將材所謂錚錚佼佼者乃亦阿附閹豎晚節不終雖時勢所為然究失卓志矣帝寵張讓趙忠等目呼常侍為公母千古竒事如此而不亡國者未之有也王允得張讓賓客書與黃巾交通帝責怒讓竟不能罪讓以事中允目黃巾約封諝等為內應其言猶出於張角弟子至王允奏上張讓與黃巾交通之書雖中主亦當立置於法乃反信讒罪允是真亡國之君胡寅以中人以下目之猶為失寬冀州刺史王芬自殺綱王芬謀誅宦官可也至謀廢帝是直叛自殺乃自取之無足惜也獻帝蔡雍議省和安順桓四帝廟號目子孫議祖父臣議君此何政耶且當時所當急者不在此也雍汲汲請去已上廟號特媚董卓之為耳所謂逸才多識適足濟其邪故孔子訓子夏曰毋為小人儒孫堅破董卓卓欲與和親堅拒之目堅之拒卓詞嚴義正至操責諸將進滎陽未免言大意誇其實别有所圖也故操敗而堅勝朱俊就李傕之徴謂欲乘傕等之間以濟大事注俊與皇甫嵩同著威名乃俱就逆賊之徴而俊較嵩尤陋觀其對諸將方謂庸兒小豎變難可乘乃反為劫質大言不慙莫甚於此劉虞討公孫瓚不克見殺綱虞號為寬厚而軍無部伍其惜民廬舍戒無傷餘人皆適足自貽伊戚宋襄建文胥用是致亂者然史稱瓚居薊南小城與虞相去不逺又何至興十萬之師乎記載失實比比然矣袁紹圍臧洪使陳琳招之不從城陷洪被殺目洪守東郡事迹極類唐張巡其答陳琳云云義正而辭嚴慷慨有烈士風終能死不失節可謂言行相顧之士矣曹操殺董承綱董承智不及王允而欲效圖卓之舉非獨自殺其身適足以危其主所謂志可矜而智不逮者也然操之得入本由董承與名正討賊者不可同日語矣田豐説袁紹乘虛迭出以困曹操注田豐乘虛迭出之謀與晉荀罃三駕敝楚之術同罃計行而晉霸豐不用而紹亡明人所見略同成事在乎審勢信矣袁紹殺田豐注既知不用人之言而致敗乃以見笑殺之如此矜忌其得善終幸矣尚冀子能克家哉曹操責孫權任子周瑜定議勿遣目瑜不獨持論俊爽規略實中事理使瑜不死東吳必無稱臣質子之事孫權其亦中材耳曹操追攻袁尚袁談至鄴郭嘉請緩之以待變目急則相保緩則相爭郭嘉之論與卞莊事同然談尚之相殘乃踵武紹術之操戈天道好還信哉曹操攻鄴袁尚使李孚入城注李孚出入嚴圍固自狡獪操付之一笑所謂因計用計也以此為操軍紀之疏其見淺矣烏桓欲助袁尚復故地曹操以田疇為鄉導擊破烏桓熙尚皆被殺目田疇不賣盧龍世所稱髙蹈者然因欲報公孫瓚而引道以殱熙尚隱遁忠厚之士或不出此矣魏崔琰毛玠並典選舉目六計弊吏以亷為本輿服不過度似已然亦不過從儉一端尚不足語正本清源至垢面羸衣飾偽尤甚其選舉又曷足憑耶龎統勸劉備取益州備言我每與操反事乃可成目凡事與操相反雖為矯枉之計亦屬沽名之舉龎統之言自是達識彼拘文牽義坐失事機者罕不為子莫執中之流曹操攻孫權權呼劉備自救備請劉璋益兵目東吳兵勢方張且有魯肅吕蒙等為之經略操至濡須何至呼備自救此蓋備藉口請劉璋益兵之詞劉璋無能爾時若聽龎統上計成都可立得然備雖稱英雄亦實內怯宜其聽中計耳劉備孫權分荆州綱荆州東南門户吳蜀勢所必爭然兩雄相扼而操挾天子以令諸侯遂晏然得移漢祚權固無足論自私之罪備不能辭丞相冀州牧魏王曹操卒綱綱目於大臣之賢者其卒具書官爵今以此例書操非豫之也正以著其為漢賊也觀其天命在吾云云可見其心迹矣劉友益謂幸其死故然迂甚蜀漢昭烈帝魏主丕與吳中大夫趙咨問答注如此等問答或出於使者自記以見己長未可盡信且以曹丕求珍責任子不明時勢之人安能有屢更其端之問如出一手之文乎迂儒昧此不知遂至決裂好名之舉紛如魏楊彪自以漢室三公辭魏太尉之命及是為光祿大夫目楊彪以漢三公不受魏爵託於大義自持則何不罵賊而死乎觀其於光祿大夫之拜賜几杖施行馬恬不知恥辭十萬而受萬尚得謂無虧全節耶既貪生復好名千秋以下正論難逃終於進退無據而已魏主以吳不遣任子怒欲伐之劉曄言不可倉卒目劉曄所諌數語切中事機然應於遣使之先則更善矣諸葛亮常自校簿書主簿楊顒諫注楊顒之言似是而非蓋時當主少國疑之日非亮躬親整頓國事何賴觀其發教所稱集思廣益云云足見其忠赤矣不知此又何足與言鞠躬盡瘁之義帝禪諸葛亮生致孟獲七縱七擒目七縱七擒為記載所艷稱無識已甚蓋蠻夷固當使之心服然以縛渠屢遣直同兒戲一再為甚又可七乎即云几上之肉不足慮而脫韝試鷹發柙嘗虎終非善䇿且彼時亮之所急者欲定南而伐北豈宜屢縱屢擒耽延時日之理知其必不出此吳主與太子親受田目楊顒對諸葛亮之言正當於此用之為人君而親受田是何政體宜其忽爾稱帝忽爾降魏忽爾伐蜀忽爾行成總無定見也李平以罪免官諸葛亮與蔣琬書言平腹中有鱗甲不圖復有蘇張之事注李平曾受詔輔遺而督糧不繼更設計傾亮視國事如秦越罪之宜耳但腹中鱗甲不圖蘇張云云語涉詼謔賢如孔明尚有此語可知其時人心風俗也魏主睿將伐蜀劉曄入贊議出則言不可伐及為楊暨所援反以不密責睿又向暨以大魚喻人主注釣中大魚制而後牽此何等語其罪浮於面從後言者逺甚入而責睿不密出而責暨云云憸邪變詐一至是哉然睿必待屢而後疏之其亦愚之甚矣魏制三祖之廟目曹睿方在而先定廟號可笑無過此者魏司隸崔林引周官考課注三載考績唐虞所不廢然堯舜之量材授職固不例此觀於吁咈汝作之文可見此其義司馬光識之然引而未發故並録其語遣費禕救漢中來敏詣禕别求共圍棊以試禕注曹爽興師不以正且失地勢故禕得用逸待勞耳若以從容圍棊為足能辦賊器量較謝安矯情鎮物猶為不及矣費禕為尚書令常以朝晡聽事而不廢接納飲博注子賤鳴琴而單父治巫馬期日夜不處而單父亦治此久為記載家蹈襲套語禕雖才優於允其不逮諸葛甚明諸葛猶孜孜奉國食少事繁而禕乃欲以清淨名髙豈可為法費禕泛愛不疑待新附太過郭循刺禕殺之目光武推心置腹何嘗不信任新附或且因以建功要之駕馭有道耳禕之於郭循平日既非深知且為將而沉湎於酒以致遭患其失在禕更非岑來可比薑維每欲大舉費禕常裁制不從與兵不過萬人目禕之言似是而非試思後主昏庸信任姦宦安能保國治民若薑維雖近冒昧然其志固在乘機恢復也少與之兵是自敗國事安得謂忠庸腐者流但言息兵則撫掌大悅宜其以禕為是耳吳主亮謀誅孫綝戒衛將軍全尚勿泄尚妻為綝姊以告綝綝遂廢主殺尚目不密害成亮之所以囑紀也然終以婦人漏泄不密孰甚於此鼠矢燭姦則所謂小事不糊塗耳鄧艾至成都帝出降皇子北地王諶死之綱北地王慷慨損軀凛凛有生氣劉禪犂牛固不足論薑維以下諸將士平日咸以恢復自命乃俱聞風而靡無復具人心者不啻譙周鬻國罪不容誅矣晉太保王祥卒綱王祥以孝行稱乃為魏太尉而復仕典午求忠臣於孝子之門之謂何羊祜歸自江陵務修德信以懷吳人注羊祜刈榖償絹送還獵獸特用是愚弄邊界之人豈真所云修德信者甚至遺酒饋藥使命頻通不惟身犯外交直廢棄軍律矣論者率以此事為賢故不可以不辨機雲皆善屬文目善屬文而無臨敵材乃命分將父兵國之不恤又豈所以恤抗乎代斫傷手莫甚於此晉武帝吳人以鐵鎖橫江注孫皓衆畔親離王濬有進無退勝敗之勢固已昭然鐵鎖鐵錐安能為守樓船直下摧枯拉朽不待燭照數計矣然所云大炬燒鎖未免近誣江水之中炬如何燃故讀書貴在逹理陶濬請乘大船以戰注舟師之利全在運轉迅捷陶濬稱大船可克敵是所謂恃衆勝寡怯懦之流耳帝臨軒引見孫皓皓以南方亦設此座待陛下為對目孫皓愚暗數語差強人意然以面縛受封之人懼罪不暇直云亦設此座相待是自取禍皓至此時能為此語必其不降死社稷矣此語恐非當時實録胡質以絹賜子威威問於何得絹注胡質父子清白自守尚矣然以子而問父絹所從來以之資談柄可耳正史風化所關不應有此詔罷州郡兵綱吳地甫平反側未靖北境又多寇警豈得髙語銷兵此武帝志滿淫荒之漸杜預講武屯田申眀戍守可謂識時務賈充死綱綱目以揚雄仕莽嘗書死以斥之若賈充之唱令成濟顯行弒逆罪惡更非雄可比當時陳泰欲斬之以謝天下即充臨死亦深以諡傳為憂乃竟與後負恩輸國之褚淵贊逆衊君之沈約均豫書卒南董遺直安在即書法劉友益所云書揚雄死所以賊之書胡僧不空死所以夷之其説尤為繆戾審如是則孟子所謂舜東夷之人文王西夷之人又當何如兹特申明義例舉凡姦賊不臣如充與淵約比者悉以書死正書卒之誤庶萬古臣子大防不致陵夷澌滅用發凡以示館臣而并著其説於此帝出齊王攸都督青州諸軍事王濟甄德使其妻公主請留目齊王固賢然舉國稱之至令公主苦留是何政體晉武之出攸亦衆人有以激之耳惠帝賈后淫虐裴頠賈模議廢之張華言卿於中宫皆親戚吾曹惟優遊卒嵗目張華優遊卒嵗之語一生學問掃地倫秀之禍乃自取耳張華少子韙因星變勸華遜位目明足以察豐城劍氣而天變昭彰為有目共見華坐昧先幾以及於禍死當愧其少子然此時即去亦豈能終免哉東海王越傳檄討張方綱八王背亂相踵至越庸劣更甚禍延藩服愈趨愈下責有攸歸胡寅所云東海差勝不過許其朝士多赴為留心延納耳非正論也以庾敳為軍咨祭酒目時務方殷雖真材猶恐不給乃以名重用縱酒放誕之人安能有濟懷帝漢太保劉殷死綱劉殷以晉臣仕漢大節掃地史稱其不失令名奚稱定論至七子各興一業六女寵冠後宫以此為善保富貴豈葩經明哲之義長樂老伎倆實殷有以啓之愍帝漢趙染悔不用魯徽言經出致敗歸先殺徽目趙染之殺魯徽與袁紹之殺田豐愚忌如出一轍欲不敗亡得乎丞相睿出師以漕運稽期斬都運令史淳于伯目丞相方出師露次而令史漕運稽期斬之未為失刑劉隗上言王導引咎皆不免過當至刀血逆流柱末尤屬不經晉書記載失實往往如此然元帝實非有心復仇者雖有所為不能欺後世元帝羣臣勸進王不許周嵩上疏謂宜先雪大恥由是忤旨注周嵩以忤旨出牧則所謂不許固辭者皆偽耳南陽王保體肥注保縱肥大豈能重八百斤其説荒誕不近理蓋防風專車僑如九畝不經好竒自古已然矣劉𢎞以妖術惑衆與涼州刺史張實帳下閻涉結謀遂殺實目蘇軾謂大亂起於小姦千古篤論實於左道惑衆者流不能早除至左右皆為其黨始欲捕治自貽噬臍之禍夫復誰尤帝畏惡王敦因裁抑王氏權王導亦漸見疏外目導果竭忠晉室敦其從弟也反迹寧當不知何不聞正言開譬折其逆謀論者尚以疏導為帝咎時事可知矣王敦反帝令劉隗等避禍百官詣敦戴淵對以體誠者謂之忠周顗則以王旅奔敗引咎目元帝勸隗等避禍其庸愞固不足言而隗等竟自奔避是尚有人心乎戴淵數語所謂亷恥喪盡終亦無救於死獨周顗侃侃正論足令隗等褫魄王導悔殺周顗注始以不救而恨繼知申救而悔王導肝膈無非曲為身謀而其時逆敦向闕竟靦顔俯仰且王彬尚持正論而導竟無一言是導縱未必欲藉敦危晉而因敦以除周戴劉刁諸人本懷大略可覩且觀其後與王含書尤不辨自明矣庾亮大姦之目故非刻論史官乃稱其任真推分猶得謂直筆耶明帝王敦與王導書目敦病中猶與導書是導始終未嘗絶敦即其進督諸軍率子弟發哀亦料敦必不起方敢為是以自託大義滅親之為耳王敦斬郭璞注璞占筮之驗古今以為美談然易主福善禍淫趨吉避凶璞既精於易學何至居敦側而輕蹈危機顯其術數蓋兩失之矣詔王敦綱紀除名溫嶠疏言宜施寬貸注王敦非病死晉室未知如何導亦惟委蛇其間耳且敦既為大逆惡黨僅豫除名猶為失寬而更欲貸之乎溫嶠所議特為導周旋而晉政不綱於是益無可為己成帝蘇峻兵入臺城宫府掠奪一空以王導為有德望使仍任本官目禇翜正色呵止峻兵即不敢上殿宫門茍設禁衛何致任其掠奪縱橫且峻素重導導應示以大義直斥其罪乃坐視狂悖甚至聽其除拜恬不為怪導之罪尚可逭乎溫嶠與陶侃討蘇峻嶠貸糧於侃侃欲西歸嶠以大義止之目爾時若無溫嶠陶侃必西歸忠臣當如是乎則平日所為恭勤幹事概不足稱矣陶侃卒綱侃治績頗有可稱然心不純正於蘇峻之亂見之所謂鐵中錚錚者耳時論以王導帝之師傅百僚宜為降禮顔含言禮無偏敬目爾時相尚清談都無實行惟顔含內外如一卓自樹立勝於時輩逺矣蜀處士龔壯欲報父叔仇乃説李夀殺蜀主期注既為處士復仇宜也而權譎誘人為逆以報己恨失正道矣穆帝劉惔䇿桓溫必克蜀注惔䇿桓溫克蜀決之於博更慮其將來跋扈信如左劵可謂有卓識桓溫既平蜀朝廷憚之會稽王昱引殷浩以抗溫目殷浩徒以盛名未見實際即引以抗溫釀成疑二是激之變也羲之協和之説亦不過調停一時之見非見機明決之論蓋當時人心國政已不可救藥徒以清談欲濟世弊所為抱薪救火而已征討都督褚裒帥師伐趙綱褚裒拜疏北伐事雖無成然尚有丈夫氣蔡謨謂當度德量力豈以中原為不應復乎事前無所建白退有後言而史氏方以憂國許之無識甚矣謝萬出鎮遇諸將多矜傲兄謝安慮其不免自隊帥以下無不厚相親託注荒誕如謝萬豈堪元戎之任安尚稱明逹者乃欲以世俗周旋思濟其失亦可鄙笑哀帝王述每受職不讓及為尚書令子坦之以為請述言何讓汝定不及我目子請父讓父謂定不及是何世道人心吁可詫哉帝奕王猛伐燕請慕容垂子令為鄉導又詐以垂語紿令令奔燕垂亦懼出走復為追騎所獲目猛設計紿令陷垂非正道也堅待之如舊不失大度然豈不知猛之設計邪抑知而故委曲了事邪孝武帝秦苻陽王皮周虓謀反事覺皆赦不誅目周虓既稱世荷晉恩則不宜受秦爵既受爵復屢叛直貪生之亂臣耳苻陽王皮均為叛逆此而不誅何以立紀綱此特苻堅自欲博寬名而失正義矣謝安出遊山墅注謝安賭墅羣詡為運籌帷幄不動聲色然八公之勝非朱序自敗乃公事則晉軍幾至不振又何成算之可稱讀書而不具卓識隨人是非者多矣謝石謝元等大破秦兵於肥水綱觀謝石謝元憚不敢進之狀則桓沖之言不為無見幸而朱序私通軍情苻堅驕傲自滿苻融未諳軍機臨陳自退以致晉軍乘勢得勝耳不然石元將蹈僨轅之譏又何偉績之能建哉尹起莘所謂天幸非刻論也太子德宗即位綱德宗幼而不慧至不辨飢飽寒暑豈尚可授以主鬯晉惠取鑒不逺故狃於立長立嫡而昧於為天下得人者直庸主耳其罪與己身失天下同安帝王恭以反誅臨刑猶謂欲令後世知恭注恭初以疾惡威脅朝廷已如奪蹊田之牛身陷不義至國寶等既誅自謂威無不行動輒舉兵向闕小人無忌憚孰甚於此而以欲忠社稷自解其誰欺百世之下知有王恭亦所謂遺臭萬年耳孫恩寇會稽王凝之世奉天師道不為設備城陷凝之被殺注姦民左道惑衆在政治清明之時不過為射利之媒其技易窮亦易敗露若亂世則直用號召倡亂矣守官者轉去武備而信妖邪自貽伊戚其愚固不足惜然以羲之而有是子又世奉邪道豈非清談髙尚害人之深哉劉牢之討孫恩使劉裕覘賊裕墜岸復登獨驅數千人會官軍擊賊大破之目裕瀕危奮勇隻身追賊多所殺傷益以敬宣之兵何難殄滅乃官軍競取寶物子女致蛾賊乘間逺揚敬宣馭下無紀固無可辭咎然所云以一人驅數千亦失之誇矣王謐親解帝璽綬授桓元元敗劉裕以謐舊恩特保全之注謐罪萬無可貸裕乃以舊恩保全之是當其討逆時逆萌己見篡竊之姦尋至而迭興雖有智者亦將無如之何而况爾時君庸而臣姦哉燕王熙遊白鹿山綱熙事有無固不足論然據史家所稱白鹿山其地並非荒漠絶逺何至為虎狼所害及凍死五千餘人蓋記載者意在己甚其辭豈暇復揆事理子輿氏所以有不如無書之歎劉裕遣使求和於秦得南鄉等十二郡綱裕甫匡復晉室即欲為國家索地於秦亦當請於朝命何得擅自遣使蓋其時上下陵替君若綴旒故雖逆謀未形而無君之心已顯露若此劉裕殺東陽太守殷仲文綱仲文晉室舊臣首勸桓元受禪繼復諂事劉裕喪心無恥莫此為甚當時所云才望蓋可知矣魏故事立嗣先殺其母目漢武懲吕后而殺鉤弋已屬過舉元魏乃竟以為故事且如圭孤弱時使非其母賀氏輾轉奔託幾何不為實君劉顯等所害不是思而立此滅倫之法不特因噎廢食實非人世所宜有之事耳杜慧度與盧循合戰擲雉尾炬焚賊艦目雉尾炬即今火箭之屬蓋縛爆竹草束於箭燃火信射去中物即火起耳胡三省注辭費而義昧且雉尾亦斷不能如孔雀之散開也劉裕遣朱齡石伐蜀付書署封至白帝乃開目千里襲人機事不密敵人早為之備緘書别函至期開視可謂有卓識熒惑不見綱緯星伏逆遲速推步原即可得崔浩襲左氏神降之夸辭傅會占驗實好竒之過適足為有識者所鄙耳評鑑闡要卷三
