body:
  text: 唐髙祖太子建成約楊文幹欲害秦王世民事露帝許立世民為太子目髙祖無卓識泥古而立建成即當有以處世民及至文幹通謀事發已許廢建成而立世民矣顧乃外惑佞臣內牽嬖妾濡忍釀禍誰執其咎哉司馬光論太宗始欲俟建成先發為羣下所逼遂至推刃同氣注司馬光以太宗欲俟其先發然後應之為猶愈是不知太宗此言姑為漫聽漫應之意耳然使建成嗣位則唐室不久而亡當與隋同轍太宗立而延唐家三百年之基此評古者所以亟為太宗諱也至元武門之失德雖具炙轂之辨又安能為之諱哉太子世民責魏徴離間兄弟徴對以先太子早從徴言必無今日之禍目魏徴之對正如陳琳之對操所謂矢在弦上不得不發雖云各忠其主然豈得謂之善處人骨月之間者哉太宗帝嘗與長孫后議賞罰后辭目長孫后讀書循理恭順節儉固足為賢而辭議政一節識見卓越視漢明德尤逺過之然以太宗英明豈不知牝雞之意何必與后議賞罰哉有上書言去佞臣者請陽怒試之帝言君自為詐何以責下注鑑誠懸而物來畢照初不必豫存妍媸之見而萬象自無遁形人君臨下亦猶是也太宗不肯設詐待人比之濁其源而求流清實至當不易之論然未久而密使賂人致有裴矩之諫不宜矛盾若此豈紀載者失實耶帝與蕭瑀論弓材邪正目太宗因弓工辨論弓材悟及政理深得潔矩之道夫天下情變萬狀豈能一一曲盡其致或狃於所習而忽不加察者蓋不少矣向閲養正圖曽採其事題諸屏扆于引伸觸類之義蓋深有取焉上命簡出宫女前後三千餘人目太宗即位已放宫女三千矣今又放三千果爾其淹留永巷者又復何限白居易詩怨女三千放出宫乃詞臣揄揚溢美之言唐史不知其失實而書之此不足以美太宗而適足以誣太宗耳何可為訓上自臂佳鷂望見魏徴來匿懷中注太宗懷鷂事帝紀及魏徴傳皆無之司馬光輯通鑑蓋雜採李延夀劉煒張文業諸家之說適足啓後世之疑夫徴固敢言者果有其事何不犯顔直諫而故為此譎術且徴奏事故久誰則見之詭諫于君前後言于退食徴亦必不出此至太宗雖喜延接羣臣亦自有堂亷之分徴豈能突如其來即自臂佳鷂何難預付侍臣而必倉卒納之懷中類三家村孰弟子憚師伎倆皆理之所必無嘗作文辨正之盡信書不如無書讀史者不可不具卓識長樂公主將出降敕有司資送倍永嘉長公主目漢明封諸皇子皆令半楚淮陽向曽著論若太宗資送公主乃欲倍長公主較漢明之矯枉過正實為不及逺矣帝念文德后築層觀望昭陵魏徴詭言臣以為獻陵目苑中作觀登而望之必非一日之事徴早宜進諫即祕不使徴知其引登使視之時亦當正諫乃謬為不見而有獻陵昭陵之譏使太宗何以為人豈純臣而宜出此哉以荆王元景等為諸州刺史世襲綱唐室之衰由方鎮跋扈不馴得自専世襲故耳太宗令元景等世襲刺史雖行之踰年旋即停罷然已有以開其端矣上命刊定氏族志専以今朝品秩為髙下注當塗以九品衡人致士大夫矜其地望遂有上品無寒門下品無勢族之譏自晉及隋相沿不變太宗舉漢初英賢立論足以針砭膏肓且姓譜既頒使天下知衰世舊門不敢與興朝勳閥相抗而天潢為氏族辨冕亦猶周家之薛不先滕書法不以為然失之吹求矣帝與侍臣論創業守成注岑文本論創業守成難易當時率無軒輊向嘗著論正之兹不復綴上謂尉遲敬德人言卿反敬德解衣投地出其瘢痍又辭尚主目并注敬德初降時唐室創業未就朝秦暮楚或未可知而敬德不動屈突通等進言而太宗不疑豈有海宇混一大業已定以身經百戰之人而忽萌反側之念者使太宗果懷疑忌雖撫視瘢痍又安能遽爾氷釋是蓋傳聞異辭至謂辭謝尚主則是借宋𢎞以傅㑹其事不待辨而知其妄矣髙昌王麴文泰謂唐去我七千里且有沙磧安能致大軍目髙昌恃其阻逺猶襲胸奴失一羊走千狼之說唐兵奮勇罙入即見犁庭可知事在人為故非地險之所能限也且彼所謂熱風寒風之沙磧不過戈壁耳今則郵傳遄行且有靈泉之應可知如刀如燒之言仍出于畏怯者流紀載失實之口耳詔太子用庫物有司勿為限制目君人者制節謹度雖自用亦必有程無容過濫何況太子周官世子不㑹之說蓋即諸侯不計多寡之義而後世乃曲解傅㑹以逞其欲傳曰教以義方勿納于邪厥後承乾不終豈非太宗貽謀不能慎始之咎耶党仁𢎞坐贓當死上將宥之因欲席藁南郊以謝目坐贓法所不宥原功而減死為流凖以周官八議未為大失何至席藳南郊其事實非稱情太宗好名之念於此益彰太子承乾多不法魏王泰有奪嫡之志上廢承乾并貶泰目承乾之廢雖不盡由泰之搆讒然其覬覦蓋非一日至云殺愛子以傳晉王冀以要寵則肺肝如揭矣太宗以兩棄處之可謂得當然承乾輩之䦧牆與建成元吉如出一轍幸未至元武門之甚耳天道好還吁可畏哉李世績有疾上自剪鬚和藥注剪鬚和藥事屬不經即云優恤功臣亦自有道何至毁髮膚以佐刀圭設他日復有類是者安得如許鬚髯療疾乎事出李績本傳或由太宗欲倚績為顧託因設詞以結其心而其家遂紀之志狀史官不察托拾成編白居易七德舞辭復從而艷稱之後世因据為盛事其說無足深信即有之亦非情理之正吾所不取上疑太子柔弱欲立吳王恪以長孫無忌固爭乃止注太宗英明能知人豈反不能知己子既不審定於前乃欲屢易於後且此何事而與其臣謀之所謂一無足取卒致髙宗立而有武則天之禍唐室幾至於亡無知者或以無忌為能安嫡而不知其實為唐室之罪魁甥舅之庇猶其過之小者耳上欲觀起居注褚遂良不可劉洎因言有不善天下亦皆記之目居室出言應違決於千里之外鶴鳴聲聞理固不爽太宗亟亟欲觀起居注其於易義固未津逮即遂良祕不與觀又何如劉洎一言之中綮要乎世愈降而風愈薄不虞之譽者有之求全之毁者有之人君亦惟以實心行實政可耳安能嘵嘵日與天下之人辨論是非哉骨利幹晝長夜短日沒後煮羊胛適熟日已復出目今西域安集延拔達克山諸部去中國皆萬有餘里嘗遣人測量晷度雖北至極長時亦止出寅入戌較內地所差不過分刻間至其西皆回部連延以訖于海不通中國亦不知其幾萬里然日自沒於海中亦非日入處也蓋日本無出入周天而行譬之居數仭牆下者朝向東望謂日出於牆其東設有百丈之山將謂日出於山是豈有一定哉寰海載地故人視之以為日出日入皆由於海海尚非實而況於地乎骨利幹為鐵勒别部鐵勒拒長安不及萬里骨利幹縱逺當不至倍蓰安有自昏及旦才熟一羊胛之理且瀚海在北而其使謂近日出處揆之暘谷經途亦風馬牛不相及蓋是時未有親履其地者惟據伻來夸誕之詞筆之史册耳事不徴實無足傳信上營玉華宫務為儉約然費已巨億計目寢殿覆瓦餘皆茅茨而所費已巨億計則所費更於何處耶不論理之有無但務辭之竒警比比是矣帝欲李世績為太子用先貶為疊州都督目太宗之待臣下未嘗不任權術厥後陛下家事一言致貽宗社之禍究之權術有何益乎髙宗潞王賢召王勃為修撰勃戲為檄周王鬭雞文上怒斥勃目髙宗之斥王勃似矣然於鬭雞作檄知為交搆之漸而大酺分朋角戲自導以爭䦧之端明於此而暗於彼非蔽而何然此猶其失德之小者耳帝與上官儀謀廢武后左右奔告后后遽自訴因誣奏殺儀目密䇿廢后此何等事豈有左右之奔告尚不能禁而可圖成者髙宗羞縮受制庸懦不夫至此又豈特失臣之譏所能罄其惡哉帝耕藉田命易耒耜雕飾及耕九推乃止目藉田之禮朱紘黛耜自昔已然安得盡仿田間朴陋至五推九推以下禮别等差即劭農率先亦自有所限制豈宜以天子而下行卿大夫之事若由此遞加則三公將起而終畝庶人胼胝日亦不給髙宗之失德多矣務此虛名豈能救其實罪哉上責侍臣不進賢李安期請推至誠待人上深然之注當政出房帷老臣誅竄之時而以進賢責侍臣可謂不揣其本觀其納安期推誠之說未幾輒復罷之是尚有延攬實意乎然髙宗朝似此君臣之間正色讜論史載頗多此皆祖太宗與房魏輩議論故套無實際而尚虛聲安能掩其失德哉盧承慶考督運失米官因其容色自若由中下遞改注中上目監運損糧當有定考乃以容色之間屢為改注直舞文骩法耳此蓋踵六朝惡習而不知其蠧政之甚曉政體者所不取也遣使分道賑給劉思立言參迎煩擾宜且委州縣目賑恤固有司之事然牧令未必皆賢保無有吏胥中飽民不霑實惠者遣使分道督察則人知忌憚而弊可潛消若云參迎妨廢豈州縣之下鄉即不致妨廢乎裴行儉討突厥於糧車伏壯士誘虜躍出擊之及下營後遽移髙岡水果大至諸將驚服注行儉於當時固為諸將巨擘然三百乘乘各五壯士當為一千五百人虜以為糧車驅去當必紛紛散行前後不齊且此驅行之際虜豈不覺必待取糧而後千五百人者齊自車中躍出奮擊是誰為之期㑹記載者欲竒其說而不自覺其必無是理致人疑笑矣又下營當避溪壑水潦必至之處行圍亦然有何竒特而致諸將之驚服行儉且自以為神益足鄙耳中宗帝因裴炎不肯官后父怒言我以天下與韋元貞何不可炎白太后廢帝目武氏窺竊神器已非一朝廢立之謀固不俟中宗失言而後定然中宗嗣位日淺他務未遑亟亟欲官后父且輕視以天下與人為怒時泄憤語其父子昏暗如出一轍而受制房帷之病亦見端於此矣武氏改國號以唐為周目武氏之罪實浮於吕氏蓋武氏革命而吕氏未革命也為當世之臣者不能為徐敬業之討賊則惟有棄冠服而逃耳如狄仁傑一再相彼盡心乃事而後世反以復唐之功歸之是皆託於明哲保身寬柔以教之論而未終讀夫子至死不變之語是非倒置莫甚于此余故表而正之周以武攸寧為納言狄仁傑同平章事綱綱目及纂要於是年已特書周以矣乃於丁酉冬書以而不書周此或係筆誤劉友益謬以為表其為唐夫狄仁傑安得謂之忠於唐其說已著於右設云以武攸寧為納言狄仁傑同平章事為無以字則是承上行文尚不知而可與言書法乎夫始以為同平章事書周而後以為同平章事之不書周又何足表其為唐哉王慶之等上表請立武承嗣岑長倩異議坐誅慶之尋亦因事杖死目武氏此時已悍然無所顧忌獨於皇嗣一節良心未盡澌滅猶徘徊觀望然長倩等忤諸武意言出禍隨已足見武氏意矣慶之欲逢惡而適以逢怒天網恢恢於此亦可見矣時擢用甚濫舉人沈全交為眯目聖神皇之謠武氏不罪注武氏不罪流言刑賞獨攬特更姓改物之始用權術以駕馭天下耳胡寅乃謂此明主所為宜其運動四海英賢無不俯首豈正論哉狄仁傑為來俊臣告反下獄引服武氏召問對言不承則死於拷掠因得貶目仁傑不承則死於拷掠之對明是貪生論者以為留其身以復唐祚然終仁傑之世唐祚何嘗復哉雖云善善欲長未免阿其所好婁師德教其弟以唾面不拭自乾宜笑受之目髙而不危滿而不溢處榮寵者自有正道笑而受唾豈以直報怨之義師德之言鄙極矣武氏出梨花示宰相杜景儉以隂陽不時引咎拜謝目景儉不以秋月梨花為瑞雖似優於阿諛者然是時女主臨朝隂陽倒置此即吕后時桃李秋華之轍景儉靦顔為相尚何燮理之足云乃以草木榮落非時引咎自責顯附於方正之操而隂售其固寵之術此與模棱者流相去無幾胡寅責其淺言以盜小名為無足稱尚未盡窺其底裏而為色莊所愚耳周安平王武攸緒棄官隱嵩山綱武氏革命當時守正不屈者惟李安靜超然逺引者惟武攸緒餘人貪榮競進甘受牢籠然每爵命甫及戮辱隨之附邪背正者究何益哉周以狄仁傑同平章事綱以狄仁傑同平章事之說己著於前兹特書周以正綱目之誤劉友益之失且後即書周以狄仁傑兼納言不益可見乎周狄仁傑從容勸武氏召還廬陵王目姑姪母子之喻李昭德前已陳之矣綱目於仁傑津津言之且以薦張柬之為復唐張本然柬之被薦時年幾八十使不及相而死事當奈何周狄仁傑為婁師德所薦而不知歎其盛德目仁傑歎師德盛德足見恩怨分明未忘芥蒂蓋當時有名者莫如仁傑不惟師德稱賢即後世讀書無識者孰不以仁傑為賢乎余少時亦有仁傑非感知己之深乃服其韜晦且以復唐自任之論今以武氏始終奪唐祚及仁傑不能匡復觀之未免失言所謂為學之道當日知其所不足亦猶薈說之意也夫周同平章事狄仁傑卒綱論己著前兹不復綴故易綱目書法以為為人臣而事二姓者戒以張柬之同平章事綱張柬之終有復唐之功雖云乘武氏之疾然此正宜用善善之意矣故從綱目書法武三思矯武氏遺制慰諭魏元忠元忠感咽涕泗目元忠素負重望頗能不為利害動心乃自嶺表召還頓改前轍捧制感咽時名節掃地蓋不待酸棗尉責以十失已知其無能為矣行百里者半九十里晚節可不慎哉流敬暉桓彥範張柬之袁恕己崔元暐等尋為武三思所殺綱流敬暉等者中宗也故略易綱目書法睿宗李景伯言都督權重宜遣御史以時巡察已而竟罷都督設按察使目自古有治人無治法李景伯等所云御史秩卑望重可以巡察奸宄秩卑則無實權望重是取虛聲明代撫按相持動輒僨事非其明驗乎元宗時窮治太平公主黨陸象先密為申理未嘗自言注象先於窮治私黨時從中密贊外人豈能與聞既未自言則其申理之事何由得傳於後紀載家阿其所好自相矛盾大率如此姚崇先設十事注姚崇以十事堅上意史書皆為艷稱今就其事核之曰不幸邉功而薛訥王晙何以屢致敗衄曰宦豎不與政事而髙力士楊思朂何以寵任不衰且崇於元宗之不應懼而趨出賴髙力士為之周旋更私出道上語崇心乃安則崇之所要與元宗之所謂能行者果安在而崇豈真能不結內侍者哉姚元之避開元尊號復名崇目崇之改名真所謂不通經義夫開元乃年號非諱名可比且尊號有嗣世遞加者勢必至無名可取又豈直韓愈二名嫌名之譏足以盡之太史奏太陽應虧不虧姚崇表賀目日月交食原可推算而知特以改其常修德修刑可耳若夫應虧不虧必因步測者之不精乃以為瑞而賀之可笑可鄙莫甚於此焚珠玉錦繡于殿前綱劉友益謂特書豫之未為切當明皇非真能斫雕為朴者不過博崇儉美名以飾觀聽耳皇祖御批譏其矯激太甚觀未幾復遣使求珍翠竒寶前後判然不侔誠不能掩其情僞矣以武氏鼎銘頒告中外綱武后竊唐室天下者也宜為元宗之仇讐乃以其鼎銘為受命之符姚崇方以為瑞而表賀賢相固當如是耶姚崇無居第注姚崇三為宰相居官亦不若懷慎之清素二子又頗受賂遺何至竟無居第考張說為崇作神道碑有云池臺琴筑優游暮齒猶得謂之無居第耶通鑑多引舊書如此條故不如新書之得實吐蕃公主求詩禮春秋于休烈言資之書愈生變詐裴光庭等言宜使漸陶聲教目欲假禮義以為漸陶與慮資權略而生變詐書生迂濶之論直不值一噱且求書者乃唐之公主非吐蕃也彼吐蕃即欲生變詐亦何藉於觀漢書哉記載者不特不達事機亦且昧於文義矣上種麥苑中親往芟之目耕藉已足勸農而必傴僂自芟斯過甚矣且帝既云此所以薦宗廟云云則當嵗以為常不見其繼此而行也子夏曰雖小道必有可觀致逺恐泥蓋謂此耳上欲立太子意未決髙力士言推長而立遂定目立嫡何事賴宦官一言以定欲不致幸蜀之變靈武之逼得乎詔饑饉開倉委州縣及採訪使給訖奏聞目已饑饉待奏報而後開倉民其奚救其必於饑饉之前即奏聞即命有司開倉庶乎民得稍濟耳若如元宗之制先發後聞是惟亷正如汲黯輩或可便宜行事茍非其人將見民未蘇而墨吏先飽其壑終於民無少救蓋元宗違道干譽之舉不可為訓也上慕好生之名令應絞斬者皆重杖流嶺南目赦有罪正以殺無罪故王通謂無赦之國其刑必平元宗於瑤琚之死不貸其子裴李之誅不宥其臣羅鉗吉網流毒天下豈真寬仁之主顧欲除斬絞以博好生之名是亦顛倒之甚者矣崔昌言不當以魏周隋子孫為二王後因命求殷周漢後為三恪目元魏周隋去唐未逺恤録其後不失厚道崔昌乃以閏位貶之傅㑹五運嬗代之曲說遐求殷周漢後為三恪妄孰甚焉次于馬嵬楊國忠為禁軍所殺貴妃楊氏賜死綱綱目書楊國忠及貴妃伏誅說者謂二人之罪宜誅書法所以正名定罪殊不知是時衆叛親離威柄不出元宗且元宗亦無誅之之意安得謂之伏法惟據事直書則罪名既著而元禮嗾衆劫君之惡亦自彰杜甫一生忠懇獨於北征詩褒美元禮太過不可為訓且彼時元宗顛沛流離楊氏又安能更為人患哉若謂宜誅則當於祿山未叛楊氏方盛之時捨身固爭方可謂之忠臣元禮所為正韓愈所謂又下石焉者在朋友尚不可而況君臣乎若元禮者直亂臣賊子其去祿山蓋一間耳太子即位于靈武綱馬嵬之命肅宗固再三辭遜矣兹靈武之自行即位出於何典且靈武距劍南為時不過兩月不聞馳一介奏告故范祖禹直斥為乘危叛父持議嚴且正矣張良娣産子三日起縫戰士衣及每寢常居上前注良娣新産為戰士縫衣猶婦人固寵取憐常態至欲居前禦冦竟自託於馮婕妤之當熊肅宗為巧言所惑不明甚矣先為小忠小信以成其大不忠不信婦寺類然他日竊柄宫闈幾蹈武韋前轍皆此一念階之禍也制以太子充天下兵馬元帥綱是時元宗未傳位太子豈得以太子即位靈武尊為上皇而即書為上皇哉故正書法至八月上皇使人齎册寶如靈武後始如綱目書上皇然太子既已自行即位故書上而不書帝以别之而於元宗則仍書帝八月後元宗書上皇肅宗方書帝肅宗李泌辭行軍長史帝言非敢相臣目不敢相臣語雖出孟子然非堯舜臯夔之正道房琯效古法用車戰敗於陳濤斜目車戰或宜於古而實不宜於今房琯用之取敗燎原隻輪不返自當繩以喪師之律泌何以復為營救耶上委信李輔國與張良娣相表裏譖殺建寧王倓目孟子稱德慧術智存乎疢疾肅宗為太子受困楊李疢疾已甚宜其操心慮患矣乃即位以後宦妾交煽甘蹈前車既不能保其子且不能安其父豈所謂下愚不移者乎房琯罷綱琯之得罪皆其自取徒以與杜甫交藉其羶薌世遂有以琯為寃者可謂阿其所好而失正道矣廣平王復西京固止僕固懷恩追賊及拜葉護馬前請止俘掠目并注時賊衆潰竄之餘乘勢悉鋭而進安守忠等何難就縛廣平狃於小勝急圖休息其識乃出懷恩之下至調停回紇俘掠一節無識者以為美談不知以儲二之貴屈體葉護馬前復成何體制況其時西京初復萬衆具瞻即正義直辭喻以功成重賚足償前約而人民土地不得妄有殘擾葉護亦難置喙何至搖尾乞憐若此蓋其遇事畏葸中於錮疾者甚深觀其即位以後之設施足見庸懦無為且并非刻意輕身冀博蚩氓感泣而已也命郭子儀等九節度討安慶緒不置元帥但以宦官魚朝恩為觀軍容使目易言師貞丈人吉列鎮在軍無帥何以敵愾肅宗即以郭李元勳難相統攝何難使子儀光弼分道進取乃專委宦者反居二人之上輿尸失律理固不爽九節度相州之潰又誰咎耶上召郭子儀還朔方士卒請留子儀紿之而去李光弼遂馳入東都代領其軍目李郭雖並為中興名將輸忠王室然朔方受代之際使子儀光弼易地而居恐光弼不能如子儀之略無芥蒂矣二人優劣當以此定之評鑑闡要卷五
