body:
  text: 明世宗詔議崇奉興獻王典禮楊廷和等言宜如漢定陶王宋濮王故事目嘉靖欲推崇自出本屬人子至情諸臣必執宋時濮議相持無論事理不同且亦無以慰尊親本願蓋旁支入承大統於孝宗固有為後之義然以毛裏至親改稱叔父實亦情所不安嘉靖既有父母互易之疑復有避位歸藩之請其心尤為迫切誠使集議之初即早定本生名號加以徽稱使得少申敬禮則張璁等亦無由伺間陳言或轉可隱全大義乃必强詞爭執持之愈固激之愈深於是稱帝不已進而稱宗稱考不已甚而祔廟其終至於瀆禮亂倫亦諸臣不能於天理人情斟酌至當有以致之耳雖然國家將亡必有妖孽此亦明社將屋之一兆耳王守仁謫龍場時日繹舊聞忽悟格物致知當返諸心故其教専以致良知為主注自道學之名立儒之好名者雖日侈談理道而無裨實用者多若王守仁功業表著原不係講學為重輕其致良知之說蓋由尋繹而得非徒探索空虛者比逮其後門徒浸廣欲誇授受之殊以致輾轉滋紛漸生異說遂招訾議之口不當專歸咎師傳也帝欲坐張延齡謀逆族其家張孚敬力爭得長繫目張延齡縱恣殺人罪固自取但嘉靖於昭聖太后不能無纎芥猜嫌因欲釋憾於其兄弟實乖孝事之誠張孚敬再四執持立言頗為得體但孚敬性稱忮刻又善逢迎何獨於延齡持正保全或自揣為衆論所不豫欲藉此以沽名末路否則素與延齡兄弟交通假公議以行私惠皆未可知耳劉天和鎮三邊倣秦紘制隻輪車以練諸將注兵車雖古制亦不過施於平原彼此伎倆相等者耳後世地利不同用之即難取效房琯陳濤之敗已事可徴至宋而李綱宗澤間一議行卒未收其實用況隻輪人挽運用鈍遲欲以此挫鋭衝堅殆如兒戲劉天和恃為變通良法輒用以練習邊兵不知一車之上而弩㦸牌盾錯置雜陳勢必艱重難勝所謂適用者安在況邊隅攻戰全在精騎摧鋒豈可轉以連車礙其馳騁書生迂拙之見真不值一哂耳言官知帝眷夏言惡郭勛因共劾勛目郭勛縱恣妄行稔惡已久言官豈無見聞何前此噤無一語及揣知勛之主眷潛移即爾紛紛補牘陽博不畏彊禦之名而隂行揣摩取巧之術明代諫垣雖有實出伉直者而似此猥鄙者正復不少帝宿曹妃宫宫婢楊金英以組縊帝有走告后者馳救得蘇后遂殺端妃及王寧嬪目金英謀逆一事嘉靖既宿曹妃宫則妃自不得辭不謹之愆若竟謂其與婢同謀則無此情理蓋金英即肆凶謀勢必慮人聞見彼走告者烏從遽知且其人亦必同係曹妃宫婢當此危懸呼吸救難刻遲乃不近白妃而逺白后其為搆陷顯然方后復乘嘉靖疾悸之時輒收妃嬪與逆婢駢誅滅口謂非后之妬害其誰信之然其致此大變則由嘉靖不德明祚將傾故亡徴先見耳仇鸞欲開馬市楊繼盛上疏極諌詔下鸞等議鸞攘臂詈之復進密疏乃下繼盛獄目仇鸞畏冦茍安創開馬市以取侮敵人楊繼盛抗疏極言其於利害得失至為明暢嘉靖果為感動即當奮獨斷罷行何以仍下鸞㑹議鸞既窺知意方偏向輒敢攘臂肆談密章隱告以務求曲售其私而諸大臣亦但言遣官已行竟不復論其事之是非模棱兩可嘉靖竟至不能自主貶斥轉加小人撓亂國是真毫無忌憚然鸞之所以敢如此則以恃嚴嵩而信嵩自蔽非嘉靖之咎其誰之咎哉楊順承嚴世蕃㫖與路楷謀中沈鍊㑹獲妖人詞連甚衆遂竄鍊名其中殺之目沈鍊觸忤權奸致遭貶謫楊順以封疆大臣竟甘與路楷同為私門鷹犬逞志搆誣至於弋獲妖人而喜謂其足以報嚴公子遂從而羅織以殺直臣實為辨髦國法逮䕃子遷官復嗛於相酬之薄戮及其孥以冀為取媚彼雖靦然人面實不知其是何肺腸也然方伯媚奸臣之子而殺人之子而嘉靖不知是時國政尚可問乎南京兵亂殺總督糧儲侍郎黃懋官綱營兵驕悍惟當申嚴紀律以警不馴黃懋官乃減餉緩期妄行裁抑措置本為失當但軍士輒敢戕害督儲大臣即與叛逆無異自當廣搜黨與重示刑誅乃何綬持紙犒金李遂閉閣給劵其畏葸縮朒情形實為可笑可鄙比亂兵稍戢轉以定變邀功而首惡就擒又僅誅既死之三人以茍圖了局軍政陵夷若此明之不即亡幸耳帝夜坐獲一桃御幄後以為天賜㑹白兔夀鹿生子帝因言竒祥三錫天眷非常注獲桃幄後其為中官欺飾形跡顯然嘉靖何以遽信為天賜至兔鹿馴育苑囿孶産尤屬常事乃輒目為竒瑞至於告廟稱賀且詡稱眷祐非常誕妄滋甚嘉靖崇信左道惑溺已久較之漢武尤為庸鄙爾時廷臣亦從而附和之天寶祥符紛紛夢囈先後殆同一轍耳穆宗戚繼光鎮薊州製兵器間以長鎗筤筅又以邊卒不堪用請募浙人為一軍用倡勇敢目并注筤筅粗二尺長且一丈五六尺而刃在其頂又長一尺一人持之不久且疲二人持之旋轉扞格必不適用而當時以為禦敵精器真不值一噱且北方之强勝南方之强人所易知者浙兵即素嫻步伐安能遽勝北軍蓋繼光𠞰冦東南本多舊部其奏請募調不過亷頗思用趙人之意耳而記載家左袒南人遂若南人之果勝北人者以是類言兵有不取敗之理乎神宗徐貞明請興西北水利又著潞水客談論水利事目水田雖間可行於西北然亦惟平流渟瀦者始可引為灌溉之資非若東南之隨地可施溝􅍒也蓋水利之興必先順水土之性南方土性橫故拖水能行北方土性立故滲水而入且南方港汊瀠洄澗溪演迤挹注故易為力然未聞舉長江大澤悉藉以浸彼稻田也若北地水勢湍悍盈涸無常且多係經流獨貫雖支河宣泄止能殺其漫溢之威而隄堰防遏之餘淤沙亦惟聞宜麥概欲蓄陂塘以收稌穱乃必不然之事也元時虞集首倡水田之議而未收其效已為明驗徐貞明乃欲遍青徐遼海盡起良田實未能審形度勢至其潞水客談所載非不娓娓可聽而修舉未聞臚陳大利紙上空言仍不離乎書生迂濶之見耳申時行請詔令諸曹建言止及所司職掌聽其長擇而獻之不得專達目周官大事從長小事專達特為服官課績而言若諌官職司獻替則據事披陳宜務申自靖之義古稱臺無長官正為政府副封力杜門户惡習也時行逆揣上指令諸曹不得專達聽其長擇而獻之是不惟啓黨援之漸且愈滋煬蔽之奸卒之疏不進御則建言者明知披覽弗親益可譸張為幻且藉以攻擊異已而盜名立勢無所忌憚何異揚湯止沸哉諸皇子婚詔取太倉銀二千四百萬兩户部告匱目太倉為國計所繫度支當準常經神宗五子縱同時行婚何竟需至二千四百萬之多實事理所不可解蓋由神宗一切漫無稽核惟聽中涓冒取浮支且從而藉端搜括國既蠧於侵漁民復困於征斂上下空虛危亡日逼故明命脉雖戕於奸璫實神宗自戕之也帝有疾召沈一貫具詔除弊政翼日疾瘳悔追前諭一貫惶遽繳入王義唾言稍持之礦稅可撤目神宗信任閹人礦稅之擾蔓延海內雖盈廷籲請若罔聞知㑹搆疾而召見閣臣盡除弊政不可謂非轉移之機沈一貫既承此㫖正宜迅下所司以期廣德音而蘇民困何乃濡遲觀望翼日尚未奉行致神宗得以追寢成命真全不以國事為心者中涓唾誚曽若輩之不如顧既不能力持於始其後復借星變為由屢請罷撤隂為阿順取容而陽以讜言弋譽究之欲蓋彌彰耳溫純為沈鯉郭正域辨妖書誣陷又言楚宗人無反狀積忤沈一貫目溫純清白自持奉職固稱無忝即其為沈郭辨眀誣枉亦人心公道所存至於楚宗倡亂敢於持兵入署擊殺封疆大臣實與叛迹無異逮治俾正厥辜實不為枉乃純轉力明其無反狀未免縱惡失刑其後孫慎行復襲前說請釋諸宗當時亦竟共韙其議總由諸人深嫉一貫凡所措置必欲一切力矯之是皆朋黨偏見固結於中竟不以朝廷事理曲直為念耳李三才頗通賂遺結納海內顧憲成貽書葉向髙等盛稱三才亷直目李三才本一賂遺結納之人矯飾沽名其心豈誠傾折東林者特深窺一時清流惡習因借蔬素小亷交歡講社以圖內可把持朝局外堪標榜士林耳若髙顧諸人用理學之名倡盟壇坫甚至輔臣臺諫莫不竿牘公行況如李三才久以幹略推重封疆未始不欲藉其聲勢資為攀援此真當日彼此託契之由非膚論所能推見至隱者卒之弊深禍亟焦爛為期蓋緣士氣日乖則人心日替而國運亦日衰可知勢㑹所趨即諸黨人亦難自主可勝歎哉男子張差持梃入慈慶宫伏誅綱妄男子闌入禁門自有應坐之律風癲與否本無事深求其盈廷議論紛呶釀成疑案總由當時翊坤擅寵好名者輒欲以安儲自任遂爾遇事生風不知鄭妃果意存奪嫡則宫掖隂謀豈能防測何必令狂徒持梃公肆逆圖況太子深處慈慶又豈一擊之所能傷顧蓄意三年僅成孟浪之舉雖至愚不應出此下䇿其事固情理所必無乃舉國若狂妄生荆棘必待至尊臨軒剖晰東宫委曲求全君臣父子之間至以文僞調停尚復成何事體雖由諸臣之好事生非亦可見建儲之無益有損其流弊固無所不至耳兵部請治兵不報綱詰戎肄武本非獨恃團操具文所能握其機要況時當邊備日弛士心解體方有日蹙百里之勢為樞臣者即以簡練將材庀儲軍實叩閣力陳猶懼不克有濟至京營停操三年果能力為整飭如古中尉衛尉所𨽻亦可稍資捍禦之用乃計不出此徒云當新戎壘以應秋氣明季諸臣不知國家利病習為文貌之言茍且塞責皆此類誠可笑亦可憫矣光宗帝有疾李可灼進紅丸又李選侍據乾清宫羣臣趣移噦鸞宫目紅丸移宫與梃擊並稱三案其是非本無難論定而當時異說紛哤入主出奴牢不可破遂爾自蓄疑團挺擊事前已具論之若紅丸之案謂李可灼必有逆謀自非篤論但可灼本不習醫其藥何由進御方從哲雖婉詞疑詰而藥未試嘗竟不力為阻止藥甫進而遽遘不諱二人復何忍偷息人間乃從哲於撰寫遺詔時尚欲加可灼以優賞無怪盈廷之嘖有煩言律以許止趙盾惡名誠無可辭而遽請顯正刑誅則太過矣至李選侍以先朝嬪御乾清固非所宜居及既徙噦鸞羣疑即當盡息又何至捕風捉影附㑹宫禁傳聞致創為雉經入井之說狺狺爭訟經年不休尤為悖妄總由諸人初無忠君愛國之心而分門别類私意蔽錮遂至幸災樂禍託為忠愛以逞臆見而肆譏彈其心實不可問逮議論未定而宗社已墟口舌之痾殆亡徴之先見耳熹宗帝好親斧鋸椎鑿髹漆之事每引繩削墨魏忠賢輒奏事帝言已悉令好為之注明事至熹宗勢已一蹶不振況復身親賤伎欲與巧匠爭工其為客魏煬蔽實由自取但自古閹奴乘隙為奸亦自師承有本如秦趙髙候二世燕樂促令李斯奏事以激其怒唐仇士良教其黨云天子不可令常閒宜娛其耳目無暇及他事然後吾輩可以得志觀忠賢故智前後如出一轍可見宵小肺腸不謀而合無如昏庸者明知覆轍而蹈之魏忠賢令許顯純鞫汪文言獄使引楊漣等納熊廷弼賄乃作供狀逮下詔獄目楊漣等久以伉直為羣小所嫉比漣劾忠賢二十四罪鼠輩益欲得甘心說者或謂其平日不宜與汪文言交往以自貽慘禍但文言結王安以贊成善政尚非自私自利視彼呈身逆閹者實有間矣文言尚無可罪之由於諸賢又何責備當時覔題搆陷特借文言為發難之端而且巧附封疆逞其毒手以致填尸牢狴血胔交橫忠魂共抱沈寃為從來未有之竒慘至今讀之猶為切齒然諸人正氣凜然不磨當日之摧殘備至者孰知即所以表章之哉莊烈帝楊所修等知帝惡魏忠賢因先劾崔呈秀以嘗帝目魏閹流毒貫盈中外切齒一時工寮俯首莫敢誰何其尤甚者方且呈身義兒播惡於衆邪焰之熾實自古所僅見逮莊烈嗣位既已洞燭其奸庶幾一快神人之憤若給事楊所修前此請輯三朝要典原屬逆黨推波助瀾之人至是始識氷山難恃猶觀望逡巡姑劾呈秀以嘗帝蓋明季士大夫波流之習浸淫日久其為門户擊排者固涉客氣虛驕下此則一味詭隨因時起倒而已其真能持正嫉邪者自周宗建楊漣諸人而外固指不多屈真士林之恥也詔廷推閣臣倣古枚卜典召九卿科道入乾清宫貯名金甌焚香肅拜以次探之目帝舜官占蔽志之語所以訓禹辭位非謂辨論官材必當取信於神也後世乃沿襲為金甌擇相故事夫探枚夾箸思欲得真材於摸索暗中之間其為可笑更何待言詔定魏忠賢逆案韓爌等不欲廣搜樹怨列上者少復詔喬允升等審定以六等定罪目韓爌等受詔審定爰書自當持正詳核俾奸徒不至漏網乃始則託言不知內侍繼復以法非所習為辭而王永光亦以不諳刑名自諉曽不計逆黨之朋謀害政實國法所難寬顧以廣搜樹怨為虞而甘為之容私曲徇其心豈可復問至喬允升等所定之案雖若羅列無遺然其擬服上刑者類皆已經正辟之人而擁戴僅止荷戈諂附亦概從城旦所坐失倫究不免於隂行庇護以懲奸重事而諸臣瞻顧遲回竟不克持明允以昭炯戒明季朝臣積習頽壞於此可見安得不淪於亡梁廷棟言民窮之故惟在官貪使貪風一息即再加派民亦歡然帝因令户部議畝加三釐目民窮起於官貪廷棟所言不為無見然未聞懲官貪而先加派民之憔悴轉深所為歡然者安在蓋明季耗敝之由自神宗礦稅征求日朘月削時閲數朝物力更無留餘之地及莊烈時大兵大疫元氣已竭盡無遺又軍興日增轉餉日絀雖藉口醫瘡并無可剜之肉即亟允呈潤之疏未必有濟況并此不能用乎曹文詔討山陜諸賊幾盡命㑹討畿南賊為劉令譽所劾調大同總兵目曹文詔勇敢無前威名夙著關中山右𠞰賊屢著成勞即其移師㑹討畿南亦每戰克捷諸將之足以當賊者實無出其右且方敕以剋期平賊正當聽其乘鋭建功劉令譽乃以纎芥宿嫌托詞妄劾實為挾私忘公部議又不權事理輕重輒因巡按一言移之他鎮致賊徒無所畏憚出入自如未幾而縱使渡河鴟張益甚悔亦何及明季重文輕武以致宗社丘墟吁可怪矣溫體仁為吳甡言流賊癬疥疾不足憂目溫體仁巧詐阻深貌為公直以要結主知及在閣惟日以蔽賢植黨為事甚至力翻閹案變亂是非而於邊計民生皆漠然置之不問已為悮國罪首至流賊橫行日久閫帥覆轍相尋其糜潰滋深雖童孺亦知為淪胥無日乃體仁並未聞有𠞰蕩深謀轉指劇冦為癬疥置隱憂於度外真不復少具人心莊烈偏聽生奸尚加信倚崇禎十七年之間相更五十而體仁獨居位八年終致傾危莫挽亡國之君各賢其臣於體仁又何責焉武生李璡請括江南富户令報名輸官錢士升擬㫖下刑部提問帝斥以沽名士升引罪乞罷許之目令富户報名輸官與禦人國門何異當時核田增賦方以峻令苛求小人希指生風遂敢以搜括之策肆行入告錢士升擬㫖提問亦欲加懲創以警妄言耳乃莊烈覽疏既斥以沽名復聽其引退初不以括富為非故轉覺正言逆耳國勢阽危尚不知為閭閻留一線元氣非自促喪亡而何帝遣中使往閩廣覘熊文燦為人文燦被酒有自負𠞰賊語會楊嗣昌薦之遂命總理南畿軍務目文燦歷官既久且顯莊烈豈容不識其為人乃以𠞰賊重任而令中使隱覘其是非更何足信況文燦酒酣耳熱不過浮誕狂談其胸中本無定見閹奴德其贈遺專務揄揚莊烈更因嗣昌借內援薦引擢總軍務卒致庸劣僨轅當時國勢將傾即慎簡賢能猶恐難勝扶危之選而朝廷求才大臣推轂皆取必於宦官安得不益促其滅亡乎周延儒歸後失勢內慚張溥言公再相易前轍可重得賢聲因與其友吳昌時等為交關近侍復召入閣目延儒稔惡已久其失勢內慚與萬安之夜望三台何異張溥等乃欲以易轍相要冀其復收桑榆之效真不啻癡人說夢其尤可怪者人品之賢奸朝廷縱茫無鑑别而賜環起廢何至以昌時等一二憸人交通內侍遽得預操升庸大柄東林錚錚者尚有所交關於延儒乎何誅而當時所謂清流者亦可知矣髙名衡議决朱家寨口河灌賊賊亦决河灌城開封遂陷目決水灌軍古人未嘗不出竒制勝然必自據髙原始可收效建瓴之勢未聞地處沮洳轉欲自潰其防者開封瀕臨大河未始不可借洪流為遏險即被圍至再亦惟死守以禦冦氛髙名衡等乃忽倡决河灌賊之計不知汴漲逼城勢如釡底即能一舉殱賊居民尚恐不免沈蛙營即可移城邑又安能遷避乎坐令稽天巨浸反資賊手以毒害生靈庸夫逞臆妄為致貽酷禍更不啻藉冦兵而齎盜糧矣甲申嵗崇禎十七年綱通鑑輯覽將成司事者舉通鑑綱目三編之例於甲申嵗欲大書順治元年分注崇禎十七年於下且凡勝朝事皆别書明而於李自成陷京師即繫以明亡余曰不可夫三編之例非述續編之例乎續編於元順帝二十七年即分注明年元主北奔而繫以元亡去至正二十八年為洪武元年且自順帝十五年明祖起兵之後於凡元政即别書元以示異雖臣各私其君之義也而朕實鄙之蓋以理責人者必先以理自處天下者天下之天下非一家之天下也言悖而出者亦悖而入居今之時貶亡明而尊本朝如明之於元其誰曰不可然朕不為也通鑑輯覽之書非一時之書乃萬世之書於正統偏安之繫必公必平天命人心之嚮必嚴必謹且正編續編既一正其自視尊大之陋習而顧於本朝嬗代之際有所偏向是不有恧於心而貽來世之譏乎兹於甲申嵗仍命大書崇禎十七年分書順治元年以别之即李自成陷京師亦不遽書明亡而福王𢎞光元年亦令分注於下必俟次年福王於江寧被執而後書明亡夫福王設於江南能自立未嘗不可為南北朝如宋髙宗之例也而奈其日即慆淫以致天命去而人心失是非開創者欲究我兵威而實守成者自失其神器也若夫唐王桂王窮竄邊隅茍延旦夕此正與宋之帝昺帝是同例不可仍以正統屬之用以示萬世守成之主思天命人心之難諶凜凜乎惴惴乎保祖宗所貽留為臣民所繫屬而不敢謬恃書法之可有髙下焉庶幾朕纂通鑑輯覽之本意或不失春秋大一統之義乎福王附明兵部尚書史可法等奉福王由嵩監國於南京綱續通鑑綱目於元順帝至正十五年明太祖起兵之後即書元以去其正統此大不可者至崇禎甲申以後本朝已定鼎燕京而福王雖偏安江南亦即逾嵗被執明亡則甲申五月以後乙酉五月以前明之正統雖未亡而明之偏安已不保故用元順帝十五年以後之例書明以别之然固不如續綱目之左袒也睿親王遣人齎書致史可法可法旋遣人答書目昨閲史可法答書曽書其後附録於此幼年即羡聞我攝政睿親王致書明臣史可法事而未見其文昨輯宗室王公功績表傳乃得讀其文所謂揭大義而示正理引春秋之法斥偏安之非㫖正辭嚴心實嘉之而所云可法遣人報書語多不屈固未嘗載其書語也夫可法明臣也其不屈正也不載其語不有失忠臣之心乎且其語不載則後世之人將不知其何所謂必有疑惡其語而去之者是大不可也因命儒臣物色之書市及藏書家則亦不可得復命索之於內閣册庫乃始得焉卒讀一再惜可法之孤忠嘆福王之不惠有如此臣而不能信用使權奸掣其肘而卒致淪亡也夫福王即信用可法其能守長江為南宋之偏安與否猶未可知而況燕雀處堂無深謀逺慮使兵頓餉竭忠臣流涕頓足而歎無能為惟有一死以報國是不大可哀乎且可法書語初無詬誶不經之言雖心折於睿王而不得不强辭以辨亦仍明臣尊明之義耳余以為不必諱亦不可諱故書其事如右而可法之書並命附録於後夫可法即擬之文天祥實無不可而明史本傳乃稱其母夢文天祥而生則出於稗野之附㑹失之不經矣評鑑闡要卷十二
