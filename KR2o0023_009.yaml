body:
  text: 宋孝宗以張浚為樞密使都督江淮軍馬綱孝宗初召張浚嚮用之意甚殷既曰倚魏公如長城又曰雖乞去之章曰上朕決不許賜書又有須與卿終之之語若深相倚任者何以福州之命去之曽無難色及虞允文宣撫四川且戒以無效張浚迂濶又若夙所憎嫉者然何前後矛盾若此蓋其始不過博取恢復美名藉以虛張聲勢後覺事竟難成遂無所顧惜其情不覺流露直是無定見耳葉顒言自古明君用人使賢使愚使姦使盜惟去泰甚蓋指龍大淵目用人固當隨才器使賢愚各由生質固不妨並進兼收若姦盜法所必懲豈宜進用葉顒之言蓋指管仲陳平者流耳然管陳不常有而姦盜非盡有竒材也顒於龍大淵隱約其辭飾為不經之說思欲遷就調停不得謂之藎誠建白也帝大閲于茅灘親御甲胄指授方略戈甲耀日旌旗蔽天目習武練兵固國家要務但是時兩淮邊備猶未修復僅僅簡閲禁軍以戈甲耀日旌旗蔽天為誇詡之詞何濟於事乃有今嵗大舉之言自欺欺人直不值一噱耳帝以射弩弦斷傷目陳俊卿言騎射之事宜永為後戒注射為六藝之一習射固所不廢處承平之日已當安不忘危況在偏安僻處之際乎孝宗留意馳射尚屬志足有為或可藉此以先勞厲衆然亦何至弩弦傷目亦可謂無能之甚矣而俊卿遂有當永為後戒之辭爾時君若臣之設施若此何怪其終不能恢復中原乎帝以上皇石池水銀言買之汪尚書家遂怒應辰應辰力求去然水銀實非買自應辰家目上皇謂水銀買自汪尚書家孝宗既聞此言即當詳加體察如其事果實則以大臣而沽直牟利譴責固所應加否則宜為之辨白乃懷其夙昔建言之嫌勃然詰諷致應辰不安其官復假他事以罷是非大公至正之道以致有實非買應辰家之疑案蓋孝宗既不能處之以光明正大故不免左袒應辰者為疑似之言也金主在上京宴宗室羣臣故老自為歌本曲其詞道王業艱難繼述不易至慨想祖宗宛然如覩歌畢泣下目觀至此而不戄然惕􅋏然失愀然感者亦無人心者矣帝傳位於太子太子即位尊帝為夀皇聖帝綱髙宗崩未逾二年帝即傳位名雖託於孝實則怠於政蓋知恢復之難成又恐建白之難拒故為是退避之計其視人臣之託言髙尚者更為可鄙光宗帝祀南郊聞黃貴妃暴卒又郊壇大風雨滅燭震懼增疾政事多決于李后目光宗政事多決于后視唐髙宗令后決百司奏事何異至斷臂擅殺之慘亦復相同然李后之毒悍實皆光宗暗懦不振有以釀成之而不朝夀皇失子道其罪更浮於髙宗矣金主詔行宫外地及圍獵之處悉與民耕目嘗論孟子文囿芻蕘雉兔之往久之并芻蕘雉兔之地亦不可得所謂盡信書不如無書也章宗乃以圍獵之地悉與民耕則講武且因之而廢觀章宗論察吏教民之道未嘗不知治要顧核其平日所措施乃偏以典章文物為急未免近於好名而於詰戎肄武之道棄之如遺遂盡變金源舊風國勢日就孱弱大定之業衰矣說者咸以章宗為守成令主然子孫不能承祖父基緒致家法因之而隳雖有善政亦奚足道哉謝深甫請帝朝重華宫帝感悟趣命駕出至御屏為李后挽留遂傳㫖罷還內目晨昏定省天性自然固非作而致之者至於侍從連章力諫臺臣慟哭殿庭即勉强往朝而本心已不可問矣乃甫趣駕欲行旋以李后挽留即止忽而感悟天良忽而澌滅殆盡光宗既非失心狂易之疾何昧於父子之親受制悍后恬不知恥此誠咸丘䝉所云天下殆哉岌岌乎之時矣寧宗帝始朝太上皇於夀康宫綱書始朝則前此之不朝可知寧宗即位至是已閲五年定省之禮闕焉不講夫以父子至性睽隔久逺返之于心其能安乎且光宗之不朝夀皇在廷交章論諫至有內禪之舉寧宗追思前事更當痛心疾首乃不知幹蠱而顯蹈覆車羣臣方以上夀禮成相率稱賀寧宗亦竟靦顔受之真不解具何肺腑然光宗不孝孝宗故寧宗亦不孝光宗天道好還此之謂矣元太祖却特特穆津元年注前以史鑑所載金朝人名音譯失真謬妄相傳因命詳加釐訂附釋各條分注之下以正前訛並於初見處批示大㫖兹閲䝉古人名其舛誤與金史等我朝中外一家䝉古諸部久為臣僕其語言音義咨諏所及皆可周知又以竒渥溫得姓所自必元史傳訛詢之喀爾喀親王成衮札布得其所藏䝉古源流一書有元事蹟氏族頗具梗槩始知竒渥溫乃却特之誤蓋䝉古書却特與竒渥溫字形相似當時宋濂輩承修元史既不諳其國語又不辨其字文率慿粗識䝉古字之人妄為音譯遂誤以却特為竒渥溫不啻魯魚之舛今既為訂謬且以釋疑實考古之一快因為參稽譯改以正史鑑之疑舉數百年之蹖謬悉與辨剔闡明以昭一統同文之盛且俾讀史者得免耳食沿訛之陋云時下詔伐金有兵出有名師直為壯之語注寧宗時事與髙宗異髙宗南渡之初去靖康覆亡不逺且父兄俱留係金庭使能發憤自强雪國恥而還二帝用兵未嘗無詞且當時亦有韓嶽諸將可資恢復之力也寧宗朝所謂老成宿將者為誰且當和議久成金羣臣咸請先舉而金主堅守和約拒而不許乃無端稱兵召釁曲直瞭然況誓書誓表口血未乾忽欲藉口復仇頓忘其為稱臣稱姪之國尚得謂之有名及援師直為壯以自解乎畢再遇引金人戰以香料煮豆布地餌金人馬又縛羊使以足擊鼓有聲因潛拔營去注轉戰未定焉得有暇煮豆而且前且却道路孔長又安得有如許熟豆布地況戀棧不前亦惟駑馬則然若乘馭者鞭䇿得宜亦不虞其盤桓不進金人既乘勝追逐又善於馳騁何至聽馬之自行自止且馬正疾驅亦不能聞豆香而駐足就食況交戰竟日馬饑彼此相同止圖誘撓追騎寧不為己馬計乎至於縣羊擊鼓更同兒戲此蓋再遇過於粉飾當時不加深察遂從而傅㑹之宋史之不足信大率如此䝉古之先各自為部居烏桓之北與九姓回鶻故城和林接壤目唐書稱回鶻之先本胸奴則似與今䝉古相類又言其善騎射喜寇鈔復近厄魯特之習故向詠唐回銅器詩序即疑唐史回鶻傳或有淆訛將俟餘暇博考兹閲通鑑輯覽因復加考訂則回鶻于唐末西徙火州後遂蔓延西域五代史雖仍稱回鶻而以馬市易多齎寶玉正與今回部之和闐及哈薩克諸處物産相合至遼史始有回回之名與回鶻並列而元史則回回回鶻彼此互稱蓋唐以前之回鶻本與䝉古接壤故風俗頗似䝉古唐以後之回鶻散處今回部之地故物産與回部略同若夫紇轉為鶻鶻又轉回音有緩急故傳譯不同亦猶畏羅之當為衛拉特乃蠻之當為奈曼也特詳辨之以釋諸史之舛互云金人索韓托胄首以贖淮南地遂命以托胄及蘇師旦首送金師目金人必欲得托胄師旦之首特惡其倡議用兵也在宋人則不當以此惡托胄夫托胄之奸罪素著乃宋之罪人非金之罪人也恢復況非其罪即云用兵之議倡自托胄寧宗既從其謀豈可復諉咎於下祇冀和議之成不顧事理之非宜胡寅譏之也金呼沙呼逼金主出居衛邸圗克坦鎰聞難作還第已而勸立升王目圗克坦鎰既為相遇國家大變既不能討賊又不能盡節徒以定計䇿立委蛇自免豈得謂忠臣哉金人來督嵗幣真德秀請絶之遂罷金國嵗幣目周禮以宋罷金嵗幣為差强人意此殊足鄙當紹興時宋方與金搆怨宋之君臣不能力圗恢復以雪仇恥顧懼金人强盛靦顔饋納冀速議和固已甘心臣服逮大定以後罷兵修好交睦已非一日乃因䝉古侵陵金勢浸弱忽爾渝盟罷幣失己之信幸人之災是無恥耳且是時金不能為宋患而䝉古之焰方張不知助鄰以禦敵轉欲抑弱以扶强虢亡虞及理勢必然則宋人所自詡以為得計者孰知即其失計之甚者乎金中都經略副使賈瑀殺苗道潤道潤將張柔襲之綱張柔非奉命不可謂討且其後又降䝉古故正書法曰襲金遣使如夏議和綱金是時雖不及大定以前之盛使能發憤自强猶足以自守何至效宋家柔懦之習動輒議和使䝉古敢於侮慢相加宋人又復依違無據至西夏悖好負德更不應向其下氣輸情徒然示弱而不足以紓患是忘己之先人所以制人者即用人之受制於己之下策而反受制於人不亦大可哀乎長星見西方䝉古耶律楚材言女真將易主目金距此時逾一年四月始易主何係於長星之見且彼時南有宋而北有金䝉古亦方興之國而西方則西夏之地長星究為誰見耶此不過附㑹楚材明天文之說而不知其怪誕已甚也理宗湖州潘壬起兵謀立濟王竑既而竑討壬壬走史彌逺矯詔殺竑綱濟王既身被黃袍發軍資庫金犒兵則非固執臣節始終不從者矣後知事不成乃帥兵討壬故變綱目書法以示不盡豫之之意詔求程頤後得四世孫源以為藉田令目理宗在位甚久政無足紀後人或許其能推崇理學爾時內外政紀要於此者多矣乃無一整飭徒慕虛名毫無實濟則亦烏足稱道況祗褒贈已往之程朱而不用現在之真魏即所謂推崇理學又與葉公之好龍何以異哉時檄彭􅗘經理楚州又以時青望重檄青區畫􅗘將張惠因縛􅗘以盱眙降金目彭􅗘輕儇無決坐失事機其過固不待言若時青不過紅襖賊魁降金復叛歸宋始終一進退無據之人耳有何重望而朝議忽而檄􅗘忽而檄青致使諸將離心釀成事故青之畏首畏尾密報李全遷延不出適以自殺其軀無足深責而宋之君臣瞀昧無知欲弭亂而轉以速亂果何所見而成此大錯邪先是金完顔賽布言宰相須用文人因請致仕及是䝉古攻汴日急平章博薩懼往為質力請起復賽布為相目賽布為宰相必用文人襲世俗迂腐之說而忘金源藎臣之本夫金源初起大東爾時豈有文人輔成創業乎況國家有事之日尤當與共安危若止潔身獨善而置國事於不顧與國休戚之謂何然賽布後此尚能殉義以全大節若博薩慮議和為質力薦賽布以避患更為小人之尤而不足責矣時史彌逺死帝始親政勵精求治鄭清之亦慨然以天下為己任目理宗受制權奸九年直待彌逺死後始親政事前此之闕失既多即欲勵精求治亦復何及且鄭清之因黨附彌逺而進其品詣已概可知安望其有所樹立乃靦顔以天下為任君若臣其將誰欺其亦無恥之甚矣帝嘗憑髙望西湖中燈火言必賈似道使史巖之戒之巖之言其才可大用目賈似道燕遊湖上不返燈火盛陳理宗既憑髙望見即當切責俾改其過過而不改罪之可也乃徒令京尹傳言示戒巖之復曲意阿諛轉謂其才可大用馴至柄政擅權敗壞國事皆理宗之姑息釀成之耳金李伯淵謀殺崔立先以書詣全子才軍約降乃燒封丘門請立視火就馬上刺殺立目爾時蔡州不守哀宗死社稷伯淵等方擁重兵守汴自當痛哭誓師矢死以圖報復況宋兵罙入尤當竭力嬰城乃竟聞風約降遂成內潰臣節已虧矣且其詭謀殺立徇私嫌而非申國憲是立固有當殺之罪而伯淵等非可殺立之人續綱目書誅以豫之于義未允因改書而申其論趙范以入洛師潰劾趙葵等輕遣偏師無律致敗詔削秩有差目北復三京其謀倡自趙范汴城之敗由於始計不臧乃不引咎自劾而以輕遣偏師之失歸罪葵等豈公道哉況當時軍無見糧士又不武葵等縱不入洛能保汴城之無患乎且用兵機勢乏食之軍進取或可圖功坐守則必致潰使葵等不留汴半月及早厲師而前力戰取勝未嘗不可因糧於敵此破釜沈舟之計也趙范不罪其戰之不勇而罪其輕進喪師是非益倒置矣理宗曽不察其謬亦何憒憒䝉古令巴圖魯攻城杜杲募善射者用小箭射其目目國語及䝉古語同以巴圖魯為勇敢將士嘉號豈有以死囚為之之理漢人不解語義錯謬譯出者不勝屈指數至以小箭射目之語尤為怪誕可笑蓋以目小用小箭耳此所謂捉影之談豈知小箭輕剽不能命中耶䝉古主呼雅克殂皇后抱克楚子實勒們聽政諸王大臣皆不服目實勒們嗣位本太宗遺㫖瑪展后欲稱制耶律楚材曽爭之今之聽政正也史乃稱諸王大臣皆不服蓋曲阿憲宗之意非公道不可信䝉古兵薄嘉定守將力戰始解去議者謂余玠出師之誤有以召之目宋史於余玠忽褒忽貶迄無定論夫余玠帥蜀時慷慨自許固不免大言不慚其狃於小捷而驕尤失之淺率然其出兵本意則未可盡非雖興元遇敵無功亦未嘗有所挫失若䝉古之侵掠蜀地自奎騰之陷成都已然不獨此時也乃以嘉定被攻歸咎余玠不過當時庸懦畏兵之流妄騰口說豈得為確論哉時邊報日急內侍董宋臣請遷都四明軍器太監何子舉言若上行幸京師何所依賴目南渡僻處臨安形勢已失四明尤瀕海小郡髙宗播遷至此幾不能以自存前車可鑒開慶疆圉日蹙國事更非理宗祇應博訪盈庭息浮議以勵戰守乃董宋臣忽倡退避之謀何子舉復主固守之䇿此南宋安危之關鍵而議遷議阻皆出自寺人之口可見舉朝皆庸暗懦怯之流無一人實心為國者然宋室時勢至此已無可為亦不係都之遷與不遷矣度宗䝉古議中書省事許衡疏陳時務言國家當行漢法齊一吾民目立國規模惟當權其法之善與不善而折衷於聖人之道若云必行漢法而後可則歷代破國亡家者非行漢法之人乎蓋許衡漢人修史者又出於漢人之手遂有此不經之論耳如衡之說正猶陸行者不知有舟水行者不知有車泥古之見物而不化未為通達政體也帝㬎時鄂州既破羣臣上疏言非師相親出不可賈似道不得已始開都督府於臨安目似道素不知兵前此鄂州之役掩敗為功尤衆人所共見及鄂破而元師乘勝東下席捲之勢已成雖名將尚恐不足抵禦似道即出豈能紓敵患而安衆心廷臣疏請似道親出蓋嫉其權奸誤國藉以視其致敗耳非果望其有濟於事然輕國計而快私憤廷臣之心亦不可問此宋之所以亡也元人南侵以劉整與吕文煥為嚮導整聞文煥入鄂捷至言首帥束我使成功後人遂發憤死目劉整以宋將降元甘為嚮導已不足齒於人類乃不以身事二姓為恥而扼腕於首帥約束成功後人發憤以死適益增其遺臭匪直輕於鴻毛豈得以豫讓相比哉賈似道請遷都詔下公卿議王爚請堅蹕未決爚以已不能與大計乞罷政不待報徑去目江上之師為南宋存亡一大機㑹自遷都議起廷論遂有異同然時事至此已無可為即固守孤城亦未必能再延一線但與其播遷海上委棄洪濤又何如堅蹕行都猶不失為宗社之殉耶王爚此論固未為非理然以其說不行棄位徑去置國事於不問其跡似乎抗直其心未免避禍以視似道之喪師辱國所差亦不能以間耳元使亷希賢嚴忠範來至獨松關張濡部曲襲殺忠範執希賢送臨安病創死目元兵既已渡江其局固非乞和可了兩軍相對使行其間乃行人甫入境遽以兵刃相加實非情理所宜使宋果有良將徑卒可以制勝或者猶可今並無可自恃者而冒昧橫挑敵怒旋又思餌以甘言更與兒戲何異元人豈肯為宋所愚謀國者錯謬若此尚何所恃以圖存耶詔與婺州處士何基王柏贈諡綱是時宋之君臣救亡之不暇尚從容為崇儒重道之舉此與宋襄臨戰談古何異真可笑可哀耳遣陸秀夫使元軍求稱姪納幣巴延不許乃奉表求封為小國目是時敵兵深入臨安已在掌握之中宋君臣即欲屈節圖存元人安肯捨垂成之功遽為返斾乃始則抗請班師繼則求封小國惟冀茍延殘喘甘於含垢包羞而不顧徒辱其名而終歸無益直當諡為至愚而已獨惜陸秀夫後既有負海之節而此時默無一言且奉稱姪孫之約以往見巴延何哉謝枋得戰敗奔建寧變姓名寓逆旅中已而賣卜建陽市人多延致為弟子論學注枋得固講理學者戰而敗死國事可也乃變姓名而竄猶以論學為人所宗正所謂進退無據史尚有與辭豈正見哉元世祖元世祖至元十三年綱宋自建炎南渡已屬偏安然德祐以前尚有疆域可慿朝廷規模未失猶可比之東晉至臨安既破帝㬎見俘宗社成墟宋統遂絶則自丙子三月以後正統即當歸之於元若是昺二王﨑嶇海島雖諸臣殉國苦心而殘喘茍延流離失據不復成其為君且奉表請降於元正與明唐桂二王之竄跡閩滇者無異朕近於國史傳凡斥唐桂二王諸臣為僞者概令更正為明蓋以其猶存一線雖不足稱正統然謂之為僞實不可此萬世之公論也今續綱目於景炎祥興仍用大書紀年則又阿徇不倫乖史筆之正即如元自順帝北遷沙漠未嘗不子孫繼立苗裔屢傳然既委棄中原編年者即不復大書故號此正也則知是昺之已失中原而仍大書故號之非正矣夫廢興代嬗其書法自有一定不可稍存偏袒之私且史鑑所以昭法戒亦使為君者知統緒存亡當慎苞桑而凜馭朽茍弗克保承世業至於土宇失守大命以傾即曲徇欺世茍延數日之虛名亦無補於救敗理本至公而垂戒亦至切也因為改正書法而闡其大㫖如此遣都實窮河源得之吐蕃朵甘思西鄙潘昂霄採為河源志目并注昔之論河源者衆喙紛如然皆未嘗親履其地徒為紙上空談又奚足據我朝輿圖式廓遐荒絶域咸𨽻版章聖祖仁皇帝屢遣使測量地度詳咨博考始定枯爾坤之為中國河源不特漢唐以來諸說可廢即元人所志亦無足道矣近日準夷底定回部歸誠所謂于闐葱嶺之河蒲昌之海案圗而考犂然具在而就其山川計其道里然後知張騫鹽澤之語不為無據而河有重源之說亦確有明證矣當時都實所尋止及於中國之河源潘昂霄不識䝉古語而譯以漢文又從而傅㑹支離其說益多岐舛因就現在地理證合史漢諸書詳加考訂而著其大凡如此許衡病革語其子以平生不能辭官勿請諡立碑目續綱目因許衡病革戒子之語遂於其卒不具官實乖書法之正論者或謂衡不當仕元削以示貶或謂元不得而臣之變例不書二說皆悖於理夫衡未為宋臣仕元並非失節需才擇主遇合自然有何可貶而既已身膺膴仕食祿登朝本非肥遁鳴髙又豈得違君臣定分二說之謬固不待辨自明至衡之於元聞召即往且云不如此則道不行乃既得志行道忽於易簀時悔其平生不能辭官死後囑勿立碑請諡此非彌留亂命則是後人曲為之說衡故名儒不應前後矛盾若此特改書官爵以糾續綱目之失且摘諸家曲說闢而正之南臺御史上書請內禪帝聞之震怒太子精吉木憂懼尋卒目內禪豈臣下所宜請南臺之奏安知不即出於讒搆者之所為不獨乘間發書之釁由奸黨也精吉木憂懼而卒論者多惜之而咎元祖之不明不知精吉木之禍不始於請禪之日而伏於參預朝政之時潛龍勿用經有明言而精吉木皆反之且我遇是禮亦當如是豈為子者所忍言使當日但令其養德承華則羣小何由窺伺即阿哈瑪之事奸徒亦何由假其名以釀禍機耶甚矣始事之不可不慎也開㑹通河長二百五十餘里中建閘三十一以時蓄泄目㑹通河為漕運襟喉自元人創始以後至今尚仍其利當穿渠之始遏汶截泗雖因自然之勢而導之而長川委輸則在人力之隨時調劑其間濬滌多藉泉湖蓄泄全資閘壩南北經流轉相貫注然尤在黃淮之順軌漳衛之循途有治人無治法一勞永逸豈易言哉托歡等征安南無功而還適其王陳日燇襲位復遣使徴之入朝目安南負固不臣屢干王命托歡海口之敗至於折將損兵亟應聲罪以張天討若以其為窮荒卉服不足以頻動師徒則早當持以鎮靜付之不問乃日燇並未稍知悔過轉遣使徴以入朝跋涉徒勞仍然抗命不至豈不自損威重迄元之世南交終於梗化皆由措置乖方不能使之讋栗傾誠耳梁曽至安南諷陳日燇入朝不從而遣使入貢詔安置于江陵目元之控馭安南措置實為失當前此出師敗衄即不應再事招懷洎乎信命往還迄無要領負固之跡已彰乃猶欲以空詔羈縻適以長其跋扈則何如置之不問之猶善乎且日燇抗命不朝正當嚴兵待時以動乃使臣入貢不能示以威信徒加拘執以快一日之憤天討不加於有罪而轉虐及行人又何以令逺方景附乎仁宗遣宦者李邦寧釋奠于孔子方就位忽大風起殿上燭盡滅目釋奠所以尊師重道廷臣中豈無一可遣之人何致令宦官行事此即無災異亦足貽笑千古元史以風災紀失未免反覺失實至邦寧前此諫沮武宗傳弟仁宗釋而不問固見大公然以開府崇階濫授刑餘實為褻視名器非特矯枉過正亦失制馭閹豎之道矣敕自今宦者勿得授文階綱敕宦者勿授文階或有悔於邦寧晉階加秩之失乃曾未踰期而續元暉復有昭文之拜何前後自相矛盾蓋由本無定見言不由中故不能持之以久耳英宗特們德爾請誅趙世延帝以其欲報私怨不從然猶囚繫再嵗拜珠為請始得釋目英宗既知世延之無罪特們德爾欲報私怨而誣陷之則當即為昭雪而置姦黨於法乃於世延猶囚繫兩年復因拜珠進言始得免於縲紲而特們德爾則始終置之不問何所顧忌而不能自主若此法令不行徒於侍臣前自表英察豈不滋貽笑哉帝覺特們德爾所譖毁皆先帝舊人因漸見疏外特們德爾怏怏而死目賞有功罰有罪王者馭下之大權特們德爾罪惡稔著英宗既察見之而顧聽其優游養安保首領於牖下待其已死始籍其家削其爵是縱惡於生前英宗安得謂英乎評鑑闡要卷九
