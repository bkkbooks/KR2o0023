body:
  text: 五季梁劉守文討劉守光守光戰敗守文立陳前謂衆勿殺吾弟守光將元行欽直前擒之目兄討幽父之弟即誅之亦不為過乃對衆泣謂勿殺此與宋襄不擒二毛同一迂庸卒以自取敗亡所謂可笑可鄙者耳蜀徐賢妃諷張格等請立宗衍為太子蜀主慮其幼懦不得已許之目張格欲結徐妃以自固詐稱密旨脅衆署名可也獨王建明知其子幼懦不堪任有何不得已而委曲徇衆之請誠何謂乎蓋建之據蜀本不以正天欲速其亡故假手童騃使自蹈傾覆耳晉王將殺劉守光因李小喜瞋目叱守光怒其無禮先斬之目守光逆倫傷化罪不容誅然小喜則曾受其恩者既紿故主以私降甚至瞋目叱詈良心澌滅盡矣存朂先正其誅頗為快舉梁主召李愚為左拾遺時衡王友諒貴重見者皆拜愚獨長揖目有道則見無道則隱士君子出處之正也李愚既自負學行豈宜臣事朱梁既為爵祿所羈受而弗却徒以長揖藩王顯其抗直昧大節而矜細行所謂欲蓋彌彰耳吳朱瑾殺徐知訓以其首示吳王王懼走入內言我不敢知目知訓無禮於君凡有心者皆當為鷹鸇之逐朱瑾雖以私嫌擅殺然實為吳除害隆演既據有吳國自當為之主持庶幾跋扈者知所警惕乃懦怯無識諉為不敢與聞致徐溫覬覦日深浸成篡竊之禍雖其及身以柔善自全而吳業之衰自彼釀之實行密之罪臣敗子耳梁劉鄩討朱友謙以其昏姻不即進兵梁主受譖密令張宗奭鴆殺之注以私姻移諭遷延貽悮軍計正當明正顯戮耳密令行鴆何為哉昔子輿氏引庾公之斯之事雖為取友者旁引曲證之端已非正道後世不知謀國者輒沿襲之以為公私交盡何啻失之千里晉得傳國寶綱秦璽久經煨燼不足置議向嘗詳論及之至如宋白之説璽當有二如李心傳之説璽更當有三其真贋又何從而辨乃晉得之而存朂據為受命之符梁失之而歐陽修特書曰盜竊傳國寶夫存朂躁妄固無足責歐陽修尚稱有識者而亦斤斤於此何耶晉王存朂欲稱帝張承業請先滅朱氏求唐後立之目李唐宦寺之惡為從來所未有獨張承業乃心唐室始終不渝洵為錚錚佼佼且其始佐晉王創業欲為昭宗復讐及存朂稱帝則邑邑以殁其志誠亦可憫曾不思晉王父子雖以忠孝自期方為藩鎮時已不能免於跋扈即存朂與朱溫力戰亦自利之心為多逮大業將定豈肯復居人下而欲望其求立唐後復延李宗安可得哉承業蓋篤於效忠而絀於料事者正所謂宦寺之見耳唐主命從官拜梁太祖墓注莊宗藉始終為唐之名能滅朱梁乃方欲戮尸旋命拜墓顛倒無據若或褫其魄者尚何足觀其後乎唐郭崇韜忌李嗣源密勸唐主罷其兵權目崇韜爾時深為莊宗倚任陳謀定䇿多見信從使果慮嗣源之終為國患則杜漸防微應有剴切之論而徒以私忌後言呫囁豈忠正腹心之臣所宜為哉唐魏王繼岌殺郭崇韜綱崇韜之死不由王命繼岌實不能辭過至其不書官爵友益謂病其請立劉后起莘謂以其輕犯近習二説皆不得其正崇韜立后之請固為可鄙然不應責於此時若其不禮宦官更無可罪惟是繼岌都統之命崇韜實請之而佐以西行者雖軍事悉以委付乃於國儲統帥視之蔑如使宵小得乘間而搆其短則取禍實有由矣且其在蜀也將吏奔走其門寶賂悉充其槖擅權黷貨叢積愆尤而於宗弼之非分干求始則納其賄以陽許繼乃滅其族以自明是則崇韜罪之大者雖殺不以正而死不為枉則書法交貶之也固宜唐以郭從謙為景州刺史既至遣使族誅之目春秋以趙盾不討賊則直筆書之嗣源之於從謙抑又甚矣方其入洛陽也軍威甚盛於誅一從謙何有必遲之十月之久始誘而族之乎蓋其初固無殺之之心久而審已度世知為清議所不容姑藉此以塞謗耳不然何不直斥其弒逆之罪且先之以寵秩耶胡寅乃疑為畏其衆而難圖惜其不及時以取悅不但不識事機亦實無當於南董之義也楚許德勳謂吳使楚國舊臣宿將猶在願勿措懷必俟衆駒爭棧乃可圖注德勳身為楚臣應正辭以寢吳謀乃為隱語輸情於敵不謂之賣國可乎左氏多採列國使臣詞令此更非失言之咎所可竟其責者契丹請其將萴刺惕隱於唐唐諸臣以萴刺驍將不可縱唐主欲少副其求乃遣萴骨舍利歸目契丹休兵數年通使請和其請還虜將若唐審已有可恃不與可也乃首尾顧慮羈留所請驍將欲藉此以杜邊患而又與他人思少副其求豈知從而激怒寇掠日滋石晉遂慿其勢以移後唐之祚所謂進退無據差之毫釐謬以千里矣唐康澄上疏論國家有不足懼者五深可畏者六目康澄抗疏似是而非所云六可畏即有未盡切當者如以四民遷業為慮而於蟊賊傷稼謂可存而不論則輕重倒置實甚夫年榖不登民食安賴不為撫綏而賑恤之將有嗷野澤而轉溝壑者豈直遷業之患而已哉至以祲沴為不足懼則尤害於理宋王安石之説蓋本於此論者徒以其言明快而亟許之亦昧乎立言之本末矣唐潞王從珂反朱洪實欲固守洛陽徐圖進取康義誠誣其反唐主不能辨遂斬洪實目從厚柔懦無能羣小滿朝無足與圖國是當從珂舉兵犯闕義誠輩早蓄異心逝將他適所可稍恃以支持者惟朱洪實耳雖其固守徐圖之計未必果能濟事而其心皭然不滓從厚所宜知也乃不辨黑白枉殺忠良譬之木將稿而復披其枝葉能無立見傾覆乎契丹改號遼綱契丹之改遼與拓跋之稱魏體例無二乃綱目於拓跋書魏契丹則不書遼蓋由司馬光以宋臣作通鑑其時不敢稱遼以敵宋綱目遂仍其舊初非别有深文也乃劉友益尹起莘輩拘牽好異謂書魏所以進之書契丹所以外之抑知史家紀事當以春秋為法春秋前書荆後書楚非例以義起耶即以綱目言之東晉時如慕容之稱燕苻姚之稱秦以至武都河西雖彈丸蕞爾而列國之書法具在何所容其進退者腐儒曲説支離真所云燭籠添骨其明益障烏足與言傳信之筆哉晉主聞遼將南侵還東京目胸奴在漢頡利在唐凡與中國搆兵皆書入寇以中土時方一統體例固應如是即宋室運際陵夷然自徽欽以上共主位號猶存至南渡以後稱臣稱姪惟恐不及若仍書入寇則是以君寇臣以伯叔寇姪為不經矣我國家開創之初當明末造國政日非而未及更姓改物自宜仍以統系豫之至順治元年定鼎京師大統已正然明福王猶於江寧僅延一線故綱目三編所紀並不遽書明亡以絶其祚為福王者使能奮發有為安見不可擬於南宋臨安之局惟是天心既已厭明人事復不能自振長江不守統系於是終絶則福王之所係於明紀者固不同唐桂二王之竄徙無常及宋末昺是之流離瘴海此正千古不易之通義也此條目內舊書遼將入冦謬襲漢唐書法不思彼時中國已瓜分瓦解不成正統而石晉得國之本又由於以父事遼及重貴繼立好事者頓以書臣為恥然稱孫之表仍無虛日以是搆禍即問愚騃無識之人以祖冦孫有不聽然而笑者哉是當用兩國互伐之文書侵以正其誤且使後之守器者兢兢業業不敢失其統以自取辱殊不失春秋尊王之本義云晉囚遼回圖使喬榮既而歸之景延廣語榮若來戰有十萬橫磨劍足以相待目晉既藉北朝以興豈能相抗遼於晉有德無怨背之實為不祥且爾時並無良將精兵之可恃而延廣大言不慙徒貽其君以負義之辱小人庸妄誤國顧如是哉晉以楊光逺難於顯誅隂命李守貞拉殺之以其子承勳為汝州防禦使注光逺反側無常降又非出其本心留之適以貽患明正其罪誅之不為過當而乃隂遣人殺之其誰欺乎劉友益以晉不能明正其罪例諸李輔國之書盜殺是也至承勳劫父以降與光逺之忘君而叛者罪逆相等乃殺其父而官其子是何懲勸然五季之亂亦無一可與論倫理者矣遼主問馮道百姓如何救得道為俳語云惟皇帝救得時人善其言注從古第一無恥者莫如馮道時人善其言不過以其詭辭止殺耳然彼時打草穀者自若何曾為之止暴哉則道之俳語仍屬諂諛之意而時乃韙之豈不大謬遼主服通天冠絳紗袍登正殿受朝賀目遼當國勢強盛時經略中原所過摧枯拉朽幾於大業可成乃甫入大梁即襲用通天絳紗尋復呼仗閣門赭袍從事捐淳龎而徇浮譽非開創所宜抑且忘本不祥天道厭之宜其未及旋轅遽攖多故也其後金元皆惑迂生改正易服之説蔑棄舊章亡不旋踵讀史者可不戒諸漢郭威平李守貞得朝臣藩鎮交通書詞意悖逆皆焚之注漢時以燒梁獄詞為善處家人骨肉因而撓法庇人者輒引之為口實爾時朝臣交通藩鎮固屬尋常伎倆至詞意已涉悖逆而竟甘心置之不問以為一切保全姦回之徒誰復知所懲創者此非魑魅自消乃日中見斗耳然彼時事勢亦無足責備矣漢朝貴會飲相詆有隙漢主使王峻置酒和解之不能得注宰相令僕會飲沈湎已乖政體而使氣歡呶武臣矜鎗劒微長文士詡毛錐薄技甚至醜語詬詈鋒刃幾加儀檢蕩然矣隱帝不能詰治復令釋和於杯酒之間紀綱陵替若此安得不亡漢王章尤不喜文臣目向之矜毛錐者非王章乎此又謂之不喜文臣甚矣記載家之鮮實也漢劉崇欲起兵聞迎立湘隂公而止李驤説崇疾據孟津崇怒斬之目贇雖迎立而大位未踐成否尚未可知李驤請據孟津實為河東自全上䇿且於湘隂繼統亦無所損劉崇乃以其子將為帝遽有侈心視忠言如枘鑿輕加戮害卒之宋州難作北漢繼業未終敧器滿覆之戒不其然乎楚彭師皓初事馬希廣為希萼所黜希崇因使囚希萼於衡山師皓奉事逾謹立為衡山王目希萼弒希廣而自立實為楚之亂臣師皓素事希廣當以故君為重則希萼乃其仇也方其大呼請死時徑氣凜然頗似明於不二之義者既不能殺賊雪憤且奉為主而謹事之何其厚於萼而薄於廣也周主欲自將禦漢兵馮道固爭之目馮道歷事四姓浮沈取容未聞有所建白忽於周主自將一節嘵嘵不休既非致主之忠又無料敵之智而激切盡言頓似強直此非沽直名以救末路蓋彼天性畏事即使北漢至而周祚移彼又將從北漢而保祿位周之成敗固非所介於懷也周趙匡胤率兵禦遼次陳橋驛將士謀奉為天子趙匡義趙普部分待旦因入帳白之目陳橋兵變論者疑宋祖實與其謀蓋彼時匡義以手足之親趙普以心腹之寄毅然部分復入帳中密白使非微窺宋祖隱微豈至若此且其受命而出因變而返遽行禪代絶無愧辭更足啓後人訾議雖當時朝不易位市不易肆其後布武修文撥亂反正而其得國之不以道又豈能曲為原諒哉宋以吳廷祚父名璋避平章特加同三品注平章既為國家官階豈有因臣子私諱而改之之理且璋與章亦無涉宋主此為蓋徇名而不知義矣宋罷侍衛指揮使石守信等典禁兵綱讀史者率以宋祖杯酒釋兵權為不動聲色而措天下之安此鄙見也守信數人若果不可制豈數言委曲規諷所能罷其典兵者彼時宋主英勇固出數人之上操縱由已消患未然守信諸人方承命之不暇又何敢有異議乎史家無卓識徒於杯酒詭辭處炫竒以為祕計神謀而不於宋主英斷勇為處著眼而後世遂以是為妙䇿獨出吁可笑矣五星聚奎綱五星聚奎為宋朝首瑞曽不數月即有日食之變天意果何屬耶好諛者詡祥而諱災矯情者稱災而却祥雖覺五十步之勝其於敬天勤民之本蓋亦失之逺矣北漢主鈞嘗謂養子繼恩巽軟恐不能了我家事目繼恩繼元皆非劉氏子北漢主既知其不能了事則當早定大計且繼文故漢祖嫡孫久留遼境使迎還立之或可延一線於將墜後此張昭敏實能見及之豈其時迎之於遼有所不能耶付託失人致釀成禍釁隕覆其宗劉鈞不能辭其責矣宋主與諸藩鎮宴酒酣從容諷以乞歸明日皆罷鎮目藝祖平時嘗言帝王自有天命且笑周世宗殺方面大耳之非居然豁達大度者乃芥蒂未忘疑黃袍之復加恐劇鎮之難制且不以正道消禍於未然徒以杯酒詭辭釋兵權罷藩鎮豈篤於信天而明於為政者耶宋劉溫叟過明德門值宋主方登樓令傳呼依常而過因請對言人主非時登樓下必希望恩賞注登樓逺眺於政體何害希恩望賞人之常情亦不待登樓而後生也溫叟傳呼徑過時蓋未知宋祖在樓既覺而懼蹈非禮之愆故矯辭以對且欲獵取直名妄亦甚矣宋太祖江南主遣徐鉉求緩師帝言卧榻之側豈容他人鼾睡目五季國鎮割據域內幾如瓜剖豆分宋太祖有混一海宇之志南唐不能如吳越納土以保其宗祀而又庸暗寡識不早為備其敗亡固有以自取宋祖不容鼾睡之語其豁達大度竟有與漢髙並駕齊驅之概帝言我為天下守財豈可妄用目節用愛民人君治平要道無過於是至云為天下守財何其見之小哉此與俗所謂看財奴何以異乎無識者或以為格言然二典三謨中又豈聞有此等語句耶太宗帝命徐鉉撰李煜神道碑鉉請存故主之義注徐鉉不能盡忠於亡國之時乃欲守節於故主之沒後以虛言為報亦復何益無知者或以為可矜有識者更鄙其無賴耳德昭從征幽州軍中有謀立之者及還德昭請行太原之賞帝怒言待汝自為未晚德昭自殺目軍中謀立德昭並無形迹可指或讒人搆釁揣測猜嫌而為之亦未可定太宗遽責以待汝自為則德昭雖欲不死而不能可知太宗傳子私念不待趙普贊成而早定於胸中矣抱哭追封固無解於渝盟之過所謂欲蓋彌彰耳趙普諷李符奏秦王廷美怨望降封涪陵縣公房州安置目廷美之得罪皆成於趙普其始因多遜之毁請備樞軸察姦變以自救不過患失之一念繼乃搆成寃獄坐以大逆止圖報復多遜夙嫌而於廷美毫無顧忌老姦伎倆日甚一日至諷李符上言必欲置廷美於死而後已則天良澌滅盡矣普嘗自負讀論語鄙夫無所不至之句豈未經見乎李繼遷請降以為銀州觀察使綱趙普前此輕信李繼捧縱其復歸夏州已為失䇿兹復輕信李繼遷受其偽降坐稽天討以留世世邊患蓋姑息偷安實為宋代之失而養癰貽害始謀不臧則自是役貽之以王繼恩討蜀冦功命别立宣政使以授之目內侍領兵仍唐弊政其後童貫梁師成之擅權實由此開其端太宗雖不與宣徽之除而命之領兵已屬乖舛作法於涼不能辭詒謀不善之責矣李昌言為川峽都部署或奏其有反相詔追止之罷知鳯翔目既任以領兵之責必平日悉其為人豈有以反相一語之讒而罷其事者此較之漢光武信讖更為不及矣真宗帝幸澶州命王旦還京留守旦請宣冦凖至因奏十日不捷何以處之帝言立太子目王旦待冦凖數語不過祖國有君矣之説耳然君父在外大敵在前即以凶語致啓其心實不可問即有此心以為為國大計毋寧俟實有其事而行之亦自不待致問也契丹請和冦凖許其成目澶州告急都邑震驚庸懦者束手倉皇姦狡者議遷楚蜀安危之機懸於呼吸寇凖處以靜鎮而羣心安力贊親征而敵氣懾不勞亡矢遺鏃而轉旋於俄頃之間可謂功在社稷矣論者或惜其不決戰於士卒歡呼之際以定厥功而杜後患乃迂儒侈口快談而未達於時勢不知欲和之意早定於真宗凖亦不宜違君命而邀已功且契丹傾國而來志不在小雖達蘭戰殁少挫其鋒而精鋭薄城亦未易輕敵若必邀其獻地稱臣激極生變成敗尚未可知則適可而止亦不得謂之坐失事會也朱能詐為天書冦凖上之於朝由是得召用目凖於欽若判若冰炭何獨於乾佑天書之事效其所為蓋一以圖已之進用一以喜朱能素相比附雖墮其術而不顧可見門户之為害甚於陷阱一溺其中即欲自拔亦不可得矣帝得風疾冦凖密請太子監國已而被酒漏言丁謂譖凖罷政目冦凖密贊大計自當慎之又慎東宫監國事出非常止宜詔自朝廷豈可由羣臣陳請凖因周懷政之告而始有此議又預令人草表已屬害成況復被酒漏言尤為粗疏無術其遭讒去位不得謂非自取也至真宗以國家大事謀及宦官幾至釀成禍亂亦豈得辭始事不臧之咎哉仁宗太后欲誅丁謂馮拯進救稍解降謂太子少保目丁謂當仁宗初立恃有垂簾之事交通內侍植黨擅權幾於辨髦朝紀其罪惡較前更著幸而莊獻察其姦欺即明正其誅復何足惜馮拯力為營救所謂生平嚴正者安在至云恐駭天下耳目尤為謬戾謂之罪世所共知誠能誅之天下必聞新政而稱快何駭人聽覩之有且拯已自稱莫敢辨虛實則平日之委蛇旅進亦可概見矣葬永定陵以天書殉綱史臣以天書殉葬為是續綱目發明則以為非且謂當辨其偽焚其書誅其人夫天書妄誕本不足信事後止宜置之不論不議而已舉而投畀炎火且又追戮姦邪豈非彰真宗之過於殂落之後而究無補於政化之得失哉京師大雨水溢宰執晨朝未入有旨放朝王曽亟請入見同列愧服目曽之解鼓妖之惑辨河決之訛雖云持以鎮靜而流言息人心安然以理論之此立朝之人盡所宜知初不必待識力過人者而後辦此也至聞水作放朝堅執不退并請見陳謨則當時君若臣之度量亦大半可見矣帝率百官上太后夀於會寧殿范仲淹上疏諫既而又疏請太后還政目同御大安受朝揆之於禮誠不合仲淹論之是也疏請還政尤能持大義而攄忠直可謂不負所學至以率百官上夀會寧為虧君體損主威所言殊為矯枉過正天子合天下以隆尊養躬率羣臣東朝拜舞正所以備儀教孝為世法程又何同列北面之嫌乎程琳獻武后臨朝圖劉太后擲之於地目莊獻不嘗問魯宗道以武后何如主乎且欲立劉氏七廟被天子衮冕皆何為者至進外家任宦者猶其過之小者耳獨於程琳之獻圖乃擲地詬之豈真乃心宋室蓋亦知彼時勢尚有不能而已史臣遂有過譽之談蓋必出於曽受其惠者之口吕夷簡以郭后言罷相於是深憾后思傾之目夷簡本非正人但廢后一事不得歸罪於彼以為修報復也試問后而批及帝為有罪為無罪耶使無其事夷簡用計傾之則不容誅矣其詳見於廢后事郭皇后與尚楊二美人忿爭后於帝前批尚氏頰誤批帝頸帝因與閻文應吕夷簡謀下詔廢后目妻之於夫亦猶臣之於君子之於父耳妻批夫而無罪則臣批君子批父亦可不罪乎仁宗之失在於寵二美人使之與后忿爭既爭而相鬭又失之自起相救耳然既已批及帝頸則罪在后矣即誤亦不可而况宫闈之祕所云誤者出諸誰口然則臣之於君子之於父又可誤批乎仁宗不能明正大義抵之以罪而顧謀之宦官謀之執政以至議論紛然道輔仲淹反以黜而得名所為不益可笑哉范仲淹欲招納趙元昊自為書諭之會任福敗於好水川元昊復書不遜仲淹坐擅通書貶官目西夏之役韓琦主攻戰而范仲淹主和守議者徒見好水川之敗遂多咎琦而韙仲淹者不知任福不遵琦節制其致敗非琦所能逆料而仲淹之和終亦奚能成哉徒以通書獲罪貽笑外敵而無補於中國蓋庸懦之流畏事惡勞一聞戰則咋舌蹙額若恐矢石之及已而一聞和則以為保全生靈為國逺謀彼其於國家之安危榮辱固未嘗計及也如是之人而可與之䇿攻戰和守之議哉富弼接伴契丹使蕭特默特默密以國情告弼帝擇報聘者吕夷簡不悅弼因薦之目弼為接伴使能令特默瞿然起敬且盡得其隱情小試之而已效報聘之選誠無出其右者夷簡之薦為得人於國事自有裨益史稱夷簡不悅弼因薦之而歐陽修為之乞留是徒以弼之夷險為要而置使命之得人與否於不論豈真忠於國家之見哉富弼至契丹議增幣拒稱獻納二字契丹遣使與弼偕來帝用晏殊議以納字許之目貢獻義同納亦貢獻之謂富弼爭執再三稍有丈夫氣而其時宰相畏懦務為茍安仁宗又急圖了事遂至名實俱虧積弱之勢既成益見其懨懨不振誠可笑耳時議者欲以金繒啖契丹使攻趙元昊因命賈昌朝往昌朝力辭使命且上疏注昌朝力辭使命視弼之奉使遄行賢不肖相去不可以道里計即其所陳諸弊亦不過藉紙上空談以飾其規避之迹仁宗乃嘉豫之所為與吕后對冒頓同軌史臣方稱其美德吁可怪哉顔秀等夜入禁中為亂皇后閉閣止帝出趣召王守忠入衛所遣宦寺后親剪其髮言以是徵賞目觀此所載仁宗曽一后之不如直是無丈夫氣但所云剪髮徵賞豈能盡識其人黠者將自剪髮以邀功且不數月而以張美人為有扈蹕功更謂賊本起皇后閣以前後相形而論則紀事之不實多誣概可知矣范仲淹知杭州值嵗飢日出宴湖山縱民競渡諭寺僧造殿宇又新厫倉吏舍注興造以贍貧民寓賑於工實可補周官荒政所未及至遊宴湖山使遊民有所仰食雖亦分有餘以濟不足然時當飢饉閭閻升斗維艱又復飲食嬉遊以耗榖則市糴益將騰踊且仲淹稱先憂後樂者日對鳩形鵠面之人而燕娛自適亦何以為情不若富弼之帳恤青州良法可循也劉沆充溫成后園陵監護使既葬賜后閣中金器力辭而為其子請試學士院目劉沆以會葬得授平章論者譏之乃載其力辭賜金事然辭賞而為其子求官所望不更奢乎是亦壟斷賤丈夫而已且仁宗獨未聞賜錢而不與郎官之事乎帝問置相於王素素言惟宦官宫妾不知姓名者可充其選帝因獨舉富弼目宦官宫妾不知姓名之語從來傳為美談而不知實非也即如司馬光婦人女子無不知之豈宦官宫妾獨不知乎豈亦因其知之而不可用乎用人為人主馭世大權不但宦官宫妾不可操其權而已也且彼時獨一富弼為若輩所不知則在朝者將盡為若輩所知者矣獨一富弼其如三公九列何而一時君臣方侈然自詡為盛事不亦大可笑乎帝御大慶殿受朝暴感風眩文彥博等啓醮於大慶殿因赦死罪以下目文彥博等此為直以三尺童視仁宗矣仁宗暴感風眩非不起之症彥博何不學樊噲排闥請見諸事請旨而行乃公然赦死罪豈非專擅至啓醮殿廷益屬不經而史方謂京師業業賴彥博等以安誠阿其所好不識大體之言且京師之業業未必非彥博等之張大其事有以啓之而仁宗愈後亦置之不問可謂柔懦不飭君綱者矣范鎮疏請拔近屬賢者優其禮秩而試以政事章十九上乃罷知諫院目建儲得失前已詳論之仁宗是時春秋尚富未有皇嗣鎮必欲援立近屬其意何居且前後章十九上甚至君臣對泣成何景象又復移書執政言天象示變必有急兵造為誕妄之語以熒惑人心尤為狂謬然其所以致此者亦仁宗不整乾綱有以啓之耳遣胡宿奉御容如契丹契丹主瞻視驚肅再拜言我生中國不過與執鞭持蓋一都虞候目彼時宋方畏契丹增嵗幣其政略兵威有何令契丹可懼處而契丹主見像驚拜有都虞候之嘆耶此不過宋臣自詡之言無足信益可鄙耳詔立宗實為皇子宗實固辭司馬光言皇子辭不資之富目辭不資之富所見何淺司馬光此言失之甚矣然則贊宗實得不資之富者又為何等人乎英宗髙后為太后姊子少育宫中既長婚於濮邸至是册為皇后目爾時所謂諸正人者不嘗斥賈昌朝交通女謁乎而此所立皇后髙氏之母固曹太后之姊也為交通為不交通且力贊濮王子入繼又何以對昌朝哉詔議尊禮濮王司馬光言為人後者不得顧私親王圭言宜稱皇伯歐陽修引大記謂服可降名不可沒目英宗崇奉濮王事由韓琦等申請且所議並非加尊帝號更無嫌疑陵僭之虞必執為人後者不得復顧私親以相辨折既與大記所云不合使濮王尚在又將何以處之乎且以本生之親改稱伯父固非所安而加皇於伯名亦不正王圭司馬光之説並無經傳可據徒以強詞爭執自不若歐陽修援引禮經之為得也韓琦富弼同相中書於樞密非得旨合議琦未嘗詢弼弼頗不懌目琦弼皆時所稱公忠體國之人同在政府氣味何至差池於事正宜和衷共濟乃琦既不相咨詢未免自專弼竟見於辭色度量亦狹任私意而忘大義公忠體國之人固如是乎文彥博入覲帝言朕立卿之功乃改判永興遂召為樞密使目旁支入承大統本無德怨可言若必沾沾挾援立私恩曲行酬報自處已為不廣英宗以富弼嘗有建儲之語亟豫遷官又以文彥博向曽推立深加眷念而蔡襄則以疑似小嫌一麾出守豈示天下為公之量邪則向之稱疾固辭實非本意矣范鎮草韓琦批答引周公不之魯為辭帝遂罷鎮或謂歐陽修因鎮忤濮議為帝言鎮以孺子待陛下目并注范鎮引伊周以況琦固屬過譽然謂即以孺子待其君則歐陽修挾濮議微嫌有心排擠耳評鑑闡要卷七
