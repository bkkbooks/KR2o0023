body:
  text: 元泰定帝致和元年分注阿蘇晉巴改元天順綱并注泰定在位五年纘承元統其子阿蘇晉巴天下臣民咸知為儲嗣則繼立乃世及之常是年八月以後統系自應屬之天順若圖克特穆爾因雅克特穆爾搆變遂逞逆謀僭竊位號兵犯上都致阿蘇晉巴不知所終實與弑逐無異續綱目反以圖克特穆爾所稱天厯附注是年而于天順竟沒其號殊乖順逆之理至明宗為武宗長子大都竊據之事本未與聞及圖克特穆爾遣使奉寳勸進即位和寧名分已定天順既亡神器非明宗誰屬又豈可以其未有紀元而去其帝號續綱目于己巳嵗止紀天厯二年而明宗竟削而不書是非尤為失當今于致和元年附注天順改元以存其統並注圖克特穆爾僭號以著其罪而己巳嵗則大書明宗元年至翁果察圖變故以後元統無歸然後繫以天厯庶書法得平而大義亦足昭千古因揭其大指如此雅克特穆爾以受武宗恩欲立其子㑹帝崩都爾蘇踰月不立君遂迎懷王于江陵目武宗既傳于弟其子即無統業可承而泰定帝已成其為君儲嗣現存神器自有專屬乃雅克特穆爾忽逞異圖謬托受武宗恩寵之言以自文逺迎周懷二王入繼于情理俱為不順其意不過欲假援立之功以憑寵肆志遂成圖克特穆爾篡弑之謀則雅克特穆爾實為罪首至泰定既崩都爾蘇惟知專擅自利踰月不立君致亂臣乘間釀禍其罪亦與亂臣等耳天順帝懷王圖克特穆爾兵陷上都帝不知所終綱圖克特穆爾之弑明宗人皆知之而于天順之事則史氏隠而未發夫天順正位已踰數月諸王羣臣皆推戴為君圖克特穆爾乃敢舉兵直犯上都致令不知所終則與躬自弑逆者亦無以異春秋作而亂臣賊子懼此等正斧鉞所必嚴續綱目畧而不書失筆削之㫖矣文宗帝遺詔傳位明宗之子因立鄜王目父子世及乃三代以下繼緒之常非然者則不足以係人心而孚公論文宗舍子立姪王禕謂其公天下之心其説大謬文宗此舉不過欲掩其弑兄之罪且欲矯仁宗不傳位武宗二子之非耳孰知鄜王既不永年而順帝并至覆其宗社付託不慎貽禍家邦是元室之亡實文宗之蔑視神器有以釀成之耳順帝帝將田于栁林因臺臣諫遂止目蒐苗獮狩古所不廢況畋獵足以肄武在元時亦其國俗所尚順帝春秋方盛正當因此習勞而車駕所經並可以周知民隠于政務又何妨乎順帝初元以來端處深宫委柄臣下不聞臺垣抗疏一言而狃于書生庸瑣之見摭拾舊聞借名諫獵以弋取直聲何其陋也至順帝聞言即止無識者方嘉其從若轉圜不知順帝耽于宴樂其心本好逸而惡勞適臺諫有言遂陽以博納善之稱而隂以遂便安之計其後賜綽台等以金帛且欲妄擬貞觀益可見其意所假托然亦何救其内多欲而覆宗社哉漳州人李志甫聚衆圍州城袁州人周子旺亦起兵稱王目奸民嘯聚竟至圍犯州城必非事起倉卒牧民者不知預為察治任其猖獗若此則元末吏治闒茸可知然此烏合之衆𠞰捕亦非難事乃守將與戰失利四省兵討之不克則當日軍伍廢弛更可想見總由順帝紀綱不振文武諸臣㒺知以安民飭武為念平時習于養癰臨事付之蒿目毋怪盜賊之接踵蠭起也賊沿江剽掠有司不能禁宋文瓚言戍將非人官軍萬數反為三十六賊所敗目刼賊剽掠江海官司不為緝捕聽其横行無忌足見當時之諸事廢弛乃以萬數官軍轉為三十餘賊所敗戍將鎮兵怯劣若此不聞如以重懲亟為整飭其流毒奚啻萌蘖斧柯之喻而元之君臣置若罔聞其後遂日至潰敗皆由紀綱不振故耳至正十一年以後不附書徐夀輝等僭號綱并注元政不綱羣盜蜂起徐夀輝韓林兒明玉珍陳友諒張士誠輩雖僭竊位號而攻剽自如不久敗亡未成為國此正如勝廣揭竿之徒耳續綱目依朱子書秦隋二代之例皆書其國號紀年殊未平允順帝政雖怠荒未至若嬴政楊廣之暴虐為神人所共憤況秦末六國以王侯子孫稱兵復國其名近正原非盜賊烏合之比即唐初之蕭銑李軌李密竇建徳諸家歴年稍久亦畧具規模元末諸僭偽實非其倫今惟明祖稱吳王元年仍依朱子書漢髙祖之例附書以著其得天下之漸其徐夀輝等年號槩從刪削並依元史順帝本紀例于其起兵時書作亂以嚴盜魁之誅云董摶霄以中原大亂請於瀕淮地布連珠營遇賊則併力野戰無事則屯種而食注瀕淮之地連結軍營固足以資堵禦但謂無事屯種而食且耕且戰則勢有所不能盖屯種祇宜行于太平無事之守邉若當時則羣盜遍滿江淮戰守尚恐不遑安得復有餘功屯種況賊勢猖獗在野則蹂躪可虞將穫則齎糧足懼屯政將安所施董搏霄雖有制勝之長而建議則未為當也台布哈討賊不進帝惡之拜為右丞相令總兵進討尋為御史所劾奪爵安置目台布哈初代托都將兵即縱士卒剽掠殃民及是奉詔討賊猶不思奮勉自効以贖前愆乃當進而退以養鋭為名汴梁請援按甲不動徒作大言自謾是宜繩以玩寇之罪申以無將之誅乃順帝既心惡之轉從而加拜右相顛倒極矣至奪爵之命乃因太平懼其害已諷人舉發罪狀當時朝廷既昧勅罰之權而大臣亦惟脩私怨是務無怪紀綱之日以陵替以至於亡也陳友諒害其主徐夀輝于采石綱徐夀輝竊弄潢池特劇盜之首雖僭名號而不成為國友諒則其支黨耳續綱目于采石之事遽以弑書殊為失當盖當日情事祇不過勝廣揭竿之流并不得比諸項羽之于義帝盜賊同類相殘何闗名分豈得以亂臣賊子例之乎但友諒既受夀輝偽署則固安心尊事之今故仍書其主以正其推奉之罪而特改書害以别于有國之稱庶大義不紊而誅貶益嚴耳至正二十八年綱是年正月明祖雖稱帝而大都尚未失守正統猶在元也前纂綱目三編以專紀明事故于明祖稱帝之初即以明為統而于元事則書元以别于明今作通鑑輯覽彚紀列朝要當以歴代正統所繫為凖故于順帝在位之時猶以元為統而于明事則書明以别于元自閏七月順帝出居北漠以後始為明洪武元年從歴朝嬗代一嵗兩繫之例屬之下巻以期名分昭而體例一書法雖有異同總期合乎大公之道而已洪霍特穆爾引軍據太原盡殺官吏目洪霍特穆爾前與李思齊等兵連禍結尚屬私怨相尋至是則竟入據太原盡殺朝廷所置官吏顯然相抗直是叛矣論者或謂洪霍特穆爾後此孤軍塞外猶然力戰不屈使得角逐中原國事尚未可知而歸其咎于太子挾嫌輕加削奪驅而為博爾特特穆爾之續坐致宗社淪亡其所以責太子者誠當然彼時明兵已盡有山東漸將由汴入陜即使洪霍特穆爾奮志勤王亦未必即能恢復疆宇中興社稷乃㒺恤國家之患不禦外侮而轉成内訌累世忠勤至此而隳何其盭也明師陷通州帝北去徐達入大都元亡綱順帝出塞北去固未嘗失帝號而子孫相繼稱汗與明代相終始至我朝破察哈爾林丹汗而元始滅然史家于是年即大書元亡以其失統系而逺避正也知此之為正則知宋亡而仍系昰昺為正統之非正矣夫天命何常常于有徳有天下者果能守其統系即一綫僅延亦不可輕加以貶絶如宋髙宗之遷臨安雖屬偏安尚未至於亡是也若宗社淪亡流離遁去即不得復存其統系如宋二王之居嶺海元順帝之居漠北是也進退予奪悉視其事以為衡豈可以殊中外而有所抑揚于其間前于宋末已著其説兹復引而申之使天下萬世知史法大公至當之理應如此明太祖上與太子論漢景帝輕聽鼂錯削七國事又言藩王當上尊天子毋撓公法注明祖論漢七國事極為平允然當時召釁之故雖由鼂錯謀國不臧而諸侯僭侈驕横在文帝時賈誼已先見及之則七國兵端實由封建所致明祖果有鑒于此即不應裂地以王諸子且所云諸王當知夾輔王室毋撓公法盖以諭教授儒臣使諸藩之國守法度耳然能保其始終不渝耶若明祖者所謂師古而不知度今務名而以致害實者耳徐達械胡徳濟送京師帝釋之諭達言在軍中誅之則已今下廷議吾念其功不忍加誅注徳濟雖功臣之子而失機僨事邦有常刑然徐達斬其下數人以徇而械送徳濟京師候王章未為大失明祖釋之實流于輕縱且以書諭徐達掩己過而授人柄穰苴之喻未可為辭之正也納克楚侵遼東綱元自順帝北居沙漠子孫相繼嗣位襲其故號雖國統已失而南向出兵猶有興復之志譬之宋與金元本屬敵國雖稱臣稱姪而其北伐亦不得以寇書之也明史沿襲舊文于元兵皆以冦書實為未當今特據金元宋相伐之例悉加改正庶乎情理平而體例允協耳帝嘗令國子生習騎射言學者當文足經邦武足戡亂注射為六藝之一古者教士所必資而澤宫之典尤重自後世文武分途專以射為武事于是習文學者不復究心正鵠褒衣博帶于比禮比樂之道問之茫然此古今異宜所不能强也明祖諭國子生習騎射未嘗不有志法古然謂如此即足以經邦戡亂則期望不免過奢而其時亦未聞成均有嫻於武備者則仍不過虛文相尚耳帝定孝慈録命太子為孫貴妃服慈母服杖朞太子不奉詔帝怒羣臣震讋注孝慈録所定服制輕重頗允乃制書甫頒而太子輒敢狃私意以違父皇之㫖且恃屬居嫡長泥舊説相爭孝道已虧尚何足與言禮乎然爾時太子之所以抗帝之所以怒羣臣之所以震讋實出于帝之沽名好古有以啟之又誰怨乎凃節告胡惟庸反帝以節本預謀并誅之目劉基遇毒及惟庸反狀皆自凃節發之及獄成而節亦同戮且以逆黨目之揆之于理殊未可信節如果為惟庸謀主寧不知事敗之必將自累乃轉以首告希圖倖免實情事所必無況從逆須有左証如陳寧同坐省中閱兵馬籍附和之狀昭然若節則並無一事載在爰書而僅以其黨兩字坐之又何異于莫須有定獄且陳寧奸狀史傳所載綦詳未嘗有一語及節而節亦别無事蹟是寧與節雖同以胡黨見誅其虛實判然可見盖必惟庸憾節發其逆謀妄加誣引而當時亦不求左驗遽行具獄節遂無以自明耳今以明史及洪武實録互證之足以釋千秋疑案後此藍玉之反載玉强辨不服詹徽叱玉吐實玉言徽即我黨遂併殺徽事正與此相類益可見當日斷獄者之實非信讞矣胡惟庸有異謀令李存義隂説李善長善長不能制目李善長早從明祖參謀畫功成爵列上公自當休戚相闗乃聞惟庸逆謀並不即時舉發㡬致變亂搆成則善長之黨庇叛臣知而容隠罪實難逭明祖置此不問而後此以星變賜善長死未免輕重失宜而王國用猶且為之上書訟寃則更謬之甚矣宋濓傅太子十餘年言動必以禮法注宋濓既與議禮之列又兼師傅之任而太子驕縱不奉詔未聞其一語之勸其他又何足稱史家阿好之言不足信也帝諭馮勝自通州往慶州襲納克楚既克即徑𢷬金山目金山在今開原縣西北慶州在今巴林西北東西相距約二千里納克楚方據金山以規取遼東豈復能出兵西畧明兵即欲搗其巢穴自當從東道進師乃反向慶州偵伺敵蹤何異燕轅適越且元之諸部久已離析𤓰分納克楚斷不能仍兼有其故地意當時或有别部留屯慶州而諸將未悉塞外輿程遥加臆度遂妄指慶州為納克楚出没之所至明祖既令自通州遣人覘視復使從慶州徑搗金山道里迂迴機宜亦多不合總縁明人於塞外地里全屬茫然但據傳聞仿佛以為措置不自知其舛謬可笑如此耳解縉請行均田注古稱井田善政行於亂之後是求治行於治之時是求亂其説誠不可易蓋自阡陌既開貧富本難一致若屬在承平人安其業而必為均田限田之䇿紛紜予奪重擾閭閻其所害於民生者滋大或當兵燹之餘汙萊遍野版籍蕩然因而徹田定制計口授産一經制而示維新庶乎無弊然亦須審其時勢而熟䇿之非可冒昧從事也如解縉均田之請未嘗非因明承亂後起見不知明立國已將二紀民間耕田納賦大局粗定豈可復事紛更況當時雖罹戰争亦未必比户仳離皆致失其恒産若徒向富厚者强取以與人是未受均田之益而怨咨先起矣天下甫平民氣未定不思撫循寧輯而反重拂其心又將何以維持邦本乎縉不察時宜空談經濟仍不免書生迂濶之見耳李善長弟存義等交通胡惟庸狀露㑹星變言者謂當移大臣遂賜善長死目李善長股肱臣也知胡惟庸反謀隠而不舉即非甘心附和亦與躬蹈叛逆同科明祖既已按治得實當明具獄詞以彰顯戮庶法紀昭而人知警乃當御史連章劾奏並未明正典刑時閲事陳顧因占騐賜死以應星變使一時罪狀不著無識者轉得藉口至陸仲亨費聚實與逆謀當時亦釋而不問稽誅十載始正刑章而簿録多人悉坐奸黨又豈能無株連太過之失乎太子標卒帝召廷臣言欲立燕王劉三吾以孫承嫡統勸止目神器當擇賢而畀燕王素稱才武知子莫若父明祖自當内斷於心彼時即定計建儲不但付託得人並可弭他日骨肉之釁況父子世及本三代以下之常經又深知長君為社稷之福復有何疑豫而向廷臣婉轉曲詢此蓋由明祖泥古好名致三吾頓生異議遂爾决意立孫一錯而不可復救且孫承嫡統其説不見禮經三吾所稱不知何所依據若太孫之名起於晉惠其後亦不克令終雖太甲嗣湯之事載於尚書亦以外丙仲壬之未堪繼嗣姑為變局不可以此例燕王建文也又如齊武帝之立鬱林遼道宗之立天祚亦皆弗克負荷浸至淪胥前車可鑒盖三吾不過樂太孫寛厚乃敢偽托禮文以隂撓大計實罪不容誅而明祖不知慎始慮終輕於授受禍患自貽實當斷不斷階之厲耳帝命太孫裁决庶務寛厚一如太子目傳稱寛則得衆書云寛而有制二者不可偏廢必有制然後可行其寛若建文寛則寛矣安能有制哉及至削諸藩似乎有制矣而以冒昧行之仍屬無制則知其寛亦不過柔懦無能之寛而非有制之寛也紀事者於建文多過譽然亦豈能救其失國之咎哉方孝孺以薦召至帝言今非用孝孺時除漢中教授目紀此者蓋謂明祖有先見耳若果有先見立一棣而諸禍自消何必留一迂儒令輔庸孫而成靖難誅夷之慘是大不然矣藍玉以燕王有不臣之心嘗言于懿文太子注太子在東宫即有以藩王有不臣之心為言者觀此則可知建儲建藩之可行不可行矣然燕王在洪武時未嘗有不臣之迹即或隂懷大志其事必甚秘亦豈藍玉所能窺測其密告太子之言惟見於永樂實録或出當日史官附㑹否則玉謬為是言以煽亂亦未可知總之明祖若無建儲建藩之事繁論又何由而起哉惠帝帝為太孫嘗坐東角門語黄子澄以諸王擁兵為慮及是卓敬疏言燕王智慮絶人請徙封南昌不聽目世人多以卓敬徙封之疏比之曲突徙薪而以建文不從為惜然不乆而有顧黄子澄東角門之語殊自相矛盾然敬此論若在洪武朝與請正名分之議並陳明祖或能採而行之未嘗不可預防後患至建文既立燕藩乆蓄異謀誠使敬説果行亦不過速之反耳夫以燕王智慮過人非能束手受制者觀後此寧王權奉召不至即能不動聲色襲而執之徙封内地則敬之所為深謀秘計固不能出燕王算料之中矧當身處危疑顧肯俯首聽人牽掣乎周王橚子有㷲告橚謀不軌辭連燕齊湘三王黄子澄請先削周剪燕手足目强藩難制當日自莫如燕周齊湘代諸王不過驕縱自恣初非有覬覦之心如吳濞楚戊比且有㷲自首其父此在平民亦不宜聽而仍當置之於法者乃欲借以剪燕羽翼先削周王湘齊復相繼罪廢實為非䇿惠帝甫經紹統不思惇睦以繫屬人心而顧黜奪日聞重傷親誼致諸藩人人自危矧燕王久蓄異謀疑畏益深適以促其禍亂謀之不臧并不止毫釐千里之謬矣且齊黄既知建文之為婦人之仁而已又實無揆奮之能害人家國自貽伊戚雖一死豈足以謝天下哉用方孝孺議更定内外品官階勲又撰禮制頒行目設官原以董事豈係名目且當時事更有大於此者顧乃汲汲更定徒資靖難口實不亦大可笑乎且孝孺既稱信用削藩大事何乃無一言而但以復古議禮為己任耶盖紀事者多右孝孺而以削藩之罪歸之齊黄孝孺未至齊黄之甚則有之謂之無過則不可李景隆讀書通典故黄子澄薦之為將目用武之際非如翰苑賡歌以通典故為尚也卒之僨轅敗事啜泣何嗟及哉棣逼盛庸營野宿及明引馬穿營而去諸將以帝有詔毋負殺叔父名不發一矢目燕兵犯順兩年所向無敵惟盛庸東昌之捷大挫其鋒燕軍遂爾却避是庸之精於用兵實非諸將所及當燕王逼營野宿且在圍中庸豈得託言不知使决計𠞰擒易如唾手乃次日聽其鳴角穿營而去且引毋負殺叔父名之詔為解惠帝固愚庸豈不聞將在軍君命有所不受乎迨永樂篡立庸爵位如常則其隠懷二心亦難免春秋之責矣梅殷常受太祖密詔輔皇太孫目若太祖誠見及此則立棣與執棣惟己所欲為耳何至有篡奪之禍哉且密詔史臣何由知之疑信各半固紀事之常耳成祖安南陳天平來訴胡􅐏篡國帝令􅐏具狀以聞􅐏旋詐殺天平于芹站目安南既列藩封其簒弑相尋固王法所必討然成祖自燕邸稱兵身冒不韙其得國所自與胡􅐏父子亦何甚徑庭成祖既欲明正其罪然自返慚徳何以為辭顧乃令具狀上聞興師進討其與楚靈王負慶封斧質以徇于軍者又何以異所以歸國之請使方來而芹站之伏兵已起坐為逺夷所侮雖由黄中等昧於機宜亦其徳不足以服逺雖懾以兵威終無益也齊王榑驕縱廢為庶人目齊岷二王皆惠帝所廢成祖既還其故封謂當恪備屏藩以長保富貴乃未㡬榑以凶暴驕縱楩以沈湎擅殺並坐廢削可見二王前日之禍實由自取不得尤建文為過舉矣惟是齊岷在建文時罪未昭彰遽加貶絶不能申大義於天下則由其君臣措置失宜不及致詳而發之驟遂不免貽燕師口實然其所以基禍實皆由洪武之行封建耳碉門茶馬司用茶八萬餘斤易馬七十匹且多瘦損目茶馬通市以有易無原期便於逺人而濟國用若不籌贏絀一任昂直居竒則失和市之本意矣即如唐世易馬回紇多費縑帛而馬不適用蓋彼時藉回紇兵力不得不遂其欲雖知其無益而不能自主故白居易有隂山道樂府刺之至明之市馬在洪武時一馬已給茶八十斤迨永樂而㡬増十倍所得馬復多羸瘠價日重而物日輕其後更為邊累并不止如居易所譏若今日哈薩克輸誠内附願以馬易我之帛一馬之直不過三四金較常直未及三之一且多得良馬曽用白詩韻反其意以紀事設以明季市易計之省費豈啻什倍哉宋禮用白英䇿遏汶流滙諸泉盡出南旺南接徐沛北達臨清目自宋禮用白英䇿遏汶自南旺分流為運道利賴者㡬數百年説者因其經營疏鑿具有智力遂疑其出於神助殊不盡然盖五汶所滙實居水脊中央髙而南北下乃天地自然之形勢特衆人不識不能因勢利導白英獨深晰其㣲故舉之易易耳且如大禹平成奏績事若神竒然疏瀹決排亦不能舍天地自然之勢而别為用何獨于英而疑之向閲視運河灼見其理曽詠詩以示大凡兹復引申厥㫖如右帝遷都北京言事者皆云不便蕭儀與李時勉言尤峻切因殺儀下時勉獄目立國原不徒恃金湯為固然如燕地負山帶海形勢雄偉臨中夏而控北荒誠所謂扼天下之吭而拊其背者故金元皆以此龍興虎視其比建康偏安之地相去迥若天淵成祖自就封北平屢經出塞凡天險地利所在籌之已熟故即位以後决計遷都定其規模而後從事卓識獨斷誠非近慮者所可及不得以戀舊邸訾之也至若非常之原黎民所懼一時營建工役繁興自不能保其必無謗讟蕭儀等狃于書生之見紛紛諫阻實為未達于事理不知盤庚遷殷尚厪念浮言之胥動則可與樂成難與慮始者寧獨後世為然哉評鑑闡要卷十
