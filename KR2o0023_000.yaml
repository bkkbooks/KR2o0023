body:
  text: 欽定四庫全書御製通鑑輯覽序編年之書莫備於皇祖御批之資治通鑑綱目蓋是書集三編為一部自三皇以至元末明初振綱挈目謹豫嚴奪足以昭萬世法戒為人君者不可不日手其帙而心其義也然皇祖雖嘗抉精微徵辭㫖著論百餘首亦惟析疑正陋垂教後世耳於其書則一仍厥舊無所筆削也故全書篇幅雖多而議論乃什倍於事實即如前編之中總論史論音釋辨疑考證紛不一家正編之中凡例發明書法考異集覽考證正誤質實濫觴益甚至於續編之作成於有明諸臣其時周禮沿尹起莘例作發明而廣義則出於張時泰效劉友益書法而為之者夫發明書法其於厯朝興革正統偏安之際已不能得執中之論而況效而為之者哉且以本朝之臣而紀其開國之事自不能不右本朝而左勝國此亦理之常也況三編中嬗代崛起之際稱太祖而繫以我者不一而足亦非體例也故命儒臣纂厯代通鑑輯覽一書盡去厯朝臣各私其君之習而歸之正自隆古以至本朝四千五百五十九年事實編為一部全書於凡正統偏安天命人心繫屬存亡必公必平惟嚴惟謹而無所容心曲徇於其間觀是書者凜天命之無常知統系之應守則所以教萬世之為君者即所以教萬世之為臣者也書中批論一依皇祖之例自述所見據事以書者十之三儒臣擬批者十之七而經筆削塗乙者七之五即用其語弗㸃竄者亦七之二云乾隆丁亥秋月御筆欽定四庫全書史部十五評鑑闡要目録史評類第一卷自太昊伏羲氏起至漢惠帝止共七十八則第二卷自漢文帝起至後漢安帝止共九十四則第三卷自漢順帝起至晉安帝止共一百一則第四卷自南北朝起至隋末止共九十七則第五卷自唐髙祖起至唐肅宗止共七十二則第六卷自唐代宗起至唐昭宣帝止共六十五則第七卷自五季梁起至宋英宗止共七十一則第八卷自宋神宗起至宋髙宗止共五十九則第九卷自宋孝宗起至元英宗止共五十二則第十卷自元泰定帝起至明成祖止共四十則第十一卷自明仁宗起至明武宗止共三十四則第十二卷自明世宗起至明福王止共三十五則臣等謹案評鑑闡要十二卷大學士劉統勳等彚録通鑑輯覽中御批凡八百餘則冠以御筆通鑑輯覽原序蓋輯覽一書悉稟聖裁特筆評論發幽闡微多至數千條兹則專録親御毫翰所成及館臣撰擬而仰承改定者按代臚列其間如正統系則隋戊寅大書大業十四年而義寧為附注元戊申大書至正二十八年而閏七月以後始書洪武至於明末甲申之大書崇禎十七年乙酉之附注福王年號尤為聖主大公至正之道非臣下所敢擬議者正書法則於賈充褚淵沈約書死狄仁傑之遷拜及卒書周足為千古臣節之大防若夫破拘牽之論訂傅㑹之說權衡是非糾正訛舛多或纍百言少則一二語莫不抉奧致精永垂法戒臣等校録之餘既深悅服亦尤幸萬古史家得奉為指南云乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
