body:
  text: 南北朝宋以徐羡之為司空注世道至此尚以風度言論為長羣相推奬夫羡之大節已虧他何足議而朝野猶以為賢實可笑亦可畏魏寇謙之獻圖籙真經於魏主崔浩上書稱頌因立天師道場目浩既以不好老莊罷官何歸第即修服食甚至引天師上書哆言受命夫以天師與老莊相較不啻糟粕論者徒以好竒之過咎其始終易轍不知此正浩之熱中患失欲用是為復用梯媒耳平生號稱經術至此尚可欺人否魏奚斤為夏人所擒目奚斤始則堅壘自固不從安頡之謀及赫連昌成擒乃以功出偏禆為恥冒昧追敵其進也由於妬功其被擒也仍由於無能庸懦好忌者流深可恨亦可哀宋鑄四銖錢綱四銖輕薄民得因緣為奸正坐變更成法之弊乃患盜鑄衆轉請聽民鑄錢何異揚湯止沸耶甚至斷新錢用古錢則更因噎廢食矣晉宋以降元嘉之政所謂彼善於此耳然錢法敗壞若此亦奚足稱宋謝述請貸張劭死因使其子綜焚所上表注謝述乞貸劭死既見酬納恐侵奪主恩亟焚其表可謂得人臣事君之義所惜猶告其子耳然較之明季抗疏論救陳說紛紜惟恐世人不知事由己出者奚啻霄壤宋謝靈運以罪見討乃作詩有韓亡子房奮秦帝魯連恥語目靈運直是作反乃以詩文過果有其志則不應為宋官矣史以恃才陵物為其及禍之由是猶曲為遷就豈春秋正義哉宋蕭承之以斧椎斷矟擊破楊和注斧椎斷矟輒貫數人氐豈肯聚立以待乃前誇犀甲之堅後侈斧椎之利遂不自知其言之鑿枘著書家惡道不堪一噱魏李順使凉受䝉遜金帛隱其驕慢語又言天梯山雪消釋成川崔浩謂其欺誣注李順向有䝉遜不敬之對兹又稱受其賄為之隱史家前後矛盾若是奚足憑哉至雪山消融成川人資溉灌則至今尚然非盡欺誣也宋臧皇后以髙祖衲衣付㑹稽公主至是公主子徐湛之被收當死公主持衣入哭且言此我母為汝父所作乃赦湛之注宋祖起自艱難新洲衲衣留示子孫可也轉付主家亦何為者而㑹稽主竟視如護符為其子丐死命時尚悍橫若此其詒謀之不臧可知矣我母汝父云云直是委巷婦嫗嫚罵口吻不可與光武如章陵事相提並論宋何尚之以范蔚宗有異志請出之廣州宋主以妬才信讒為嫌注怏怏不得志蓋士習之常然亦何至謀叛而當時謝靈運范曄比比皆是可見偏安季世政無綱紀矣然文帝既知逆惡之萌又恐以妬才信讒為嫌濡忍不斷卒至芽蘖斧柯悔之已晚小不忍則亂大謀所以為千古龜鑑宋范蔚宗在獄作詩及臨刑見母無怍色而與妓妾悲涕注於母不動色對妻妾悲涕不惟賊臣兼是逆子詩雖佳比之鸚鵡能言可耳史載若輩臨終相語况似有惜意謬哉宋主命將出師交戰日時亦待中詔又江南白丁輕進易退注輕進易退固致敗之由交戰日時必待中詔實乖制勝之道而將帥遲回觀望轉得藉以為口實欲以集事難矣宋王元謨退敗沈慶之止蕭斌勿斬之宋主問故慶之對以諸將懼罪自歸誅之恐皆逃散目元謨退敗當問其致敗之由敵强盡力不得已而敗雖不罪之可也敵弱而已望風先逃即應斬之以徇於衆豈可以衆人懼罪聊為調停當時紀律尚可問耶宋何尚之致仕復起綱石隱巖棲處士虛聲之為耳既為大臣致仕後豈宜徇名髙尚乎然尚之既居山矣旋復視事則所謂矯誣熱中進退無據宜袁淑譏之宋赦劭濬不誅綱履霜堅氷羲經早著炯戒劭濬逆亂顯著更無疑義乃始則置而弗問繼復機事不密是直自釀篡弒耳豈特坐昧先幾真是貽誚千古宋劭以何尚之為司空綱尚之受劭司空大節掃地較長樂老無亷恥為尤甚直非人類耳宋袁淑沮劭逆謀注袁淑一聞劭言始則諷以疾動力叱羣邪繼則明以禍至正言折亂謀可謂凛然大義不愧純臣然使彼時即舉發其事或當不致决裂乃猶豫不决終夜繞牀欲何為哉幸以身殉不然南史之誅不能逃矣宋子業與沈慶之山隂公主同輦注慶之老臣而甘於狎昵甚至與公主同載無恥極矣且其始猶誚何尚之後乃屢罷屢出垂老賜藥蓋亦有所自取耳宋主殺其弟休若綱盡殺兄子及諸弟而欲綿一線於孤立之幼子天理人心不可問矣以致篡敓相尋雖深忌道成而不能去足為自戕本根者炯戒魏太子宏受禪悲泣不自勝注宏是時方五嵗史稱前年吮癰當是三四嵗事即悲泣對問亦非五嵗兒所能辦不問可知其僞魏上皇勤於為治尤重刑獄注前稱魏主好浮屠黃老有遺世之心傳位為上皇矣兹復稱勤於為治尤重刑獄矛盾若是安得為信史魏主宏事馮太后能承顔順志注史於魏主宏之事馮后有美辭焉不知后之於魏無論其行醜穢實弒君之賊也宏當有不共戴天之仇顧乃順志求歡史亦是為至孝刺謬甚矣齊主問為政於劉瓛對以宜戒宋氏前車之失於是命羣臣各言得失目晉宋及齊並以篡奪相尋如出一轍所謂天道好還也宋之亡固反經齊之得豈合道此不過一時飾僞求名之談俱可失笑齊主性清儉嘗言使我治天下十年當令黃金與土同價注篡弒之賊為天地所不容即能恭儉所謂小善不掩大罪而乃肆言夸誕益足鄙矣齊詔郡縣官遷代以小滿為限綱親民之官果人與地習增秩賜金未嘗不收久任之效茍其貪詐闒茸正當易之以救百姓一以三年小滿為限非膠柱而何齊太子出東田觀穫范雲言宜知稼穡艱難注范雲觀穫之對自是恆語耳至以蕭衍西邸舊交竟致與謀篡逆晚節有虧則平日所為切直者特欺世盜名耳魏旱饑韓麒麟請增榖租年豐多積歲儉出賑又命出御府衣服珍寶弓矢刀鈴班賚注官有宿積則民無荒年固祖耿夀昌常平之意然常平亦不過救什伯於千萬耳曽力行之終無實效譬之減人一日之食而與其半曰為汝收之以待汝他日不得食而與之卒未得他日之感而先致目前之怨矣然則常平終不可行歟曰胡不可利不什不變法廢之而其怨者將益衆毋寧仍舊貫而不為其已甚斯可耳服御珍器或可濟凍餒弓矢刀鈴民間何所用之且非救饑之物也當時特用美言市人耳魏髙祐言宋均猛虎渡河卓茂蝗不入境目古之弭盜者若龔遂之守渤海虞詡之宰朝歌皆有實政可紀虎渡蝗避即非夸誕亦奚足稱舉齊杜元懿言吳興無秋㑹稽豐登牛埭稅格日可增倍目饑地不亟賑民豐壤則籌增課是真幸灾𣙜利南朝政令如此安得不屢亡齊紀僧真請為士大夫目僧真乞為士大夫齊主命詣江斆謝瀹斆顧左右命移牀逺客爾時君臣政令如此直令人失笑魏主謁永固陵毁瘠尤甚穆亮言風旱為災乃過哀之咎目并注孝文忘父讐而盡孝祖母且非本生祖母也是其所為不無好名之意至穆亮所言亦屬矯枉過正此與後漢建初時言事者以大旱為不封外戚之故同一支離無據齊豫章王嶷第庫無見錢目前云齊庫失火評直三千餘萬繼云第庫無見錢矛盾已甚安得謂信史魏主重齊使李元凱言江南多好臣歲一易主江北無好臣百年一易主魏主慙注魏主特好名且慕南朝浮僞之習宜元凱正言諷刺之其慙實自取耳齊太子長懋素惡西昌侯鸞及鸞得政太子子孫無遺注鸞曾維持子業得即君位不可謂挾仇其後誅鋤宗支乃因謀廢立自取大位耳史家所見小矣齊蕭鸞弒齊主謝瀹與客棊竟局還卧江斆入朝託藥發而去注瀹斆素負盛名既至倉皇閒變一則對客圍棊一則託言藥發身為大臣置國事於膜外南朝士大夫之習害人深矣或尚以此為髙真亂臣賊子之流春秋所必誅齊崔慶逺對魏主言齊主應立注魏主興師問罪兵出有名城下責言詞嚴義正慶逺雖欲為其主掩飾豈能奪理適足形其詞遁魏主大笑行賜復何謂哉魏改姓元氏綱魏孝文斷北語而改姓元是亡其祖也不惟失德實非吉兆其意必以為法二帝三王之治也夫二帝三王之治豈在語言姓氏衣服乎魏主重門族注孝文變其祖宗之法而循南朝尚名門族之覆轍不德孰甚焉齊主躬親細務鍾嶸言天子唯恭已南面注齊主所親者細務非政務鍾嶸之論不為無見魏變衣冠目夏收殷冔本不相襲元魏變衣冠不再傳而失遼金元亦然向作禮器圖序曾詳論之觀此可為炯鍳魏元禧遺奴就于烈求羽林虎賁烈厲色拒之目于烈拒禧可謂侃然不撓以剛正自守者及參預大事後幸戚縱橫不能救遏初終異若霄壤蓋利無可圖則捨身徇名易名已上逹則獨立棄利難出此轍者多矣齊張稷等弒寶卷令百僚署箋迎蕭衍王志取樹葉挼服之僞悶不署名目王志既不署名則當殉難即不殉難亦宜棄官逺去挼葉僞悶適見其貪生取巧耳此與晏嬰之盟崔氏同一窠臼非真剛正也梁主弒巴陵王顔見逺不食而卒目蕭齊之禪死節惟見逺一人當時世道人心可知矣梁置謗木肺石函綱木函肺石雖仍明目逹聰之意然徒騖名失實無論為告密者售奸且梁武身為篡逆惡蹟種種其罪不可擢髮數以開言路宜言者更有大於此者乎梁吉翂請代父死綱吉翂力却舉孝不肯因父取名是矣然其獄果被誣陷自應公家為之昭雪豈當時未之剖正而致翂請代乎然嘵嘵詣闕究非正道向因緹縈事嘗以虞舜殛鯀不聞大禹請代為斷操三尺者不可不知梁大有年綱年雖大有豈能榖賤如是斗米三十錢或有之耳史家紀載失實多未可信即實有之蕭衍何德而致是耶梁主命草封禪儀許懋引古經議止目并注七十二君金泥玉檢說本荒唐許懋駁之當矣至云凡主不應封禪則逞辨而害於理豈鐫文告成之事竟有應為之主乎梁沈約夢齊和帝劍斷其舌乃奏赤章于天稱禪代事不由己出梁主大怒目王業已成之語實自約發之所謂獲罪於天無所禱者赤章奏辨竟欺天耳然言之者沈約為之者蕭衍聞之而怒又何為乎梁臨川王宏以罪免官尋復其位又梁主疑宏家藏鎧仗往視悉貯錢大悅目并注既知愛宏為私情免宏為正法則當洛口逃歸之日即當明正其罪而姑以不死貸之可矣何待妾弟殺人始為免官且旋免旋復幾同兒戲乎至屋積金錢千億餘萬雖非兵仗貪黷亦甚矣乃未聞一言責讓而曰生計大可是其本心止慮其奪位耳無其事則一切不問卑鄙情態不堪一噱以是為友愛可乎柔然伏跋可汗信巫地萬言其子在天上遂納為可賀敦尋為國人所殺注少翁帷帳致神已荒唐不可信地萬謂能呼之天上尤理所必無伏跋溺惑邪言致巫覡因緣干政乃其子自明其妄尚不覺悟且以譖殺之昏狂顛倒適足以殺其軀而已可賀敦為柔然正室之號今䝉古汗之正室曰哈屯可賀敦蓋筆誤耳柔然阿那瓌犯魏邊魏遣元孚往撫以被留辱命抵罪復遣李崇等擊之不及而還目并注阿那瓌以窮蹙投附備受魏恩且以兵資送歸國負心反噬執使犯邊義難稽討乃元孚以孤身持節安撫被拘而還則罪以辱君命李崇擁衆十萬不能追擒逡巡而返反置不問魏之賞罰不明若此國勢安得不日衰耶魏崔延伯敗莫折天生因將士稽留採掠天生遂塞隴道目崔延伯乘勝長驅連平岐隴使迅掃秦州則天生可探囊而得乃以將士稽留採掠致賊得伺隙繕完則軍令何在且昧日中必熭之義矣魏房景伯為東清河太守婦人列其子不孝景伯母召與共食使其子觀景伯供食因悔過求還注教化之原固在躬行倡率然一人不孝即命供食以愧之且歷二十餘日之久設州民復有相陳者一一以此為化導將不勝其敝且勞矣史家緣飾之筆豈可盡信哉魏爾朱榮以精騎七千討葛榮令軍士袖棒棒賊遂破擒之注以號稱百萬之衆七千騎鼓勇可破雖史筆不無過甚其辭然用兵有方正不在數之衆寡若懦夫臨戎鰓鰓亟議增兵其見固逺出爾朱下然所云刀不如棒以棒取勝則又刺謬之甚不可信者矣魏爾朱天光拔万俟醜奴大栅所得俘囚悉縱之諸栅皆降目侯淵討韓樓縱虜人五千入城而幽州下爾朱天光討万俟醜奴亦縱遣俘囚而諸栅降雖一時權譎而能得以敵攻敵之䇿然不量時度勢居不敗之地而冒昧為之必有受其反噬者矣魏邢邵作赦文叙魏敬宗枉殺爾朱榮狀目邢邵叙敬宗枉殺爾朱榮所謂六經掃地平日博聞强記文出為之紙貴者正虛車之飾耳魏以髙歡為渤海王綱髙歡在魏已成尾大之勢然亦時君有以致之使然耳徴之不至逆跡已彰復授以重寄雖出於無可奈何而歡因此益無忌憚賀拔嶽宇文泰等從而效尤魏於是魚爛而不可救藥矣梁立太子母弟綱周宏正奏記請效目夷子臧之節尋梁主因人言不息封統子歡譽察等皆大郡目昭明既不享年以次立賢於理未為不順而朝野嘵嘵屬意統子宏正奏記簡文執魚臧已事為例徒髙遜讓之名而不顧禰祖之紊正義庸有當乎即如洪武因劉三吾一言令太孫主器以致諸王不遜禍釀燕藩迂儒誤人家國大率如此梁武且以人言不息封統子以慰衆心是誠何為者耶梁邵陵王綸有罪免為庶人既而復之綱智通舉劾不愧能於其職藐法如邵陵不復知有君父而武帝暫免旋復溺愛失義厥後臺城既陷搆禍相尋其罔上恣行所謂由來漸矣魏髙歡討爾朱兆綱爾朱逆惡貫盈不可更僕數魏收所謂溪壑羣狐貪人敗類正未足盡其罪狀李延夀謂收得爾朱氏金作佳傳事雖莫須有然千古阿其所好而為之抑揚其辭者正復不少東魏髙澄通歡妾歡幽之婁妃亦不得見司馬子如見歡解之因使更鞫盡反其辭注子如論婁妃是矣附髙澄而反其通父妾之罪則大謬正理史稱父子夫婦復如初蓋嘉其善處人人倫而不知實傷人倫大義矣時南北通好銜命接客務以俊乂為誇注兩國相持爭以應對敏捷相誇尚則所謂後乂者率可知矣幸而地醜德齊茍延嵗月遇有能為之主取之如反掌耳梁何敬容為詹事與人論太子祖尚元虛之失及是坐為妾弟書屬領軍免官目敬容既為詹事不能正諫而有後言己失蹇蹇之義而又為妾弟私屬其人尚足齒哉金山狀如兜鍪注通考以金山狀如兜鍪北俗呼為突厥因以為號云云今按兜鍪䝉古呼為度古勒噶則馬端臨所稱初未㑹對音之義如漢書西域傳之剽竊失真者多矣梁主疏簡刑法又持佛戒每宥重罪由是王侯益橫注惟辟作福惟辟作威非作也應福者福之應威者威之仍其自取耳然實不可偏廢若武帝則所謂徒作福而不作威而其作福也又實私意顧以多行慈愛為積已之福馴致白晝殺人暮夜剽掠其為種禍亦仍武帝受之梁主捨嶽陽王察兄弟而立太子綱內常愧之察兄弟亦內懷不平目察兄弟之懷不平乃武帝之內愧有以啓之也卒致子孫爭據陵夷以至於亡貽謀之道可不慎歟梁湘東王繹聞廬陵王續卒喜躍屧破目兄死不哀喜躍破屧臺城被圍遲徊不進即後之刻檀肖像亦不過為收人心之計耳天道神明其可欺乎魏徴以江陵覆陷乃上靈降鑒此焉假手理固有之事亦宜然東魏髙澄詐為髙歡書召侯景景嘗與歡約書背加微㸃及得書無點遂辭不至注髙歡既預慮澄不能駕馭侯景且為籌堪敵之人豈有書背微㸃忘而不告之理此足見史氏之多文而鮮實梁主夢中原牧守來降因納侯景注叔孫豹以夢啓豎牛之禍梁武帝以夢致侯景之亂乃至餓死亦復相類此不待朱异之慫恿而後成亂階諺所云癡人說夢可不謂大愚乎梁荀濟逃奔東魏因謀誅髙澄為所殺注荀濟果正士不當逃奔東魏獨其一死所謂鐵中錚錚者耳天裂於西北光出如電聲若雷目清輕之氣上浮而為天萬古不易者也若浮圖氏所稱劫運則又謬悠而不可知仍此天地也安得有裂之理此蓋祖女媧煉石補天之竒說遇電雷之變史官好怪而甚其詞轉云如電若雷耳梁侯景僞表求和梁主許之既盟而圍不解目犯闕許和敕止援軍是延賊入門又自絶其外救也梁武瞶瞶雖有和不如死之見而牽於簡文之請卒成和議所謂天奪其魄者耳北齊辛術為吏部尚書取士新舊參舉門閥不遺目晉宋以來官人之弊不過采取門閥延攬浮華歷世相沿迄無變易史以循名責實參舉折衷推美辛術曾不知爾時紳士中名實才器克副其選者果誰耶則亦徒與山公啓事侈談標榜者同一無實濟耳梁武陵王紀伐江陵梁主與書許其専制一方目繹果有推梨讓棗之心其畫像釘體及密敕樊猛又何為哉內實猜忌外託文言以自解其孰信之梁主將還建康卒從胡僧祐等議留江陵目湘東雖還據建康亦未能保其不敗第就彼時形勢而論建康尚有險要可憑江陵則偏隅受敵强弱判然乃宗凛等皆安土重遷繹復優柔寡斷既卜而疑仍不决下䇿卒如魏人所料坐待滅亡庸劣無斷之人自取禍敗率如此齊魏收撰魏書用愛憎為褒貶目韓愈稱不有人禍必有天刑謂作史而自附古之遺直者猶恐不免况收自以任情舉按曲筆肆穢其遭發冢棄骨不亦宜乎然收猶有人心者能自言之其似收之為而不肯自言者視收又甚矣魏兵伐梁且至王琛馳報境上帖然目魏師悉鋭窺梁如入無人之境守臣告警胡黃輩尚付之漠然且逆止法和赴援之旅不知蕭繹君臣何所恃以無恐而王琛石梵報書方以為無恐所謂自作孽不可逭耳齊主委任和士開髙睿請出之於外士開賂婁定逺得復留睿論執被殺目八貴橫行干政士開尤為罪魁髙睿定計出之是也乃以定逺貪餌墮術事隳垂成卒致定逺亦斥外睿且因之以死致齊政日壞直底滅亡是定逺之罪猶浮於士開耳陳歐陽紇召馮僕同反僕母洗夫人發兵拒境紇敗僕以母功封侯目洗氏能知大義洵為不愧巾幗至其子以太守潛通叛人即因母功貰罪足矣乃竟錫之通侯是何賞罰哉周韋孝寬密為謡言令諜傳之於鄴齊祖挺等因讒斛律光請早圖之目斛律光在齊不啻如南朝之倚道濟然使鄰國得以行反間者亦因薰蕕同器讒說交傾且紫陌駐營猜嫌久蓄物必先腐而後蟲生信哉陳焚文錦於雲龍門綱錦繡纂組之害女紅漢景詔最得抑末崇本之要必舉而焚諸門外則近於矯飾好名天下之錦豈可盡焚哉上不以誠感而望下以誠應其可得乎齊國子博士熊安生聞周主入鄴遽令掃門俄周主幸其家給安車駟馬注安生既號通經豈其未聞大義國破而掃門以待異姓綱常之謂何安車駟馬之賜上下蓋兩失之周人築長圍遏吳明徹歸路蕭摩訶請往擊不聽遂被擒目兵薄堅城而敵人遏其歸路急則可解緩則腹背受困理勢判然明徹胸無成見貌為鎮靜再阻摩訶突圍之舉直至水淺膠舟束手就縛所詡為長算逺略安在雖憤悶而死豈足以償其辜哉隋文帝詔定雅樂何妥欲沮鄭譯蘇夔議因奏止用黃鍾一宫目十二律旋相為宫乃鍾吕自然之理未聞専用一宫可以備大成者何妥本不精樂律祇思沮抑譯夔希㫖巧合以飾其短然隋文躬為悖逆亟亟正雅樂不亦誣世且自誣乎蘇威作五教使民誦之目馭新定之民當以鎮靜為要徒取辦于五教之誦是不能化俗適足滋擾當時文弊之為害若此帝令蕭吉為皇后擇葬地太子廣遣人謝吉言當令我早立吉告以後四載太子御天下目并注蕭吉既習擇地之術乃聽逆子之言謀害君父非亂臣賊子而何秉史筆者所當深惡而痛絶之顧曲為稱述且若艷其前知者然可謂好竒而不衷於理矣煬帝牛𢎞問劉炫周禮士多府史少之故炫答以古人案不重校文不繁悉注夏商尚質至周文勝已難如夏商之舊蓋運㑹使然倘執省官省事之說有案不須重校覆治則舞文弄法者乘之矣不揣澄清吏治之本但知是古非今自號寬政者徒養奸耳帝將討髙麗往海口造船官吏督役立水中自腰以下皆生蛆目腰下生蛆其人當已久死安能立水中不息且僅云什三四乎史官張大其詞所謂紂之不善不如是之甚爾然廣之罪其實浮於紂矣楊元感反李密說以長驅入薊為上計元感不聽注密為元感畫䇿以入薊為上取長安為次及提兵經營大業柴孝和勸以早定關中徐洪客勸以先取獨夫又皆不能自决若唐髙祖初舉事即定入關之計據險養威卒能混一區宇所見同而所用異雖曰天命豈非人事哉屈突通堅守月餘勢蹙降唐屈突通守志頗堅但以一時不自引决遂至靦顔事仇甘心盡力為千古濡忍失足者口實慷慨殉節易從容就義難誠不刋之論也大業十四年分注恭帝義寧二年綱并注綱目泥隋書北史舊文於是年正月即分注義寧二年蓋二史特以義寧已奉煬帝為太上皇故用義寧繼大業年號耳若綱目於義寧之立既斥之於不成君之列於煬帝之弒又並不加以太上皇之稱則安得從繼述之例乎至通鑑於大業十三年正月竟書義寧元年雖疾惡之義究乖統繫筆例今折衷書法於是年用一歲兩係之例三月以前大書大業十四年而以義寧二年附注四月以後分注義寧二年而以恭帝侗及唐髙祖附後義例庶無矛盾夏四月分注紀年綱并注是年三月隋亡矣兩恭帝一出於唐一出於王世充等準以不成君之例雖與漢更始同至唐髙祖於五月受禪然其得統終不可同之漢髙且煬帝弒而恭帝侗立於東都不可謂非正故别起義例於是年三月前仍大書紀年作隋於夏四月但分注紀年自己卯至癸未始作隋唐按之書法三月前與綱目異前條已著其說四月後與綱目同復揭其義於此李密王世充皆徐文逺門人文逺見密密頓首受教及見世充必先拜注文逺勸密數語可云不愧宿儒乃明知世充殘忍而於密敗之後不即引身逺避是豈真淡於榮利者蓋前此之莊言激論特預料密能見容故無難樂得其道及知世充不能容遂至甘心下拜所謂五經掃地蓋亦長樂老人之流耳唐秦王世民伐秦堅壁不出伺薛仁杲糧盡乃誘敗之目秦王用兵之長大約始以持重養鋭繼以深入赴機前後屢戰屢勝歷歷不爽雖英略天授王者不死然兵家言靜若處女狡若脫者正復不外此道徐世績以李密舊境降唐目世績不以李密土地邀功頗見志節唐太宗所云公不負李密豈肯負朕誠非虛語後於立武后事乃淟忍依阿毫無匡救則暮年門户計重竟爾易操非獨廉謹有餘剛方不足實亦有負太宗之知己矣隋唐竇建德救王世充迫於虎牢之險凌敬說建德悉兵直趣蒲津注胡寅以凌敬之䇿雖善而汾晉蒲坂非不戰所能下若延引日月世充破而建德仍不免于亡此老生常談耳使建德是時果集兵向秦如孫臏之直趣大梁未必不足以奪洛陽城下諸軍之氣特為諸將所惑一戰被擒所謂神昧當幾非天奪其魄者歟梁主蕭銑帥羣臣出降於唐唐送銑長安斬之目唐於割據諸雄擒則無赦若薛仁杲竇建德輩其人固非能終為人下者即銑之出降情哀詞迫而迄難逃都市之戮蓋以絶人望而靖亂源勢固不得不爾所謂謀大事者不顧小信即世充雖一時䝉貸而終為獨孤修德所戕又安知非明以稽誅全秦王許以不死之言而隂授其指于修德歟評鑑闡要卷四
